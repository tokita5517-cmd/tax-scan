<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>注文書（控）専用：税抜→税(10%四捨五入)→合計</title>
  <style>
    :root{ --accent:#f0c040; --border:rgba(255,255,255,.14); --bg:rgba(0,0,0,.75); }
    body{margin:0;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans JP",sans-serif;overflow:hidden}
    #video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover}
    #overlay{position:fixed;inset:0;pointer-events:none}
    #roiBox{
      position:absolute;
      /* ROI可視化（調整用） */
      left:78%; top:55%;
      width:20%; height:25%;
      border:2px solid var(--accent);
      border-radius:10px;
      box-shadow:0 0 0 9999px rgba(0,0,0,.25);
    }
    #status{
      position:fixed;top:14px;left:50%;transform:translateX(-50%);
      background:var(--bg);border:1px solid var(--border);
      border-radius:999px;padding:8px 12px;font-size:12px;z-index:20;
      backdrop-filter:blur(10px);white-space:nowrap
    }
    #panel{
      position:fixed;left:0;right:0;bottom:0;z-index:30;
      background:linear-gradient(to top, rgba(0,0,0,.92) 70%, transparent);
      padding:14px 14px 22px;
    }
    #card{
      background:rgba(20,20,20,.85);border:1px solid var(--border);
      border-radius:16px;overflow:hidden;backdrop-filter:blur(14px);
    }
    .row{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-top:1px solid rgba(255,255,255,.10)}
    .row:first-child{border-top:0}
    .lab{opacity:.65;font-size:12px;letter-spacing:.5px}
    .val{font-weight:900;font-variant-numeric:tabular-nums;font-size:20px}
    .big .val{font-size:28px;color:var(--accent)}
    #btnRow{display:flex;gap:10px;margin-top:10px}
    button{
      flex:1;border:0;border-radius:14px;padding:14px 12px;
      font-weight:900;cursor:pointer
    }
    #startBtn{background:var(--accent);color:#000}
    #toggleRoi{background:rgba(255,255,255,.10);color:#fff;border:1px solid var(--border)}
    #hint{opacity:.7;font-size:12px;margin:10px 2px 0;line-height:1.6}
    canvas{display:none}
  </style>

  <!-- 端末内OCR（重いので「ホールド時だけ」使う） -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
  <video id="video" autoplay muted playsinline></video>
  <canvas id="canvas"></canvas>

  <div id="overlay">
    <div id="roiBox"></div>
  </div>

  <div id="status">📷 準備中…（HTTPSで開いてね）</div>

  <div id="panel">
    <div id="card">
      <div class="row">
        <div class="lab">税抜（印字の金額）</div>
        <div class="val" id="baseVal">—</div>
      </div>
      <div class="row">
        <div class="lab">消費税（10% 四捨五入）</div>
        <div class="val" id="taxVal">—</div>
      </div>
      <div class="row big">
        <div class="lab">合計（税込）</div>
        <div class="val" id="totalVal">—</div>
      </div>
    </div>

    <div id="btnRow">
      <button id="startBtn">カメラ開始</button>
      <button id="toggleRoi">ROI枠 表示/非表示</button>
    </div>
    <div id="hint">
      ・この書類専用：右端「金額」列の印字（例：1,080）だけ読みます。<br>
      ・紙を止める → 自動ホールドして計算 → 紙を動かすと次を待ちます。
    </div>
  </div>

<script>
  // ========= 設定（必要ならここだけ微調整） =========
  const RATE = 10;                 // 10%固定
  const TICK_MS = 200;             // 動き検知間隔
  const HOLD_STABLE_MS = 850;      // 0.85秒止まったらホールド
  const MOTION_TH = 12;            // 動き閾値（大きいほど鈍感）

  // ROI（この書類用：右端金額列の下側）
  // 画面に対する比率：x,y,w,h
  const ROI = { x: 0.78, y: 0.55, w: 0.20, h: 0.25 };

  // OCRの軽量化：文字種を絞る（数字/カンマ/円 だけ）
  const OCR_LANG = 'jpn';
  const OCR_WHITELIST = '0123456789,円￥';

  // ========= DOM =========
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });

  const statusEl = document.getElementById('status');
  const baseVal = document.getElementById('baseVal');
  const taxVal = document.getElementById('taxVal');
  const totalVal = document.getElementById('totalVal');

  const startBtn = document.getElementById('startBtn');
  const toggleRoiBtn = document.getElementById('toggleRoi');
  const roiBox = document.getElementById('roiBox');

  // ========= 状態 =========
  let stream = null;
  let timer = null;
  let holding = false;
  let stableMs = 0;
  let lastSmall = null;
  let busy = false;

  function setStatus(msg){ statusEl.textContent = msg; }

  function yen(n){
    return '¥' + Number(n).toLocaleString('ja-JP');
  }

  // 10% 四捨五入（整数で安全に）
  function calc10Round(base){
    const tax = Math.floor((base * 10 + 50) / 100);
    return { base, tax, total: base + tax };
  }

  function showResult(base){
    const r = calc10Round(base);
    baseVal.textContent = yen(r.base);
    taxVal.textContent = yen(r.tax);
    totalVal.textContent = yen(r.total);
  }

  // OCR結果から「税抜金額」を拾う（この書類専用）
  function pickBase(text){
    // 1) カンマ付き最優先（1,080）
    const c = text.match(/([0-9]{1,3}(?:,[0-9]{3})+)/);
    if (c) return parseInt(c[1].replace(/,/g,''), 10);

    // 2) 3桁以上の数字候補の最大
    const nums = [...text.matchAll(/\b([0-9]{3,})\b/g)]
      .map(m => parseInt(m[1], 10))
      .filter(n => Number.isFinite(n) && n >= 100);

    if (!nums.length) return 0;
    return Math.max(...nums);
  }

  function stopStream(){
    if (stream){
      try { stream.getTracks().forEach(t => t.stop()); } catch {}
      stream = null;
    }
  }

  async function startCamera(){
    // HTTPSチェック（localhostはOK）
    const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
    if (location.protocol !== 'https:' && !isLocal){
      setStatus('❌ HTTPSで開いてください（file:// は不可）');
      return;
    }

    setStatus('📷 カメラ起動中…');
    stopStream();

    try{
      stream = await navigator.mediaDevices.getUserMedia({
        audio:false,
        video:{
          facingMode:{ ideal:'environment' },
          width:{ ideal:1280 },
          height:{ ideal:720 }
        }
      });
      video.srcObject = stream;

      // iOS: metadata待ち
      await new Promise(res => {
        if (video.readyState >= 1) return res();
        video.onloadedmetadata = () => res();
      });

      await video.play();
      setStatus('✅ かざして止めてください');
      startAutoHold();
    }catch(e){
      console.error(e);
      setStatus(`❌ カメラ起動失敗：${e.name || 'Error'}`);
    }
  }

  function startAutoHold(){
    if (timer) clearInterval(timer);
    holding = false;
    busy = false;
    stableMs = 0;
    lastSmall = null;

    timer = setInterval(async () => {
      if (!video.videoWidth || busy) return;

      // ---- 軽い動き検知（小さいフレームで差分） ----
      const w = 160, h = 120;
      canvas.width = w; canvas.height = h;
      ctx.drawImage(video, 0, 0, w, h);
      const data = ctx.getImageData(0, 0, w, h).data;

      let diff = 0;
      if (lastSmall){
        // 間引きで計算（i+=16で1/16サンプル）
        for (let i = 0; i < data.length; i += 16){
          diff += Math.abs(data[i] - lastSmall[i]);
        }
        diff = diff / (data.length / 16);
      }
      lastSmall = data;

      // ---- ホールド中：動いたら解除して次へ ----
      if (holding){
        if (diff > MOTION_TH){
          holding = false;
          setStatus('✅ 次の用紙をかざして止めてください');
        }
        return;
      }

      // ---- ホールド待ち：静止が続いたらホールド ----
      if (diff && diff < MOTION_TH) stableMs += TICK_MS;
      else stableMs = 0;

      if (stableMs >= HOLD_STABLE_MS){
        stableMs = 0;
        holding = true;
        busy = true;
        setStatus('⏸ ホールド中（読み取り中…）');

        try{
          const cropDataUrl = captureCropPNG();
          const text = await ocrOnce(cropDataUrl);
          const base = pickBase(text);

          if (base > 0){
            showResult(base);
            setStatus(`✅ 税抜 ${yen(base)} → 計算完了（紙を動かすと次）`);
          }else{
            setStatus('⚠️ 金額が見つかりません（少し近づけて）');
            // 失敗時はホールド解除して再トライ可能に
            holding = false;
          }
        }catch(err){
          console.error(err);
          setStatus('❌ OCRエラー（もう一度）');
          holding = false;
        }finally{
          busy = false;
        }
      }
    }, TICK_MS);
  }

  function captureCropPNG(){
    const vw = video.videoWidth;
    const vh = video.videoHeight;

    // 元解像度で一度描画
    canvas.width = vw; canvas.height = vh;
    ctx.drawImage(video, 0, 0, vw, vh);

    const x = Math.max(0, Math.floor(vw * ROI.x));
    const y = Math.max(0, Math.floor(vh * ROI.y));
    const w = Math.min(vw - x, Math.floor(vw * ROI.w));
    const h = Math.min(vh - y, Math.floor(vh * ROI.h));

    const cut = ctx.getImageData(x, y, w, h);

    const tmp = document.createElement('canvas');
    tmp.width = w; tmp.height = h;
    tmp.getContext('2d').putImageData(cut, 0, 0);

    return tmp.toDataURL('image/png');
  }

  async function ocrOnce(dataUrl){
    // Tesseractは重いので、ホールド時だけ呼ぶ
    const { data } = await Tesseract.recognize(dataUrl, OCR_LANG, {
      logger: m => {
        // 進捗を軽く表示（邪魔なら消してOK）
        if (m.status === 'recognizing text'){
          const p = Math.round((m.progress || 0) * 100);
          setStatus(`⏸ 読み取り中… ${p}%`);
        }
      }
    });

    // 文字種フィルタ（できるだけノイズ減らす）
    const raw = (data.text || '').replace(/[^\d,円￥\s]/g, ' ');
    return raw;
  }

  // ========= UI =========
  startBtn.addEventListener('click', startCamera);

  toggleRoiBtn.addEventListener('click', () => {
    roiBox.style.display = (roiBox.style.display === 'none') ? 'block' : 'none';
  });

  // 初期：Safari設定やブラウザ制限のヒント
  window.addEventListener('load', () => {
    if (!navigator.mediaDevices?.getUserMedia){
      setStatus('❌ このブラウザはカメラ非対応（Safari/Chromeで開いて）');
    }else{
      setStatus('📷 「カメラ開始」を押してね（HTTPS必須）');
    }
  });

  // 画面離脱で停止
  window.addEventListener('beforeunload', () => {
    if (timer) clearInterval(timer);
    stopStream();
  });
</script>
</body>
</html>
