<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>tax-scan</title>
  <style>
    html, body { margin:0; padding:0; background:#000; color:#fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans JP", sans-serif; }
    #wrap { position:relative; width:100vw; height:100vh; overflow:hidden; }
    video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
    canvas { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }

    .topbar {
      position:absolute; top:10px; left:10px; right:10px;
      display:flex; gap:10px; align-items:center; justify-content:space-between;
      z-index:5;
    }
    .pill {
      background: rgba(30,30,30,.85);
      border: 1px solid rgba(255,255,255,.1);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 14px;
      display:flex; gap:8px; align-items:center;
      white-space:nowrap;
    }
    .pill.warn { border-color: rgba(255,80,80,.9); }
    .pill .yen { color:#ffd54a; font-weight:700; }
    .hint {
      position:absolute; left:50%; transform:translateX(-50%);
      top:46%;
      background: rgba(50,50,50,.75);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 14px;
      z-index:5;
    }

    .panel {
      position:absolute; left:10px; right:10px; bottom:12px;
      z-index:5;
      display:flex; flex-direction:column; gap:10px;
    }
    .row { display:flex; gap:10px; }
    .btn {
      flex:1;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.12);
      padding: 14px 16px;
      background: rgba(30,30,30,.85);
      color:#fff;
      font-size: 16px;
      font-weight: 600;
    }
    .btn.primary { background: #f6c546; color:#111; border:none; }
    .btn.small { flex:0 0 auto; width: 110px; }

    .debug {
      opacity:.8;
      font-size:12px;
      padding: 0 6px;
    }
  </style>
</head>

<body>
<div id="wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>

  <div class="topbar">
    <div id="statusPill" class="pill warn">⚠️ 枠に数字が見えていません</div>
    <div class="pill">請求書: <span class="yen" id="count">0</span> 枚</div>
    <div class="pill">総合計: <span class="yen" id="sum">¥0</span></div>
  </div>

  <div class="hint">黄色枠に「数字」だけ入れたらホールド</div>

  <div class="panel">
    <div class="row">
      <button id="autoBtn" class="btn primary">AUTO: ON</button>
      <button id="recentBtn" class="btn">↩︎ 直近</button>
      <button id="todayBtn" class="btn">↻ 今日</button>
    </div>
    <button id="detailBtn" class="btn">▼ 詳細（履歴・グラフ）を開く</button>
    <div class="debug" id="debug">OCR: "" → 0</div>
  </div>
</div>

<script>
  const video = document.getElementById("video");
  const overlay = document.getElementById("overlay");
  const ctx = overlay.getContext("2d");

  const statusPill = document.getElementById("statusPill");
  const sumEl = document.getElementById("sum");
  const countEl = document.getElementById("count");
  const debugEl = document.getElementById("debug");
  const autoBtn = document.getElementById("autoBtn");

  let autoOn = true;
  let locked = false;
  let lastTotal = 0;

  // 黄色枠（画面比率で固定）
  // たかちんのスクショに合わせた「合計欄の数字だけ」を拾う横長枠
  // 필요ならここだけ微調整すればOK
  function getYellowRect() {
    const w = overlay.width, h = overlay.height;
    // 画面中央より少し下あたり
    const rectW = w * 0.62;
    const rectH = h * 0.085;
    const x = w * 0.26;
    const y = h * 0.44;
    return { x, y, w: rectW, h: rectH };
  }

  function draw() {
    overlay.width = video.videoWidth || window.innerWidth;
    overlay.height = video.videoHeight || window.innerHeight;

    ctx.clearRect(0,0,overlay.width, overlay.height);

    const r = getYellowRect();

    // 黄枠
    ctx.lineWidth = Math.max(3, overlay.width * 0.004);
    ctx.strokeStyle = "rgba(246,197,70,0.95)";
    roundRect(ctx, r.x, r.y, r.w, r.h, 18);
    ctx.stroke();
  }

  function roundRect(ctx, x, y, w, h, r) {
    const rr = Math.min(r, w/2, h/2);
    ctx.beginPath();
    ctx.moveTo(x+rr, y);
    ctx.arcTo(x+w, y, x+w, y+h, rr);
    ctx.arcTo(x+w, y+h, x, y+h, rr);
    ctx.arcTo(x, y+h, x, y, rr);
    ctx.arcTo(x, y, x+w, y, rr);
    ctx.closePath();
  }

  async function setupCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    requestAnimationFrame(loop);
  }

  function setWarn(isWarn) {
    if (isWarn) {
      statusPill.classList.add("warn");
      statusPill.textContent = "⚠️ 枠に数字が見えていません";
    } else {
      statusPill.classList.remove("warn");
      statusPill.textContent = "✅ 数字を検出";
    }
  }

  function formatYen(n) {
    return "¥" + (n || 0).toLocaleString("ja-JP");
  }

  async function loop() {
    draw();
    if (autoOn && !locked) {
      await tickScan();
    }
    requestAnimationFrame(loop);
  }

  async function tickScan() {
    // 連打防止：ざっくり
    if (tickScan.busy) return;
    tickScan.busy = true;

    try {
      const crop = cropYellow();
      if (!crop) return;

      const resp = await fetch("/api/scan", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ image_base64: crop })
      });

      const data = await resp.json().catch(()=>({}));
      const total = Number(data.total || 0);
      const text = String(data.text || "");

      debugEl.textContent = `OCR: "${text}" → ${total}`;

      if (total > 0) {
        setWarn(false);
        // 直近と同じ数字が一定回数続いたらホールド、みたいな挙動にしてもOK
        // とりあえず「一回でも読めたら表示」
        lastTotal = total;
        sumEl.textContent = formatYen(total);
      } else {
        setWarn(true);
      }
    } catch (e) {
      debugEl.textContent = `OCR error: ${String(e.message || e)}`;
      setWarn(true);
    } finally {
      tickScan.busy = false;
    }
  }

  function cropYellow() {
    if (!video.videoWidth || !video.videoHeight) return null;

    const r = getYellowRect();

    // videoの実ピクセル座標系に合わせてcrop
    // overlayはvideo.videoWidth/Heightで描いてるので一致する
    const off = document.createElement("canvas");
    off.width = Math.max(1, Math.floor(r.w));
    off.height = Math.max(1, Math.floor(r.h));
    const octx = off.getContext("2d");

    octx.drawImage(
      video,
      Math.floor(r.x), Math.floor(r.y), Math.floor(r.w), Math.floor(r.h),
      0, 0, off.width, off.height
    );

    // JPEGで送る（軽い）
    return off.toDataURL("image/jpeg", 0.92);
  }

  // UI
  autoBtn.addEventListener("click", () => {
    autoOn = !autoOn;
    autoBtn.textContent = autoOn ? "AUTO: ON" : "AUTO: OFF";
    autoBtn.classList.toggle("primary", autoOn);
  });

  document.getElementById("recentBtn").addEventListener("click", () => {
    locked = false;
    sumEl.textContent = formatYen(lastTotal);
  });

  document.getElementById("todayBtn").addEventListener("click", () => {
    locked = false;
    lastTotal = 0;
    sumEl.textContent = formatYen(0);
    countEl.textContent = "0";
  });

  document.getElementById("detailBtn").addEventListener("click", () => {
    alert("（ここは後で履歴UIを付ける用）");
  });

  setupCamera().catch(err => {
    alert("カメラ起動できない: " + err);
  });
</script>
</body>
</html>
