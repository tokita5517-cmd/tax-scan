<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>tax-scan</title>
  <style>
    :root{
      --bg:#0b0b0c;
      --panel:#111216;
      --ink:#f4f4f5;
      --muted:#b6b6b8;
      --warn:#ff3b30;
      --ok:#34c759;
      --accent:#f6c343; /* yellow */
      --chip:#1b1c22;
    }
    html,body{height:100%; margin:0; font-family: system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic UI","Yu Gothic",sans-serif; background:var(--bg); color:var(--ink);}
    .wrap{position:relative; height:100%; overflow:hidden;}
    video{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; background:#000;}
    canvas{display:none;}
    .topbar{
      position:absolute; top:10px; left:10px; right:10px;
      display:flex; gap:10px; align-items:center; justify-content:space-between;
      pointer-events:none;
    }
    .chip{
      pointer-events:auto;
      background:rgba(27,28,34,0.88);
      border:1px solid rgba(255,255,255,0.08);
      color:var(--ink);
      padding:10px 12px;
      border-radius:999px;
      font-weight:600;
      font-size:14px;
      display:flex; align-items:center; gap:8px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      white-space:nowrap;
    }
    .chip.warn{border-color:rgba(255,59,48,0.55); color:#ffd5d2;}
    .chip.ok{border-color:rgba(52,199,89,0.55); color:#d6ffe3;}
    .chip .yen{color:var(--accent); font-weight:800;}
    .midhint{
      position:absolute; left:0; right:0; top:50%;
      transform:translateY(-50%);
      display:flex; justify-content:center;
      pointer-events:none;
    }
    .hintbubble{
      background:rgba(15,16,20,0.78);
      border:1px solid rgba(255,255,255,0.08);
      color:var(--ink);
      padding:10px 14px;
      border-radius:999px;
      font-size:14px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .roi{
      position:absolute;
      border:4px solid rgba(246,195,67,0.95);
      border-radius:16px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.22);
      pointer-events:none;
    }
    .roi:after{
      content:"";
      position:absolute; inset:-6px;
      border:2px solid rgba(246,195,67,0.35);
      border-radius:18px;
    }
    .bottombar{
      position:absolute; left:10px; right:10px; bottom:10px;
      display:flex; flex-direction:column; gap:10px;
    }
    .sheet{
      background:rgba(17,18,22,0.90);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:18px;
      overflow:hidden;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .row{
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 16px;
      border-top:1px solid rgba(255,255,255,0.06);
      font-weight:650;
    }
    .row:first-child{border-top:none;}
    .row .label{color:var(--muted); font-weight:650;}
    .row .val{font-size:22px; font-weight:900;}
    .row .val.small{font-size:18px;}
    .row .val.tax{color:var(--warn);}
    .row .val.sum{color:var(--accent);}
    .controls{
      display:flex; gap:10px;
    }
    .btn{
      flex:1;
      padding:16px 14px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,0.10);
      background:rgba(246,195,67,0.95);
      color:#141414;
      font-size:18px;
      font-weight:900;
      text-align:center;
      user-select:none;
    }
    .btn.secondary{
      background:rgba(27,28,34,0.90);
      color:var(--ink);
      font-weight:800;
    }
    .tiny{
      text-align:center;
      color:rgba(255,255,255,0.55);
      font-size:12px;
      padding-bottom:4px;
    }
    .mono{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size:12px;
      color:rgba(255,255,255,0.55);
      text-align:center;
    }
  </style>
</head>
<body>
<div class="wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="work"></canvas>

  <div class="topbar">
    <div id="statusChip" class="chip warn">⚠️ 枠に数字が見えていません</div>
    <div class="chip">請求書: <span id="count">0</span> 枚</div>
    <div class="chip">総合計: <span class="yen">¥</span><span id="grand">0</span></div>
  </div>

  <div class="midhint">
    <div class="hintbubble">黄色枠に「数字」を入れたらホールド</div>
  </div>

  <div id="roi" class="roi"></div>

  <div class="bottombar">
    <div class="sheet">
      <div class="row">
        <div class="label">税抜（逆算）</div>
        <div class="val small" id="net">—</div>
      </div>
      <div class="row">
        <div class="label">消費税（10%・四捨五入）</div>
        <div class="val small tax" id="tax">—</div>
      </div>
      <div class="row">
        <div class="label">合計（税込）</div>
        <div class="val sum" id="sum">—</div>
      </div>
    </div>

    <div class="controls">
      <div id="autoBtn" class="btn">AUTO: ON</div>
      <div id="undoBtn" class="btn secondary">↩ 直近</div>
      <div id="todayBtn" class="btn secondary">⟲ 今日</div>
    </div>

    <div class="mono" id="debugLine">OCR: "" → 0</div>
    <div class="tiny">※iPhoneで止まったら、左上「🅰︎」バッジをタップで再開</div>
  </div>
</div>

<script>
(() => {
  const video = document.getElementById('video');
  const canvas = document.getElementById('work');
  const ctx = canvas.getContext('2d', { willReadFrequently:true });

  const roiEl = document.getElementById('roi');
  const statusChip = document.getElementById('statusChip');
  const countEl = document.getElementById('count');
  const grandEl = document.getElementById('grand');
  const netEl = document.getElementById('net');
  const taxEl = document.getElementById('tax');
  const sumEl = document.getElementById('sum');
  const debugLine = document.getElementById('debugLine');

  const autoBtn = document.getElementById('autoBtn');
  const undoBtn = document.getElementById('undoBtn');
  const todayBtn = document.getElementById('todayBtn');

  // ---- 設定（ここ大事） ----
  // 黄色枠：画面比率で固定（今のたかちんの運用に合わせて、横長の枠）
  const ROI = { x: 0.18, y: 0.41, w: 0.64, h: 0.10 }; // ←必要なら微調整
  // 送信画像は拡大してAIに渡す（数字を大きくする）
  const UPSCALE = 4.0;  // 2.5→4.0（強め）
  // シャープネス閾値（近すぎ/ブレ検知）
  const SHARPNESS_TH = 120; // 低いほど甘い。迷ったら120

  // オートOCR間隔
  const INTERVAL_MS = 650;

  // 状態
  let auto = true;
  let scanning = false;
  let lastTotal = 0;
  let grandTotal = 0;
  let invoiceCount = 0;

  const history = []; // {total, ts}

  function placeROI() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const x = Math.round(vw * ROI.x);
    const y = Math.round(vh * ROI.y);
    const w = Math.round(vw * ROI.w);
    const h = Math.round(vh * ROI.h);
    roiEl.style.left = x + 'px';
    roiEl.style.top = y + 'px';
    roiEl.style.width = w + 'px';
    roiEl.style.height = h + 'px';
  }

  window.addEventListener('resize', placeROI);
  placeROI();

  // カメラ起動
  async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: 'environment',
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
  }

  // 文字→数値フォーマット
  function fmt(n){ return (n||0).toLocaleString('ja-JP'); }

  // 税計算（10%税込 → 税抜/税）
  function calcTax(total){
    const net = Math.round(total / 1.1);
    const tax = total - net;
    return { net, tax, total };
  }

  function setStatus(kind, text){
    statusChip.classList.remove('warn','ok');
    statusChip.classList.add(kind);
    statusChip.textContent = text;
  }

  // ROI切り抜き → 画像(強調)をJPEG base64に
  function captureROIBase64(){
    const vw = video.videoWidth;
    const vh = video.videoHeight;
    if (!vw || !vh) return null;

    // video要素の表示領域（object-fit:cover）を逆算
    const dw = window.innerWidth;
    const dh = window.innerHeight;
    const videoAspect = vw / vh;
    const displayAspect = dw / dh;

    let sx=0, sy=0, sw=vw, sh=vh;
    if (displayAspect > videoAspect) {
      // 横に広い → 上下が切れる
      const shownH = vw / displayAspect;
      sy = (vh - shownH) / 2;
      sh = shownH;
    } else {
      // 縦に長い → 左右が切れる
      const shownW = vh * displayAspect;
      sx = (vw - shownW) / 2;
      sw = shownW;
    }

    // ROI（画面比率）→ video座標へ
    const rx = sx + sw * ROI.x;
    const ry = sy + sh * ROI.y;
    const rw = sw * ROI.w;
    const rh = sh * ROI.h;

    // アップスケールして描画
    const outW = Math.max(1, Math.round(rw * UPSCALE));
    const outH = Math.max(1, Math.round(rh * UPSCALE));
    canvas.width = outW;
    canvas.height = outH;

    // まずコントラスト強めで描く
    ctx.save();
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.filter = 'contrast(1.65) brightness(1.05) saturate(0.9)';
    ctx.drawImage(video, rx, ry, rw, rh, 0, 0, outW, outH);
    ctx.restore();

    // グレースケール + 軽い二値化（数字強調）
    const img = ctx.getImageData(0, 0, outW, outH);
    const d = img.data;

    // 明るさ基準で閾値を雑に計算
    let sum = 0;
    for (let i=0;i<d.length;i+=4){
      const g = (d[i]*0.299 + d[i+1]*0.587 + d[i+2]*0.114);
      sum += g;
    }
    const mean = sum / (d.length/4);
    const th = Math.min(210, Math.max(90, mean * 0.92)); // 自動閾値（ざっくり）

    for (let i=0;i<d.length;i+=4){
      const g = (d[i]*0.299 + d[i+1]*0.587 + d[i+2]*0.114);
      const v = (g > th) ? 255 : 0;
      d[i]=d[i+1]=d[i+2]=v;
      d[i+3]=255;
    }
    ctx.putImageData(img, 0, 0);

    // シャープネス判定（近すぎ/ブレ検出）
    const sharp = calcSharpness(img);
    return { base64: canvas.toDataURL('image/jpeg', 0.92).split(',')[1], sharp };
  }

  // ざっくりLaplacianでシャープネス（分散）
  function calcSharpness(imageData){
    const { width:w, height:h, data } = imageData;
    // 速くするために 2px 間引き
    const step = 2;
    const lap = [];
    for(let y=1; y<h-1; y+=step){
      for(let x=1; x<w-1; x+=step){
        const idx = (y*w + x)*4;
        const c = data[idx]; // 二値化後なのでRだけでOK
        const up = data[((y-1)*w + x)*4];
        const dn = data[((y+1)*w + x)*4];
        const lf = data[(y*w + (x-1))*4];
        const rt = data[(y*w + (x+1))*4];
        // Laplacian
        const v = (4*c - up - dn - lf - rt);
        lap.push(v);
      }
    }
    if (!lap.length) return 0;
    let mean = 0;
    for (const v of lap) mean += v;
    mean /= lap.length;
    let vari = 0;
    for (const v of lap){
      const dv = v - mean;
      vari += dv*dv;
    }
    vari /= lap.length;
    return vari; // 大きいほどシャープ
  }

  async function callOCR(image_base64){
    const r = await fetch('/api/scan', {
      method:'POST',
      headers:{'content-type':'application/json'},
      body: JSON.stringify({ image_base64 })
    });
    return await r.json().catch(()=>({ total:0, text:"", debug:{where:"client", message:"json parse failed"} }));
  }

  function applyResult(total){
    const n = Number(total)||0;
    const { net, tax } = calcTax(n);

    lastTotal = n;
    sumEl.textContent = '¥' + fmt(n);
    netEl.textContent = '¥' + fmt(net);
    taxEl.textContent = '¥' + fmt(tax);
  }

  function addInvoice(total){
    invoiceCount += 1;
    grandTotal += total;
    history.push({ total, ts: Date.now() });
    countEl.textContent = String(invoiceCount);
    grandEl.textContent = fmt(grandTotal);
  }

  function undo(){
    const last = history.pop();
    if (!last) return;
    invoiceCount = Math.max(0, invoiceCount-1);
    grandTotal = Math.max(0, grandTotal - last.total);
    countEl.textContent = String(invoiceCount);
    grandEl.textContent = fmt(grandTotal);
  }

  function resetToday(){
    history.length = 0;
    invoiceCount = 0;
    grandTotal = 0;
    countEl.textContent = "0";
    grandEl.textContent = "0";
    sumEl.textContent = "—";
    netEl.textContent = "—";
    taxEl.textContent = "—";
    lastTotal = 0;
  }

  autoBtn.addEventListener('click', ()=>{
    auto = !auto;
    autoBtn.textContent = auto ? 'AUTO: ON' : 'AUTO: OFF';
  });
  undoBtn.addEventListener('click', undo);
  todayBtn.addEventListener('click', resetToday);

  // メインループ
  async function loop(){
    if (!auto || scanning) return;

    const cap = captureROIBase64();
    if (!cap) return;

    const { base64, sharp } = cap;

    // シャープネス不足 → 送らずに案内（たかちんの「離すと読めた」をシステム化）
    if (sharp < SHARPNESS_TH) {
      setStatus('warn', `⚠️ ピントが甘い（少し離して）`);
      debugLine.textContent = `SHARP: ${Math.round(sharp)} < ${SHARPNESS_TH} / skip`;
      return;
    }

    scanning = true;
    try{
      const j = await callOCR(base64);
      const total = Number(j.total)||0;

      // デバッグ表示
      debugLine.textContent = `OCR: "${String(j.text||"").slice(0,60)}" → ${total}` + (j.debug ? ` / ${JSON.stringify(j.debug)}` : "");

      if (total > 0){
        setStatus('ok', `✅ 確定：¥${fmt(total)}（次で自動解除）`);
        applyResult(total);
        addInvoice(total);

        // 1回読めたら自動解除（誤連発防止）
        auto = false;
        autoBtn.textContent = 'AUTO: OFF';
      } else {
        setStatus('warn', '⚠️ 枠に数字が見えていません');
      }
    } finally {
      scanning = false;
    }
  }

  // 起動
  (async ()=>{
    try{
      await startCamera();
      setStatus('warn', '⚠️ 枠に数字が見えていません');
      setInterval(loop, INTERVAL_MS);
    } catch(e){
      setStatus('warn', '⚠️ カメラ起動に失敗（権限OK？）');
      debugLine.textContent = String(e?.message || e);
    }
  })();
})();
</script>
</body>
</html>
