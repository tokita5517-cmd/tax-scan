<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>請求書スキャン（数字→税抜/税/税込）</title>
  <style>
    :root{
      --accent:#f0c040;
      --red:#ff5f5f;
      --border:rgba(255,255,255,.14);
      --surface:rgba(10,10,10,.82);
      --glass:rgba(0,0,0,.65);
      --ok:#4fd48a;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans JP",system-ui,sans-serif;overflow:hidden}

    #video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
    #cap{display:none}

    #roiBox{
      position:fixed;
      left:50%; top:45%;
      transform:translate(-50%,-50%);
      width:min(56vw,340px);
      height:min(12vw,78px);
      border:2px solid rgba(240,192,64,.70);
      border-radius:14px;
      z-index:50;
      pointer-events:none;
      box-shadow:0 0 0 9999px rgba(0,0,0,.22);
    }
    #roiLabel{
      position:absolute; top:-28px; left:0;
      font-size:12px; letter-spacing:.08em;
      color:rgba(255,255,255,.78);
      background:rgba(0,0,0,.55);
      border:1px solid var(--border);
      padding:5px 10px;
      border-radius:999px;
      backdrop-filter:blur(10px);
    }

    #topBar{
      position:fixed; top:12px; left:12px; right:12px;
      z-index:60;
      display:flex; gap:8px; align-items:center; justify-content:space-between;
      flex-wrap:wrap;
    }
    .pill{
      display:inline-flex; align-items:center; gap:8px;
      background:var(--glass);
      border:1px solid var(--border);
      border-radius:999px;
      padding:10px 12px;
      font-size:12px;
      backdrop-filter:blur(10px);
      white-space:nowrap;
    }
    .pill b{font-size:13px;color:var(--accent)}
    #status{color:rgba(255,255,255,.9); cursor:pointer}
    #status.err{color:var(--red); border-color:rgba(255,95,95,.5)}
    #status.ok{color:rgba(79,212,138,.95); border-color:rgba(79,212,138,.45)}
    #status.scan{color:var(--accent); border-color:rgba(240,192,64,.6)}

    #panel{
      position:fixed; left:0; right:0; bottom:0;
      z-index:55;
      padding:12px 12px 18px;
      background:linear-gradient(to top, rgba(0,0,0,.96) 72%, rgba(0,0,0,.25));
    }
    .card{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:16px;
      overflow:hidden;
      backdrop-filter:blur(16px);
    }
    .row{
      display:flex; justify-content:space-between; align-items:baseline;
      padding:12px 14px;
      border-bottom:1px solid rgba(255,255,255,.10);
    }
    .row:last-child{border-bottom:none}
    .label{font-size:11px;color:rgba(255,255,255,.55);letter-spacing:.08em}
    .val{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;font-weight:800;font-size:18px}
    .val.red{color:var(--red)}
    .row.total{background:rgba(240,192,64,.08)}
    .row.total .label{color:var(--accent);font-weight:800}
    .row.total .val{color:var(--accent);font-size:26px}

    .controls{ margin-top:10px; display:flex; gap:10px; }
    button{ border:none; border-radius:14px; padding:14px 12px; font-weight:900; font-size:15px; cursor:pointer; }
    #btnAuto{flex:1;background:var(--accent);color:#000}
    #btnAuto.off{background:rgba(255,255,255,.10);color:#fff;border:1px solid var(--border)}
    #btnUndo{background:rgba(255,255,255,.10);color:#fff;border:1px solid var(--border)}
    #btnResetToday{background:#333;color:#fff}

    #btnDetails{
      width:100%; margin-top:10px;
      background:rgba(255,255,255,.10);
      border:1px solid var(--border);
      color:#fff; padding:12px 12px; border-radius:14px; font-weight:900;
    }
    #details{ margin-top:10px; display:none; }
    #details.show{display:block}
    .muted{color:rgba(255,255,255,.6);font-size:12px;margin:6px 0 0}

    #debugBar{
      position:fixed; bottom:0; left:0; right:0;
      z-index:100;
      font-size:10px;
      color:rgba(255,255,255,.35);
      text-align:center;
      padding:2px 8px;
      pointer-events:none;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    #startOverlay{
      position:fixed; inset:0;
      z-index:80;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.55);
      backdrop-filter: blur(10px);
    }
    #startOverlay.show{display:flex}
    #btnStartCam{
      width:min(86vw,420px);
      padding:18px 16px;
      border-radius:18px;
      font-size:18px;
      font-weight:1000;
      background:var(--accent);
      color:#000;
    }
    #startHint{
      position:absolute;
      top:22px; left:12px; right:12px;
      text-align:center;
      font-size:12px;
      color:rgba(255,255,255,.8);
    }
  </style>
</head>
<body>
  <video id="video" autoplay muted playsinline></video>
  <canvas id="cap"></canvas>

  <div id="roiBox">
    <div id="roiLabel">黄色枠に「数字」を入れたらホールド</div>
  </div>

  <div id="topBar">
    <div id="status" class="pill" title="タップでカメラ開始/再開">📷 準備中…（タップで開始）</div>
    <div class="pill">請求書: <b id="invoiceCount">0</b>枚</div>
    <div class="pill">総合計: <b id="grandTotal">¥0</b></div>
  </div>

  <div id="panel">
    <div class="card">
      <div class="row">
        <div class="label">税抜（逆算）</div>
        <div class="val" id="baseVal">—</div>
      </div>
      <div class="row">
        <div class="label">消費税（10%・四捨五入）</div>
        <div class="val red" id="taxVal">—</div>
      </div>
      <div class="row total">
        <div class="label">合計（税込）</div>
        <div class="val" id="totalVal">—</div>
      </div>
    </div>

    <div class="controls">
      <button id="btnAuto">AUTO: ON</button>
      <button id="btnUndo">↩︎ 直近</button>
      <button id="btnResetToday">⟲ 今日</button>
    </div>

    <button id="btnDetails">▼ 詳細（履歴・グラフ）を開く</button>
    <div id="details"></div>

    <div class="muted" style="margin-top:10px">
      ※iPhoneで止まったら、左上「📷」バッジをタップで再開
    </div>
  </div>

  <div id="debugBar"></div>

  <div id="startOverlay">
    <div id="startHint">iPhone Safariは最初にタップが必要なことがあるよ</div>
    <button id="btnStartCam">カメラ開始</button>
  </div>

<script>
(() => {
  const RATE = 0.10;
  const CONFIRM_N = 2;
  const UNLOCK_N  = 2;
  const TICK_MS   = 800;

  const video  = document.getElementById('video');
  const cap    = document.getElementById('cap');
  const ctx    = cap.getContext('2d');
  const roiBox = document.getElementById('roiBox');

  const statusEl = document.getElementById('status');
  const baseVal  = document.getElementById('baseVal');
  const taxVal   = document.getElementById('taxVal');
  const totalVal = document.getElementById('totalVal');

  const invoiceCountEl = document.getElementById('invoiceCount');
  const grandTotalEl   = document.getElementById('grandTotal');
  const debugBar       = document.getElementById('debugBar');

  const btnAuto       = document.getElementById('btnAuto');
  const btnUndo       = document.getElementById('btnUndo');
  const btnResetToday = document.getElementById('btnResetToday');

  const startOverlay = document.getElementById('startOverlay');
  const btnStartCam  = document.getElementById('btnStartCam');

  let stream = null;
  let autoOn = true;

  let locked = false;
  let lockedTotal = null;

  let lastCandidate = null;
  let stableCount   = 0;
  let unlockCount   = 0;

  let scanning    = false;
  let timer       = null;
  let cameraReady = false;

  const yen = (n) => `¥${Number(n||0).toLocaleString('ja-JP')}`;

  function setStatus(kind, text){
    statusEl.classList.remove('err','ok','scan');
    if(kind) statusEl.classList.add(kind);
    statusEl.textContent = text;
  }
  function setDebug(t){ debugBar.textContent = t || ""; }

  function splitFromTotal(total){
    const approx = Math.round(total / (1 + RATE));
    for(let d=-5; d<=5; d++){
      const base = approx + d;
      const tax  = Math.round(base * RATE);
      if(base + tax === total) return { base, tax, total };
    }
    const base = approx;
    return { base, tax: total - base, total };
  }

  async function startCamera(){
    try{
      setStatus('scan','📷 カメラ起動中…');
      startOverlay.classList.remove('show');

      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal:'environment' }, width: { ideal: 1920 } },
        audio: false
      });
      video.srcObject = stream;

      try{ await video.play(); }
      catch(_){
        startOverlay.classList.add('show');
        setStatus('err','⚠️ タップしてカメラ開始');
        return;
      }

      cameraReady = true;
      setStatus('ok','✅ 準備OK（黄色枠に数字）');
    }catch(e){
      console.error(e);
      cameraReady = false;
      setStatus('err','❌ カメラ許可が必要（Safariのサイト設定）');
      startOverlay.classList.add('show');
    }
  }

  // ★ここが効く：黄色枠の位置をそのまま切り抜き → 8倍拡大 → 二値化
  function captureROI(){
    const vw = video.videoWidth  || 1280;
    const vh = video.videoHeight || 720;

    const vr = video.getBoundingClientRect();
    const rr = roiBox.getBoundingClientRect();

    const scale = Math.max(vr.width / vw, vr.height / vh);
    const dispW = vw * scale;
    const dispH = vh * scale;
    const offX  = (vr.width  - dispW) / 2;
    const offY  = (vr.height - dispH) / 2;

    let sx = (rr.left - vr.left - offX) / scale;
    let sy = (rr.top  - vr.top  - offY) / scale;
    let sw = rr.width  / scale;
    let sh = rr.height / scale;

    // 少し余白（数字が枠ギリでも拾う）
    const PAD = 0.18;
    sx -= sw * PAD; sy -= sh * PAD;
    sw *= (1 + PAD*2); sh *= (1 + PAD*2);

    sx = Math.max(0, Math.min(vw-1, sx));
    sy = Math.max(0, Math.min(vh-1, sy));
    sw = Math.max(1, Math.min(vw - sx, sw));
    sh = Math.max(1, Math.min(vh - sy, sh));

    const SCALE = 8;             // ★小さい数字用に8倍
    cap.width  = Math.floor(sw * SCALE);
    cap.height = Math.floor(sh * SCALE);

    ctx.imageSmoothingEnabled = false;
    ctx.filter = "grayscale(100%) contrast(260%) brightness(120%)";
    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, cap.width, cap.height);
    ctx.filter = "none";

    // 二値化（白黒くっきり）
    const img = ctx.getImageData(0,0,cap.width,cap.height);
    const d = img.data;
    // 固定しきい値（安定版）※暗ければ数字が黒で残る
    const TH = 170;
    for(let i=0;i<d.length;i+=4){
      const v = d[i]; // 既にグレースケール寄り
      const b = (v > TH) ? 255 : 0;
      d[i]=d[i+1]=d[i+2]=b;
      d[i+3]=255;
    }
    ctx.putImageData(img,0,0);

    return cap.toDataURL('image/jpeg', 0.95).split(',')[1];
  }

  async function recognize(){
    const img = captureROI();
    const res = await fetch('/api/scan', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ image_base64: img })
    });
    const data = await res.json().catch(()=> ({}));
    return {
      total: Number(data?.total || 0),
      text: String(data?.text || ""),
      debug: data?.debug || ""
    };
  }

  function showResult(r){
    baseVal.textContent  = yen(r.base);
    taxVal.textContent   = yen(r.tax);
    totalVal.textContent = yen(r.total);
  }

  function onDetected(det){
    const total = det.total || 0;

    if(!total){
      if(!locked) setStatus('err','⚠️ 枠に数字が見えていません');
      stableCount = 0;
      lastCandidate = null;
      return;
    }

    if(locked){
      if(total !== lockedTotal){
        unlockCount++;
        if(unlockCount >= UNLOCK_N){
          locked = false;
          lockedTotal = null;
          unlockCount = 0;
          stableCount = 1;
          lastCandidate = total;
          setStatus('scan','📄 次の請求書を検出…');
        }
      }else{
        unlockCount = 0;
      }
      return;
    }

    if(total === lastCandidate) stableCount++;
    else { lastCandidate = total; stableCount = 1; }

    setStatus('scan',`🔍 認識中…（${stableCount}/${CONFIRM_N}）`);

    if(stableCount >= CONFIRM_N){
      locked = true;
      lockedTotal = total;
      unlockCount = 0;

      const r = splitFromTotal(total);
      showResult(r);
      setStatus('ok',`✅ 確定：${yen(total)}（次の紙で自動解除）`);
    }
  }

  async function tick(){
    if(!autoOn || scanning || !cameraReady) return;
    scanning = true;
    try{
      const det = await recognize();
      setDebug(`OCR:"${(det.text||"").slice(0,40)}" → ${det.total} ${det.debug ? " / "+det.debug : ""}`);
      onDetected(det);
    }catch(e){
      console.error(e);
      if(!locked) setStatus('err','❌ 通信/認識エラー');
    }finally{
      scanning = false;
    }
  }

  function startLoop(){ stopLoop(); timer = setInterval(tick, TICK_MS); }
  function stopLoop(){ if(timer){ clearInterval(timer); timer = null; } }

  function setAuto(on){
    autoOn = on;
    btnAuto.textContent = on ? "AUTO: ON" : "AUTO: OFF";
    btnAuto.classList.toggle('off', !on);
    setStatus('ok', on ? '✅ AUTO ON' : '⏸ AUTO OFF');
  }

  btnAuto.addEventListener('click', () => setAuto(!autoOn));
  btnUndo.addEventListener('click', () => {});
  btnResetToday.addEventListener('click', () => {});

  statusEl.addEventListener('click', () => startCamera());
  btnStartCam.addEventListener('click', () => startCamera());

  window.addEventListener('load', async () => {
    await startCamera();
    startLoop();
  });
})();
</script>
</body>
</html>
