<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>請求書スキャン（税抜→税/税込）</title>
  <style>
    :root{
      --accent:#f0c040;
      --red:#ff5f5f;
      --border:rgba(255,255,255,.12);
      --glass:rgba(0,0,0,.38);
      --panel:rgba(10,10,10,.82);
      --ok:#4fd48a;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      margin:0;padding:0;background:#000;color:#fff;
      font-family:-apple-system,BlinkMacSystemFont,"Noto Sans JP",system-ui,sans-serif;
      overflow:hidden;
    }

    #video{
      position:fixed; inset:0;
      width:100%; height:100%;
      object-fit:cover;
      z-index:0;
      background:#000;
    }
    #cap{display:none}

    /* ===== 上バー ===== */
    #topStack{
      position:fixed;
      top:12px; left:12px; right:12px;
      z-index:60;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .banner,.pill{
      border-radius:999px;
      backdrop-filter:blur(14px);
      border:1px solid var(--border);
      background:var(--glass);
    }
    .banner{
      min-height:58px;
      display:flex;
      align-items:center;
      gap:10px;
      padding:12px 16px;
      font-size:17px;
      font-weight:1000;
      color:rgba(255,255,255,.96);
      border-color:rgba(255,95,95,.24);
      background:rgba(120,0,0,.32);
    }
    .banner.ok{
      border-color:rgba(79,212,138,.28);
      background:rgba(0,90,30,.26);
    }
    .banner.dim{
      border-color:var(--border);
      background:var(--glass);
    }

    .pill{
      min-height:64px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:12px 18px;
    }
    .pill .left,.pill .mid,.pill .right{
      line-height:1;
      font-weight:1000;
      color:rgba(255,255,255,.96);
    }
    .pill .left{font-size:20px}
    .pill .mid{font-size:23px}
    .pill .right{font-size:20px}
    .money{
      line-height:1;
      font-size:28px;
      font-weight:1000;
      color:var(--accent);
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
    }

    /* ===== 黄色枠 + シャッター ===== */
    #roiBox{
      position:fixed;
      left:12px;
      right:98px;     /* シャッターボタン分を空ける */
      top:226px;      /* 上バーの下 */
      height:62px;    /* 高さを少し狭く */
      z-index:56;
      border:3px solid rgba(240,192,64,.82);
      border-radius:18px;
      background:rgba(0,0,0,.03);
      pointer-events:none;
    }
    #roiBox.flash-ok{
      animation:roiFlash .72s ease-out;
    }
    @keyframes roiFlash{
      0%{
        border-color:rgba(79,212,138,.96);
        background:rgba(79,212,138,.16);
        box-shadow:0 0 18px rgba(79,212,138,.35);
      }
      100%{
        border-color:rgba(240,192,64,.82);
        background:rgba(0,0,0,.03);
        box-shadow:none;
      }
    }

    #tapRoi{
      position:fixed;
      left:12px;
      right:98px;
      top:226px;
      height:62px;
      z-index:57;
      border:none;
      background:transparent;
      border-radius:18px;
      padding:0;
      margin:0;
      cursor:pointer;
    }

    #shutter{
      position:fixed;
      right:12px;
      top:220px;
      width:74px;
      height:74px;
      z-index:57;
      border-radius:999px;
      border:3px solid rgba(255,255,255,.56);
      background:rgba(255,255,255,.12);
      box-shadow:0 8px 22px rgba(0,0,0,.28);
      cursor:pointer;
      padding:0;
    }
    #shutter::after{
      content:"";
      position:absolute;
      inset:0;
      margin:auto;
      width:40px;
      height:40px;
      border-radius:999px;
      background:rgba(255,255,255,.20);
    }
    #shutter:active{transform:scale(.97)}

    /* ===== 下パネル ===== */
    #panel{
      position:fixed;
      left:12px; right:12px;
      top:304px;      /* 黄色枠の下から開始 */
      bottom:88px;
      z-index:50;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .card{
      flex:0 0 auto;
      background:var(--panel);
      border:1px solid rgba(255,255,255,.10);
      border-radius:18px;
      overflow:hidden;
      backdrop-filter:blur(16px);
    }
    .row{
      min-height:82px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:12px 18px;
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    .row:last-child{border-bottom:none}
    .label{
      font-size:22px;
      font-weight:1000;
      line-height:1.2;
      color:rgba(255,255,255,.95);
    }
    .sub{
      font-size:16px;
      font-weight:900;
      color:rgba(255,255,255,.82);
      margin-left:6px;
    }
    .val{
      font-size:32px;
      line-height:1;
      font-weight:1000;
      white-space:nowrap;
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
    }
    .val.dim{color:rgba(255,255,255,.92)}
    .val.red{color:var(--red)}
    .val.gold{color:var(--accent)}

    .controls{
      display:flex;
      gap:12px;
      flex:0 0 auto;
    }
    .btn{
      min-height:82px;
      border:none;
      border-radius:18px;
      font-size:22px;
      font-weight:1000;
      cursor:pointer;
      flex:1;
    }
    #btnAuto{
      max-width:150px;
      background:var(--accent);
      color:#000;
      line-height:1.05;
    }
    #btnAuto.off{
      background:rgba(255,255,255,.10);
      color:#fff;
      border:1px solid rgba(255,255,255,.10);
    }
    #btnUndo,#btnClear{
      background:rgba(255,255,255,.10);
      color:#fff;
      border:1px solid rgba(255,255,255,.10);
    }

    #btnDetails{
      min-height:68px;
      width:100%;
      border:none;
      border-radius:18px;
      background:rgba(255,255,255,.08);
      color:#fff;
      border:1px solid rgba(255,255,255,.10);
      font-size:20px;
      font-weight:1000;
      cursor:pointer;
      flex:0 0 auto;
    }

    #details{
      display:none;
      flex:1 1 auto;
      min-height:0;
    }
    #details.show{display:block}

    .section{
      height:100%;
      overflow:auto;
      background:rgba(10,10,10,.82);
      border:1px solid rgba(255,255,255,.10);
      border-radius:18px;
      padding:12px;
      backdrop-filter:blur(12px);
    }
    .section h3{
      margin:0 0 10px;
      font-size:15px;
      font-weight:1000;
      color:rgba(255,255,255,.82);
      display:flex;
      align-items:center;
      justify-content:space-between;
    }
    #dateRow{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
      margin-bottom:10px;
    }
    input[type="date"]{
      background:rgba(255,255,255,.10);
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
      border-radius:12px;
      padding:10px;
      font-weight:900;
    }
    .miniBtn{
      border:none;
      border-radius:12px;
      padding:10px 12px;
      background:rgba(255,255,255,.10);
      color:#fff;
      border:1px solid rgba(255,255,255,.10);
      font-size:14px;
      font-weight:1000;
      cursor:pointer;
    }

    #logList{
      max-height:220px;
      overflow:auto;
    }
    .logItem{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 6px;
      border-top:1px solid rgba(255,255,255,.08);
      font-size:15px;
    }
    .logItem:first-child{border-top:none}
    .logLeft{display:flex;align-items:center;gap:8px}
    .logRight{
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
      font-weight:1000;
    }
    .logRight b{color:var(--accent)}

    #btnDeleteSelected{
      margin-top:10px;
      width:100%;
      min-height:48px;
      border:none;
      border-radius:14px;
      background:rgba(255,255,255,.10);
      color:#fff;
      border:1px solid rgba(255,255,255,.10);
      font-size:15px;
      font-weight:1000;
      cursor:pointer;
    }

    #tinyHint{
      flex:0 0 auto;
      font-size:12px;
      text-align:center;
      color:rgba(255,255,255,.72);
    }

    @media (max-height:760px){
      #topStack{gap:7px}
      .banner{min-height:54px;font-size:16px}
      .pill{min-height:60px}
      .pill .left,.pill .right{font-size:18px}
      .pill .mid{font-size:21px}
      .money{font-size:25px}

      #roiBox,#tapRoi{top:214px;height:56px}
      #shutter{top:208px;width:68px;height:68px}
      #shutter::after{width:36px;height:36px}

      #panel{top:282px}
      .row{min-height:74px}
      .label{font-size:20px}
      .sub{font-size:14px}
      .val{font-size:28px}
      .btn{min-height:74px;font-size:20px}
      #btnDetails{min-height:62px;font-size:18px}
    }
  </style>
</head>
<body>
  <video id="video" autoplay muted playsinline></video>
  <canvas id="cap"></canvas>

  <div id="topStack">
    <div id="banner" class="banner dim">⚠️ 枠に数字が見えていません</div>

    <div class="pill">
      <div class="left">請求書：</div>
      <div class="mid" id="invoiceCount">0</div>
      <div class="right">枚</div>
    </div>

    <div class="pill">
      <div class="left">総合計（税抜）：</div>
      <div class="money" id="grandTotal">¥0</div>
    </div>
  </div>

  <div id="roiBox"></div>
  <button id="tapRoi" aria-label="枠タップで読み取り"></button>
  <button id="shutter" aria-label="シャッターで読み取り"></button>

  <div id="panel">
    <div class="card">
      <div class="row">
        <div><span class="label">税抜</span></div>
        <div class="val dim" id="baseVal">—</div>
      </div>
      <div class="row">
        <div><span class="label">消費税</span><span class="sub">（10%・四捨五入）</span></div>
        <div class="val red" id="taxVal">—</div>
      </div>
      <div class="row">
        <div><span class="label">合計</span><span class="sub">（税込）</span></div>
        <div class="val gold" id="totalVal">—</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn" id="btnAuto">AUTO<br>ON</button>
      <button class="btn" id="btnUndo">↩︎ 直近</button>
      <button class="btn" id="btnClear">-</button>
    </div>

    <button id="btnDetails">▼ 詳細（履歴）を開く</button>

    <div id="details">
      <div class="section">
        <h3>日付別（履歴・削除） <span id="dayInfo"></span></h3>
        <div id="dateRow">
          <button class="miniBtn" id="btnPrevDay">←</button>
          <input type="date" id="datePick">
          <button class="miniBtn" id="btnNextDay">→</button>
          <button class="miniBtn" id="btnSelectAll">全選択</button>
          <button class="miniBtn" id="btnClearSel">解除</button>
        </div>
        <div id="logList"></div>
        <button id="btnDeleteSelected">☑ 選んで削除（重複・誤読）</button>
      </div>
    </div>

    <div id="tinyHint">※iPhoneで止まったら、Safariの「aA→サイトの設定→カメラ：許可」を確認</div>
  </div>

<script>
(() => {
  const RATE = 0.10;
  const TICK_MS = 420;
  const COOLDOWN_MS = 900;
  const SAME_VALUE_GUARD_MS = 2400;

  const video = document.getElementById('video');
  const cap = document.getElementById('cap');
  const ctx = cap.getContext('2d');

  const banner = document.getElementById('banner');
  const invoiceCountEl = document.getElementById('invoiceCount');
  const grandTotalEl = document.getElementById('grandTotal');

  const roiBox = document.getElementById('roiBox');
  const tapRoi = document.getElementById('tapRoi');
  const shutter = document.getElementById('shutter');

  const baseVal = document.getElementById('baseVal');
  const taxVal = document.getElementById('taxVal');
  const totalVal = document.getElementById('totalVal');

  const btnAuto = document.getElementById('btnAuto');
  const btnUndo = document.getElementById('btnUndo');
  const btnClear = document.getElementById('btnClear');

  const btnDetails = document.getElementById('btnDetails');
  const details = document.getElementById('details');

  const datePick = document.getElementById('datePick');
  const btnPrevDay = document.getElementById('btnPrevDay');
  const btnNextDay = document.getElementById('btnNextDay');
  const btnSelectAll = document.getElementById('btnSelectAll');
  const btnClearSel = document.getElementById('btnClearSel');
  const btnDeleteSelected = document.getElementById('btnDeleteSelected');
  const logList = document.getElementById('logList');
  const dayInfo = document.getElementById('dayInfo');

  let stream = null;
  let cameraReady = false;
  let autoOn = true;
  let scanning = false;
  let timer = null;
  let lastScanAt = 0;
  let lastCountedValue = null;
  let lastCountedAt = 0;
  let currentBase = 0;

  const pad2 = (n) => String(n).padStart(2,'0');
  const todayStr = () => {
    const d = new Date();
    return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
  };
  const yen = (n) => `¥${Number(n || 0).toLocaleString('ja-JP')}`;

  function setBanner(type, text){
    banner.classList.remove('ok','dim');
    if (type === 'ok') banner.classList.add('ok');
    else banner.classList.add('dim');
    banner.textContent = text;
  }

  function vibrateShort(){
    try { if (navigator.vibrate) navigator.vibrate(28); } catch(_) {}
  }

  function flashROI(){
    roiBox.classList.remove('flash-ok');
    void roiBox.offsetWidth;
    roiBox.classList.add('flash-ok');
    setTimeout(() => roiBox.classList.remove('flash-ok'), 720);
  }

  function calcFromBase(base){
    const tax = Math.round(base * RATE);
    return { base, tax, total: base + tax };
  }

  function showCurrent(base){
    if (!base) {
      baseVal.textContent = "—";
      taxVal.textContent = "—";
      totalVal.textContent = "—";
      return;
    }
    const r = calcFromBase(base);
    baseVal.textContent = yen(r.base);
    taxVal.textContent = yen(r.tax);
    totalVal.textContent = yen(r.total);
  }

  function clearCurrentKeepTotals(){
    currentBase = 0;
    showCurrent(0);
    lastScanAt = 0;
    setBanner('ok', '✅ 表示だけ解除しました');
  }

  function setAuto(on){
    autoOn = on;
    btnAuto.classList.toggle('off', !on);
    btnAuto.innerHTML = on ? 'AUTO<br>ON' : 'AUTO<br>OFF';
    setBanner('dim', on ? '⚠️ 枠に数字が見えていません' : '⚠️ 手動：枠タップ or シャッター');
  }

  function logKey(dateStr){ return `taxscan_log_${dateStr}`; }

  function loadLog(dateStr){
    try { return JSON.parse(localStorage.getItem(logKey(dateStr)) || '[]'); }
    catch(_) { return []; }
  }

  function saveLog(dateStr, arr){
    localStorage.setItem(logKey(dateStr), JSON.stringify(arr));
  }

  function calcStats(dateStr){
    const log = loadLog(dateStr);
    const count = log.length;
    const sumBase = log.reduce((a, x) => a + (Number(x.base) || 0), 0);
    return { count, sumBase, log };
  }

  function setTopStats(dateStr){
    const { count, sumBase } = calcStats(dateStr);
    invoiceCountEl.textContent = String(count);
    grandTotalEl.textContent = yen(sumBase);
    dayInfo.textContent = `（${count}枚 / ${yen(sumBase)}）`;
  }

  function renderLog(dateStr){
    const { log } = calcStats(dateStr);
    if (!log.length) {
      logList.innerHTML = '<div style="opacity:.7;font-size:14px;padding:4px 2px">履歴なし</div>';
      return;
    }

    const rows = [...log].reverse().map((x, idxFromTop) => {
      const realIndex = log.length - 1 - idxFromTop;
      const b = Number(x.base) || 0;
      return `
        <div class="logItem">
          <div class="logLeft">
            <input type="checkbox" class="logChk" data-idx="${realIndex}">
            <div>${realIndex + 1}枚目</div>
          </div>
          <div class="logRight"><b>${yen(b)}</b></div>
        </div>
      `;
    }).join('');

    logList.innerHTML = rows;
  }

  function getSelectedIdx(){
    return [...document.querySelectorAll('.logChk')]
      .filter(c => c.checked)
      .map(c => Number(c.dataset.idx))
      .filter(n => Number.isFinite(n));
  }

  function selectAll(v){
    [...document.querySelectorAll('.logChk')].forEach(c => c.checked = v);
  }

  async function startCamera(){
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: 'environment' },
          width: { ideal: 1920 },
          height: { ideal: 1080 }
        },
        audio: false
      });
      video.srcObject = stream;
      await video.play();
      cameraReady = true;
    } catch (e) {
      console.error(e);
      cameraReady = false;
      setBanner('dim', '⚠️ カメラ許可が必要です');
    }
  }

  function captureROIBase64(){
    const vr = video.getBoundingClientRect();
    const rr = roiBox.getBoundingClientRect();

    const sx = Math.max(0, Math.round((rr.left - vr.left) / vr.width * video.videoWidth));
    const sy = Math.max(0, Math.round((rr.top - vr.top) / vr.height * video.videoHeight));
    const sw = Math.max(1, Math.round(rr.width / vr.width * video.videoWidth));
    const sh = Math.max(1, Math.round(rr.height / vr.height * video.videoHeight));

    const SCALE = 3;
    cap.width = Math.max(1, Math.round(sw * SCALE));
    cap.height = Math.max(1, Math.round(sh * SCALE));

    ctx.save();
    ctx.imageSmoothingEnabled = false;
    ctx.filter = 'grayscale(1) contrast(210%) brightness(125%)';
    ctx.clearRect(0, 0, cap.width, cap.height);
    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, cap.width, cap.height);
    ctx.restore();

    return cap.toDataURL('image/jpeg', 0.95).split(',')[1];
  }

  async function callOCR(){
    const image_base64 = captureROIBase64();
    const res = await fetch('/api/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image_base64 })
    });
    const data = await res.json().catch(() => ({}));
    return {
      total: Number(data?.total || 0),
      debug: data?.debug || ''
    };
  }

  function countInvoice(base){
    const now = Date.now();

    if (lastCountedValue === base && (now - lastCountedAt) < SAME_VALUE_GUARD_MS) {
      return;
    }

    currentBase = base;
    showCurrent(base);

    const ds = datePick.value;
    const log = loadLog(ds);
    log.push({ base });
    saveLog(ds, log);

    setTopStats(ds);
    renderLog(ds);

    flashROI();
    vibrateShort();
    setBanner('ok', `✅ 確定：${yen(base)}（税抜）`);

    lastCountedValue = base;
    lastCountedAt = now;
    lastScanAt = now;
  }

  async function scanOnce(){
    if (scanning) return;
    if (!cameraReady) return;

    const now = Date.now();
    if (now - lastScanAt < COOLDOWN_MS) return;

    scanning = true;
    try {
      const { total, debug } = await callOCR();

      if (total > 0) {
        countInvoice(total);
      } else {
        if (debug) console.log('OCR debug:', debug);
        setBanner('dim', '⚠️ 枠に数字が見えていません');
        lastScanAt = now;
      }
    } catch (e) {
      console.error(e);
      setBanner('dim', '⚠️ OCRエラー');
      lastScanAt = now;
    } finally {
      scanning = false;
    }
  }

  async function tick(){
    if (!autoOn) return;
    await scanOnce();
  }

  function startLoop(){
    stopLoop();
    timer = setInterval(tick, TICK_MS);
  }

  function stopLoop(){
    if (timer) {
      clearInterval(timer);
      timer = null;
    }
  }

  function undoLast(){
    const ds = datePick.value;
    const log = loadLog(ds);
    if (!log.length) return;

    log.pop();
    saveLog(ds, log);
    setTopStats(ds);
    renderLog(ds);
    setBanner('ok', '↩︎ 直近1件を取り消しました');
  }

  function deleteSelected(){
    const ds = datePick.value;
    const idxs = getSelectedIdx().sort((a,b) => b-a);
    if (!idxs.length) {
      setBanner('dim', '⚠️ 削除する項目を選んでね');
      return;
    }

    const log = loadLog(ds);
    for (const i of idxs) {
      if (i >= 0 && i < log.length) log.splice(i, 1);
    }
    saveLog(ds, log);
    setTopStats(ds);
    renderLog(ds);
    setBanner('ok', `✅ ${idxs.length}件削除しました`);
  }

  function shiftDate(days){
    const d = new Date(datePick.value + 'T00:00:00');
    d.setDate(d.getDate() + days);
    datePick.value = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    onDateChanged();
  }

  function onDateChanged(){
    setTopStats(datePick.value);
    renderLog(datePick.value);
  }

  window.addEventListener('load', async () => {
    datePick.value = todayStr();
    showCurrent(0);
    setTopStats(datePick.value);
    renderLog(datePick.value);

    await startCamera();
    setAuto(true);
    startLoop();
  });

  btnAuto.addEventListener('click', () => setAuto(!autoOn));
  btnUndo.addEventListener('click', undoLast);
  btnClear.addEventListener('click', clearCurrentKeepTotals);

  tapRoi.addEventListener('click', scanOnce);
  shutter.addEventListener('click', scanOnce);

  btnSelectAll.addEventListener('click', () => selectAll(true));
  btnClearSel.addEventListener('click', () => selectAll(false));
  btnDeleteSelected.addEventListener('click', deleteSelected);

  btnPrevDay.addEventListener('click', () => shiftDate(-1));
  btnNextDay.addEventListener('click', () => shiftDate(1));
  datePick.addEventListener('change', onDateChanged);

  btnDetails.addEventListener('click', () => {
    const open = !details.classList.contains('show');
    details.classList.toggle('show', open);
    btnDetails.textContent = open ? '▲ 詳細（履歴）を閉じる' : '▼ 詳細（履歴）を開く';
  });
})();
</script>
</body>
</html>
