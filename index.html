<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>tax-scan</title>
  <style>
    :root{
      --bg:#0b0d10;
      --surface:rgba(25,28,35,.78);
      --surface2:rgba(18,20,25,.88);
      --text:#e9edf6;
      --muted:#aab2c3;
      --accent:#f2c14f;
      --ok:#31d07d;
      --warn:#ff5a5f;
      --shadow:0 10px 30px rgba(0,0,0,.45);
      --radius:18px;
      --radius2:22px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", "Yu Gothic", "Meiryo", sans-serif;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;margin:0;background:#000;color:var(--text);font-family:var(--sans);}
    #app{position:fixed;inset:0;overflow:hidden;background:#000;}
    #video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000;}

    /* 重要：overlay/panel の重なり順を制御 */
    #overlay{position:absolute;inset:0;pointer-events:none;z-index:20;}
    #panel{position:absolute;left:0;right:0;bottom:0;z-index:10;}

    .pill{
      display:flex;align-items:center;gap:10px;
      padding:10px 14px;border-radius:999px;
      background:var(--surface);backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,.08);
      max-width: calc(100vw - 24px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pill b{font-weight:900;}
    .pill .yen{color:var(--accent);font-weight:900;}

    #topBar{
      position:absolute;top:14px;left:14px;right:14px;
      display:flex;gap:10px;align-items:center;justify-content:space-between;
      flex-wrap:wrap;
      pointer-events:auto;
      z-index:25;
    }

    @media (max-width: 480px){
      #topBar{
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
        left: 12px;
        right: 12px;
      }
      #topBar .pill{
        width: 100%;
        justify-content: space-between;
      }
    }

    #status{border:2px solid rgba(242,193,79,.0); cursor:pointer; user-select:none;}
    #status.warn{border-color: rgba(255,90,95,.55);}
    #status.ok{border-color: rgba(49,208,125,.55);}
    .okBadge{background: rgba(49,208,125,.18);border: 1px solid rgba(49,208,125,.45);}
    .warnBadge{background: rgba(255,90,95,.18);border: 1px solid rgba(255,90,95,.45);}

    /* ✅ 黄色枠：総合計の下〜税抜の上のスペースに寄せて上へ */
    #frame{
      position:absolute;left:50%;
      top:44%;
      transform:translate(-50%,-50%);
      width:min(78vw,520px);
      height:min(16vh,120px);
      border-radius:16px;
      border:4px solid rgba(242,193,79,.85);
      box-shadow: 0 0 0 2px rgba(0,0,0,.35) inset, 0 8px 28px rgba(0,0,0,.35);
      z-index:40;
      /* ✅ 手動タップ用 */
      pointer-events:auto;
    }
    #hint{
      position:absolute;left:50%;
      top:calc(44% - min(8vh,60px) - 18px);
      transform:translateX(-50%);
      font-size:14px;color:rgba(255,255,255,.9);
      background:rgba(0,0,0,.35);
      padding:6px 10px;border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(10px);
      z-index:40;
      pointer-events:none;
      user-select:none;
    }

    @media (max-width: 480px){
      #frame{ top:41%; height:min(15vh,110px); }
      #hint{ top:calc(41% - min(8vh,60px) - 18px); }
    }

    /* ✅ 確定合図：一瞬グリーン→黄色に戻る */
    @keyframes frameSuccess {
      0% {
        border-color: rgba(242,193,79,.85);
        box-shadow:
          0 0 0 2px rgba(0,0,0,.35) inset,
          0 8px 28px rgba(0,0,0,.35);
      }
      35% {
        border-color: rgba(49,208,125,1);
        box-shadow:
          0 0 0 2px rgba(0,0,0,.35) inset,
          0 8px 28px rgba(0,0,0,.35),
          0 0 0 8px rgba(49,208,125,.35),
          0 0 30px rgba(49,208,125,.8);
      }
      100% {
        border-color: rgba(242,193,79,.85);
        box-shadow:
          0 0 0 2px rgba(0,0,0,.35) inset,
          0 8px 28px rgba(0,0,0,.35);
      }
    }
    #frame.flash{
      animation: frameSuccess 280ms ease-out 1;
    }

    #panel{
      padding:14px 14px 18px;
      background:linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,.55) 30%, rgba(0,0,0,.78) 100%);
      pointer-events:auto;
    }
    #calc{
      background:var(--surface2);
      border:1px solid rgba(255,255,255,.08);
      border-radius: var(--radius2);
      padding:14px;
      box-shadow: var(--shadow);
      margin-bottom:12px;
    }
    .row{
      display:flex;align-items:center;justify-content:space-between;
      padding:12px 0;
      border-bottom:1px solid rgba(255,255,255,.08);
      font-size:18px;
    }
    .row:last-child{border-bottom:none;}
    .row .label{color:var(--muted);font-weight:650}
    .row .val{font-weight:900;font-size:26px;letter-spacing:.2px}
    .row.tax .val{color:var(--warn)}
    .row.total .label{color:var(--accent)}
    .row.total .val{color:var(--accent);font-size:40px}

    #controls{
      display:flex;gap:10px;align-items:center;
      margin-top:12px;
    }
    .btn{
      border:none;cursor:pointer;
      background:var(--accent);
      color:#111;
      font-weight:900;
      border-radius: 18px;
      padding:16px 18px;
      box-shadow: var(--shadow);
      font-size:22px;
      flex: 1;
      min-width: 0;
      user-select:none;
    }
    .btn:active{transform:scale(.99);opacity:.95}
    .btn.ghost{
      background: rgba(255,255,255,.10);
      color: var(--text);
      border: 1px solid rgba(255,255,255,.10);
      font-weight:850;
      flex: 0 0 auto;
      width: 132px;
      padding:16px 14px;
      font-size:20px;
    }

    /* ✅ 手動シャッター */
    .btn.shot{
      flex: 0 0 auto;
      width: 72px;
      padding: 16px 0;
      background: rgba(255,255,255,.10);
      color: var(--text);
      border: 1px solid rgba(255,255,255,.12);
      font-size: 22px;
    }
    .btn.shot:disabled{opacity:.45;cursor:not-allowed}

    #detailsBtn{
      width: 100%;
      margin-top:12px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.10);
      color: var(--text);
      font-weight:850;
      padding:16px;
      border-radius: 18px;
      font-size:20px;
    }
    #ocrText{
      text-align:center;
      font-family:var(--mono);
      color:rgba(255,255,255,.5);
      font-size:14px;
      margin-top:8px;
      user-select:text;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    #foot{
      text-align:center;
      font-size:14px;
      color:rgba(255,255,255,.6);
      margin-top:6px;
    }
  </style>
</head>
<body>
  <div id="app">
    <video id="video" autoplay playsinline muted></video>

    <div id="overlay">
      <div id="topBar">
        <div id="status" class="pill warnBadge" title="タップでカメラ再開">A: 準備中…</div>
        <div class="pill">請求書: <b id="billCount">0</b> 枚</div>
        <div class="pill">総合計: <b class="yen">¥<span id="grandTotal">0</span></b></div>
      </div>

      <div id="hint">黄色枠に「数字」を入れたらホールド（AUTO OFFは枠タップ/🔘）</div>
      <div id="frame" title="AUTO OFFならタップで1回スキャン"></div>
    </div>

    <div id="panel">
      <div id="calc">
        <div class="row">
          <div class="label">税抜（逆算）</div>
          <div class="val" id="net">-</div>
        </div>
        <div class="row tax">
          <div class="label">消費税（10%・四捨五入）</div>
          <div class="val" id="tax">-</div>
        </div>
        <div class="row total">
          <div class="label">合計（税込）</div>
          <div class="val" id="gross">-</div>
        </div>

        <div id="controls">
          <button id="btnAuto" class="btn" title="自動スキャン ON/OFF">AUTO: ON</button>
          <button id="btnShot" class="btn shot" title="手動で1回スキャン">🔘</button>
          <button id="btnUndo" class="btn ghost" title="直近の確定を取り消す（カウントに含めない）">↩︎ 直近</button>
          <button id="btnDash" class="btn ghost" title="表示だけ - に戻す（枚数・総合計はそのまま）">−</button>
        </div>
      </div>

      <button id="detailsBtn">▼ 詳細（履歴・グラフ）を開く</button>
      <div id="ocrText">OCR: "" → 0</div>
      <div id="foot">※iPhoneで止まったら、左上の「A:」をタップで再開</div>
    </div>
  </div>

  <script>
    // ====== DOM ======
    const video = document.getElementById('video');
    const statusPill = document.getElementById('status');
    const billCountEl = document.getElementById('billCount');
    const grandTotalEl = document.getElementById('grandTotal');

    const netEl = document.getElementById('net');
    const taxEl = document.getElementById('tax');
    const grossEl = document.getElementById('gross');
    const ocrText = document.getElementById('ocrText');

    const frameEl = document.getElementById('frame');

    const btnAuto = document.getElementById('btnAuto');
    const btnShot = document.getElementById('btnShot');
    const btnUndo = document.getElementById('btnUndo');
    const btnDash = document.getElementById('btnDash');
    const detailsBtn = document.getElementById('detailsBtn');

    // ====== 状態 ======
    let autoOn = true;

    // ホールド/安定判定（AUTO用）
    let locked = false;
    let lastValue = null;
    let lastSeenAt = 0;
    let stableCount = 0;

    // 調整
    const NEED_N = 3;             // AUTO確定に必要な連続一致回数
    const MAX_GAP_MS = 1200;      // 連続一致の許容間隔
    const LOOP_WAIT_MS = 220;     // OCR呼び出し間隔（負荷軽減）

    // ====== 日付（今は今日固定でOK） ======
    function todayStr(){
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const dd = String(d.getDate()).padStart(2,'0');
      return `${y}-${m}-${dd}`;
    }
    const datePick = { get value(){ return todayStr(); } };

    // ====== localStorage ログ ======
    function loadLog(ds){
      try{
        return JSON.parse(localStorage.getItem(`taxscan:${ds}`) || '[]');
      }catch(e){ return []; }
    }
    function saveLog(ds, log){
      localStorage.setItem(`taxscan:${ds}`, JSON.stringify(log));
    }
    function setTopStatsForDate(ds){
      const log = loadLog(ds);
      const sum = log.reduce((a,x)=>a + (Number(x.total)||0), 0);
      billCountEl.textContent = String(log.length);
      grandTotalEl.textContent = String(sum);
    }

    // ====== 表示 ======
    function setStatus(type, msg){
      statusPill.textContent = msg;
      statusPill.classList.remove('warn','ok','warnBadge','okBadge');
      if(type === 'ok'){
        statusPill.classList.add('ok','okBadge');
      }else{
        statusPill.classList.add('warn','warnBadge');
      }
    }
    function setAuto(on){
      autoOn = on;
      btnAuto.textContent = on ? 'AUTO: ON' : 'AUTO: OFF';
      // 手動ボタンはOFF時に目立つようにしてもいいが、今回は常に押せる
    }
    function fmtYen(n){
      try{ return '¥' + Number(n).toLocaleString('ja-JP'); }catch(e){ return '¥' + n; }
    }
    function showDash(){
      netEl.textContent = '-';
      taxEl.textContent = '-';
      grossEl.textContent = '-';
    }
    function showResult(total){
      if(!total || total <= 0){ showDash(); return; }
      const gross = Number(total);
      const net = Math.round(gross / 1.1);   // 四捨五入（要求どおり）
      const tax = gross - net;
      netEl.textContent = fmtYen(net);
      taxEl.textContent = fmtYen(tax);
      grossEl.textContent = fmtYen(gross);
    }

    function flashAndVibrate(){
      if (frameEl) {
        frameEl.classList.remove('flash');
        void frameEl.offsetWidth;
        frameEl.classList.add('flash');
      }
      if (navigator.vibrate) navigator.vibrate(40);
    }

    // ====== 表示だけリセット（枚数・総合計・履歴は触らない） ======
    function clearToDash(){
      locked = false;
      stableCount = 0;
      lastValue = null;
      lastSeenAt = 0;
      ocrText.textContent = 'OCR: "" → 0';
      showDash();
      setStatus('ok','− 表示をリセット（枚数・総合計はそのまま）');
    }

    // ====== 直近取り消し（カウントから除外） ======
    function undoLast(){
      const ds  = datePick.value;
      const log = loadLog(ds);
      if(!log.length){
        clearToDash();
        return;
      }
      log.pop();
      saveLog(ds, log);
      setTopStatsForDate(ds);

      // 次も読めるように解除（AUTO状態は維持）
      locked = false;
      stableCount = 0;
      lastValue = null;
      lastSeenAt = 0;

      setStatus('ok','↩︎ 直近を取り消し（カウントから除外）');
    }

    // ====== 確定（AUTO/手動 共通） ======
    function commitTotal(total){
      locked = true;

      const ds = datePick.value;
      const log = loadLog(ds);
      log.push({ ts: Date.now(), total: Number(total) });
      saveLog(ds, log);

      setTopStatsForDate(ds);
      showResult(total);

      flashAndVibrate();
      setStatus('ok', `✅ 確定: ¥${Number(total).toLocaleString('ja-JP')}`);

      // 次のスキャンへ戻す（AUTO連続）
      setTimeout(()=>{
        locked = false;
        stableCount = 0;
        lastValue = null;
        lastSeenAt = 0;
      }, 650);
    }

    // ====== カメラ ======
    async function startCamera(){
      try{
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' },
          audio: false
        });
        video.srcObject = stream;
        setStatus('ok', autoOn ? 'A: AUTOで監視中' : 'A: 手動モード（枠/🔘）');
      }catch(e){
        alert('カメラを起動できません: ' + e.message);
        setStatus('warn','A: カメラ許可が必要');
      }
    }

    // ====== 枠部分を切り抜いて /api/scan ======
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    function cropFrameToBlob(){
      const vw = video.videoWidth, vh = video.videoHeight;
      if(!vw || !vh) return null;

      const frame = frameEl.getBoundingClientRect();
      const vrect = video.getBoundingClientRect();

      // object-fit: cover補正
      const videoAspect = vw / vh;
      const rectAspect = vrect.width / vrect.height;
      let drawW, drawH, offX, offY;
      if(videoAspect > rectAspect){
        drawH = vh;
        drawW = vh * rectAspect;
        offX = (vw - drawW) / 2;
        offY = 0;
      }else{
        drawW = vw;
        drawH = vw / rectAspect;
        offX = 0;
        offY = (vh - drawH) / 2;
      }

      const fx = (frame.left - vrect.left) / vrect.width;
      const fy = (frame.top - vrect.top) / vrect.height;
      const fw = frame.width / vrect.width;
      const fh = frame.height / vrect.height;

      const sx = offX + fx * drawW;
      const sy = offY + fy * drawH;
      const sw = fw * drawW;
      const sh = fh * drawH;

      // 少し拡大して送る（小さい文字に強くする）
      const SCALE = 3;
      const outW = Math.max(360, Math.round(sw * SCALE));
      const outH = Math.max(180, Math.round(sh * SCALE));
      canvas.width = outW;
      canvas.height = outH;

      // くっきり化
      ctx.imageSmoothingEnabled = false;
      ctx.filter = "contrast(180%) brightness(120%)";
      ctx.drawImage(video, sx, sy, sw, sh, 0, 0, outW, outH);
      ctx.filter = "none";

      return new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.90));
    }

    async function callOCR(){
      const blob = await cropFrameToBlob();
      if(!blob) return { total: 0, raw: '' };

      const base64 = await new Promise((resolve)=>{
        const r = new FileReader();
        r.onload = ()=> resolve(String(r.result).split(',')[1]);
        r.readAsDataURL(blob);
      });

      const resp = await fetch('/api/scan', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ image_base64: base64 })
      });

      const raw = await resp.text();
      try{
        const json = JSON.parse(raw);
        return { total: Number(json.total||0), raw };
      }catch(e){
        return { total: 0, raw };
      }
    }

    // ====== 手動スキャン（1回で即確定） ======
    let manualBusy = false;

    async function manualScanOnce(){
      if (manualBusy) return;
      if (locked) return;

      manualBusy = true;
      btnShot.disabled = true;

      try{
        setStatus('ok','🔘 手動スキャン中…');
        const { total, raw } = await callOCR();

        ocrText.textContent = `OCR: "${(raw||'').slice(0,60).replace(/\n/g,' ')}" → ${total}`;

        if(!total || total <= 0){
          setStatus('warn','⚠️ 数字が見つかりません（少し離す/明るく）');
          return;
        }
        commitTotal(total);
      }catch(e){
        setStatus('warn','❌ 手動スキャン失敗');
      }finally{
        manualBusy = false;
        btnShot.disabled = false;
      }
    }

    // ====== AUTOループ（監視） ======
    let autoBusy = false;
    let lastLoopAt = 0;

    async function autoTick(){
      const now = Date.now();
      if (!autoOn) return;
      if (locked) return;
      if (autoBusy) return;
      if (now - lastLoopAt < LOOP_WAIT_MS) return;

      autoBusy = true;
      lastLoopAt = now;

      try{
        const { total, raw } = await callOCR();
        ocrText.textContent = `OCR: "${(raw||'').slice(0,60).replace(/\n/g,' ')}" → ${total}`;

        if(!total || total <= 0){
          setStatus('warn','⚠️ 枠に数字が見えていません');
          stableCount = 0;
          lastValue = null;
          return;
        }

        setStatus('ok',`A: 読み取り中 ¥${Number(total).toLocaleString('ja-JP')}（${stableCount+1}/${NEED_N}）`);

        const same = (lastValue === total);
        const withinGap = (now - lastSeenAt) < MAX_GAP_MS;

        if(same && withinGap){
          stableCount++;
        }else{
          stableCount = 1;
        }

        lastValue = total;
        lastSeenAt = now;

        if(stableCount >= NEED_N){
          commitTotal(total);
        }
      }catch(e){
        setStatus('warn','❌ 通信/認識エラー');
      }finally{
        autoBusy = false;
      }
    }

    function loop(){
      autoTick();
      requestAnimationFrame(loop);
    }

    // ====== UIイベント ======
    btnAuto.addEventListener('click', ()=>{
      setAuto(!autoOn);
      setStatus('ok', autoOn ? 'A: AUTOで監視中' : 'A: 手動モード（枠/🔘）');
    });

    btnShot.addEventListener('click', ()=> manualScanOnce());

    // AUTO OFF時：枠タップで1回スキャン
    frameEl.addEventListener('click', ()=>{
      if(!autoOn) manualScanOnce();
    });

    btnUndo.addEventListener('click', ()=> undoLast());
    btnDash.addEventListener('click', ()=> clearToDash());

    // カメラ再開用（iPhone対策）
    statusPill.addEventListener('click', ()=> startCamera());

    detailsBtn.addEventListener('click', ()=>{
      alert('次のステップで「履歴・グラフ」をここに実装するよ（今はボタンのみ）');
    });

    // ====== 起動 ======
    (async ()=>{
      setTopStatsForDate(todayStr());
      showDash();
      setStatus('warn','A: 準備中…');
      await startCamera();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
