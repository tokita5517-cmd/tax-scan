<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>tax-scan</title>
  <style>
    :root{
      --bg:#0b0d10;
      --surface:rgba(25,28,35,.78);
      --surface2:rgba(18,20,25,.88);
      --text:#e9edf6;
      --muted:#aab2c3;
      --accent:#f2c14f;
      --ok:#31d07d;
      --warn:#ff5a5f;
      --shadow:0 10px 30px rgba(0,0,0,.45);
      --radius:18px;
      --radius2:22px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", "Yu Gothic", "Meiryo", sans-serif;
    }
    html,body{height:100%;margin:0;background:#000;color:var(--text);font-family:var(--sans);}
    #app{position:fixed;inset:0;overflow:hidden;background:#000;}
    #video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000;}
    #overlay{position:absolute;inset:0;pointer-events:none;}
    .pill{
      display:flex;align-items:center;gap:10px;
      padding:10px 14px;border-radius:999px;
      background:var(--surface);backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,.08);
      max-width: calc(100vw - 24px);
      box-sizing: border-box;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pill b{font-weight:800;}
    .pill .yen{color:var(--accent);font-weight:900;}
    #topBar{
      position:absolute;top:14px;left:14px;right:14px;
      display:flex;gap:10px;align-items:center;justify-content:space-between;
      flex-wrap:wrap;
      pointer-events:auto;
    }

@media (max-width: 480px){
  #topBar{
    flex-direction: column;
    align-items: stretch;
    gap: 8px;
    left: 12px;
    right: 12px;
  }
  #topBar .pill{
    width: 100%;
    justify-content: space-between;
    box-sizing: border-box;
  }
}

    #status{
      border:2px solid rgba(242,193,79,.0);
    }
    #status.warn{border-color: rgba(255,90,95,.55);}
    #status.ok{border-color: rgba(49,208,125,.55);}
    #frame{
      position:absolute;left:50%;top:52%;
      transform:translate(-50%,-50%);
      width:min(78vw,520px);
      height:min(18vh,140px);
      border-radius:16px;
      border:4px solid rgba(242,193,79,.85);
      box-shadow: 0 0 0 2px rgba(0,0,0,.35) inset, 0 8px 28px rgba(0,0,0,.35);
    }
    #hint{
      position:absolute;left:50%;top:calc(52% - min(9vh,70px) - 18px);
      transform:translateX(-50%);
      font-size:14px;color:rgba(255,255,255,.9);
      background:rgba(0,0,0,.35);
      padding:6px 10px;border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(10px);
    }

    #panel{
      position:absolute;left:0;right:0;bottom:0;
      padding:14px 14px 18px;
      background:linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,.55) 30%, rgba(0,0,0,.78) 100%);
      pointer-events:auto;
    }
    #calc{
      background:var(--surface2);
      border:1px solid rgba(255,255,255,.08);
      border-radius: var(--radius2);
      padding:14px;
      box-shadow: var(--shadow);
      margin-bottom:12px;
    }
    .row{
      display:flex;align-items:center;justify-content:space-between;
      padding:12px 0;
      border-bottom:1px solid rgba(255,255,255,.08);
      font-size:18px;
    }
    .row:last-child{border-bottom:none;}
    .row .label{color:var(--muted);font-weight:650}
    .row .val{font-weight:900;font-size:26px;letter-spacing:.2px}
    .row.tax .val{color:var(--warn)}
    .row.total .label{color:var(--accent)}
    .row.total .val{color:var(--accent);font-size:40px}
    #controls{
      display:flex;gap:10px;align-items:center;
      margin-top:12px;
    }
    .btn{
      border:none;cursor:pointer;
      background:var(--accent);
      color:#111;
      font-weight:900;
      border-radius: 18px;
      padding:16px 18px;
      box-shadow: var(--shadow);
      font-size:22px;
      flex: 1;
      min-width: 0;
    }
    .btn.ghost{
      background: rgba(255,255,255,.10);
      color: var(--text);
      border: 1px solid rgba(255,255,255,.10);
      font-weight:850;
      flex: 0 0 auto;
      width: 132px;
      padding:16px 14px;
      font-size:20px;
    }
    #detailsBtn{
      width: 100%;
      margin-top:12px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.10);
      color: var(--text);
      font-weight:850;
      padding:16px;
      border-radius: 18px;
      font-size:20px;
    }
    #ocrText{
      text-align:center;
      font-family:var(--mono);
      color:rgba(255,255,255,.5);
      font-size:14px;
      margin-top:8px;
      user-select:text;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    #foot{
      text-align:center;
      font-size:14px;
      color:rgba(255,255,255,.6);
      margin-top:6px;
    }
    .okBadge{
      background: rgba(49,208,125,.18);
      border: 1px solid rgba(49,208,125,.45);
    }
    .warnBadge{
      background: rgba(255,90,95,.18);
      border: 1px solid rgba(255,90,95,.45);
    }
  </style>
</head>
<body>
  <div id="app">
    <video id="video" autoplay playsinline muted></video>
    <div id="overlay">
      <div id="topBar">
        <div id="status" class="pill warnBadge">⚠️ 枠に数字が見えていません</div>
        <div class="pill">請求書: <b id="billCount">0</b> 枚</div>
        <div class="pill">総合計: <b class="yen">¥<span id="grandTotal">0</span></b></div>
      </div>

      <div id="hint">黄色枠に「数字」を入れたらホールド</div>
      <div id="frame"></div>
    </div>

    <div id="panel">
      <div id="calc">
        <div class="row">
          <div class="label">税抜（逆算）</div>
          <div class="val" id="net">-</div>
        </div>
        <div class="row tax">
          <div class="label">消費税（10%・四捨五入）</div>
          <div class="val" id="tax">-</div>
        </div>
        <div class="row total">
          <div class="label">合計（税込）</div>
          <div class="val" id="gross">-</div>
        </div>

        <div id="controls">
          <button id="btnAuto" class="btn">AUTO: ON</button>
          <button id="btnUndo" class="btn ghost" title="直近の確定を取り消す（カウントに含めない）">↩︎ 直近</button>
          <button id="btnResetToday" class="btn ghost" title="ホールド解除">⟲ 解除</button>
        </div>
      </div>

      <button id="detailsBtn">▼ 詳細（履歴・グラフ）を開く</button>

      <div id="ocrText">OCR: "" → 0</div>
      <div id="foot">※iPhoneで止まったら、左上「A」バッジをタップで再開</div>
    </div>
  </div>

  <script>
    // ====== 状態 ======
    const video = document.getElementById('video');
    const statusPill = document.getElementById('status');
    const billCountEl = document.getElementById('billCount');
    const grandTotalEl = document.getElementById('grandTotal');

    const netEl = document.getElementById('net');
    const taxEl = document.getElementById('tax');
    const grossEl = document.getElementById('gross');
    const ocrText = document.getElementById('ocrText');

    const btnAuto = document.getElementById('btnAuto');
    const btnUndo = document.getElementById('btnUndo');
    const btnResetToday = document.getElementById('btnResetToday');
    const detailsBtn = document.getElementById('detailsBtn');

    let autoOn = true;

    // ホールド/安定判定
    let locked = false;
    let lastValue = null;
    let lastText = '';
    let lastSeenAt = 0;
    let stableCount = 0;

    // ちょい強めに安定させる（iPhoneブレ対策）
    const NEED_N = 3;
    const MAX_GAP_MS = 1200;

    // ====== ログ（localStorage） ======
    function todayStr(){
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const dd = String(d.getDate()).padStart(2,'0');
      return `${y}-${m}-${dd}`;
    }

    // 既存UIのまま（内部的に今日を使う）
    const datePick = { get value(){ return todayStr(); } };

    function loadLog(ds){
      try{
        return JSON.parse(localStorage.getItem(`taxscan:${ds}`) || '[]');
      }catch(e){ return []; }
    }
    function saveLog(ds, log){
      localStorage.setItem(`taxscan:${ds}`, JSON.stringify(log));
    }

    function setTopStatsForDate(ds){
      const log = loadLog(ds);
      const sum = log.reduce((a,x)=>a+(x.total||0),0);
      billCountEl.textContent = String(log.length);
      grandTotalEl.textContent = String(sum);
    }

    function renderLog(ds){
      // 詳細UIはこの簡易版では別画面にしてないので、ボタンでアラートだけ
      // 必要なら次回ここを拡張する
    }

    function drawMonthChart(){
      // 簡易版では省略（必要なら次回）
    }

    // ====== 表示系 ======
    function setStatus(type, msg){
      statusPill.textContent = msg;
      statusPill.classList.remove('warn','ok','warnBadge','okBadge');
      if(type === 'ok'){
        statusPill.classList.add('ok','okBadge');
      }else{
        statusPill.classList.add('warn','warnBadge');
      }
    }

    function setAuto(on){
      autoOn = on;
      btnAuto.textContent = on ? 'AUTO: ON' : 'AUTO: OFF';
    }

    function fmtYen(n){
      if(n === null || n === undefined) return '-';
      if(n === '-') return '-';
      try{ return '¥' + Number(n).toLocaleString('ja-JP'); }catch(e){ return '¥' + n; }
    }

    function showResult(total){
      if(!total || total <= 0){
        netEl.textContent = '-';
        taxEl.textContent = '-';
        grossEl.textContent = '-';
        return;
      }
      const gross = total;
      const net = Math.round(gross / 1.1);
      const tax = gross - net;

      netEl.textContent = fmtYen(net);
      taxEl.textContent = fmtYen(tax);
      grossEl.textContent = fmtYen(gross);
    }

    // ====== ボタン動作 ======
    function resetToday(){
      // 「解除」ボタン：いまのホールド状態だけ強制解除（枚数・総合計・履歴は触らない）
      locked = false;
      stableCount = 0;
      lastValue = null;
      lastText  = '';
      lastSeenAt = 0;

      // 表示だけ「未検出」に戻す
      ocrText.textContent = 'OCR: "" → 0';
      setStatus('ok','⟲ ホールド解除');
    }

    function undoLast(){
      const ds  = datePick.value;
      const log = loadLog(ds);
      if(!log.length){
        // 何もないときは「ホールド解除」だけ
        locked = false;
        stableCount = 0;
        lastValue = null;
        lastText  = '';
        lastSeenAt = 0;
        setStatus('ok','⟲ ホールド解除');
        return;
      }
      log.pop();
      saveLog(ds, log);
      setTopStatsForDate(ds);
      renderLog(ds);
      drawMonthChart();

      // 直近を取り消したら、次を読み取れるようにホールドも解除
      locked = false;
      stableCount = 0;
      lastValue = null;
      lastText  = '';
      lastSeenAt = 0;

      setStatus('ok','↩︎ 直近(ホールド)を取り消し＆解除');
    }

    btnAuto.addEventListener('click', ()=> setAuto(!autoOn));
    btnUndo.addEventListener('click', ()=> undoLast());
    btnResetToday.addEventListener('click', ()=> resetToday());

    detailsBtn.addEventListener('click', ()=>{
      alert('このボタンは次のステップで「履歴・グラフ表示」にします（今はUIだけ先に配置）');
    });

    // ====== カメラ ======
    async function startCamera(){
      try{
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' },
          audio: false
        });
        video.srcObject = stream;
      }catch(e){
        alert('カメラを起動できません: ' + e.message);
      }
    }

    // ====== 画像を枠部分だけ切り抜いてAPIへ ======
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    function cropFrameToBlob(){
      const vw = video.videoWidth, vh = video.videoHeight;
      if(!vw || !vh) return null;

      // 画面上の黄色枠（CSS）に合わせてビデオ座標へ変換
      const frame = document.getElementById('frame').getBoundingClientRect();
      const vrect = video.getBoundingClientRect();

      // object-fit: cover の補正
      const videoAspect = vw / vh;
      const rectAspect = vrect.width / vrect.height;
      let drawW, drawH, offX, offY;
      if(videoAspect > rectAspect){
        drawH = vh;
        drawW = vh * rectAspect;
        offX = (vw - drawW) / 2;
        offY = 0;
      }else{
        drawW = vw;
        drawH = vw / rectAspect;
        offX = 0;
        offY = (vh - drawH) / 2;
      }

      const fx = (frame.left - vrect.left) / vrect.width;
      const fy = (frame.top - vrect.top) / vrect.height;
      const fw = frame.width / vrect.width;
      const fh = frame.height / vrect.height;

      const sx = offX + fx * drawW;
      const sy = offY + fy * drawH;
      const sw = fw * drawW;
      const sh = fh * drawH;

      const outW = Math.max(320, Math.round(sw));
      const outH = Math.max(160, Math.round(sh));
      canvas.width = outW;
      canvas.height = outH;

      ctx.drawImage(video, sx, sy, sw, sh, 0, 0, outW, outH);

      return new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.85));
    }

    async function callOCR(){
      const blob = await cropFrameToBlob();
      if(!blob) return { total: 0, raw: '' };

      const base64 = await new Promise((resolve)=>{
        const r = new FileReader();
        r.onload = ()=> resolve(String(r.result).split(',')[1]);
        r.readAsDataURL(blob);
      });

      const resp = await fetch('/api/scan', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ image_base64: base64 })
      });

      const text = await resp.text();
      try{
        const json = JSON.parse(text);
        return { total: Number(json.total||0), raw: text };
      }catch(e){
        return { total: 0, raw: text };
      }
    }

    // ====== メインループ ======
    async function loop(){
      // AUTO OFFなら何もしない
      if(!autoOn){
        requestAnimationFrame(loop);
        return;
      }

      // ホールド中は新規確定はしない（ただしAUTOはONのまま）
      if(locked){
        requestAnimationFrame(loop);
        return;
      }

      const now = Date.now();
      const { total, raw } = await callOCR();

      // 表示
      ocrText.textContent = `OCR: "${(raw||'').slice(0,60).replace(/\n/g,' ')}" → ${total}`;

      if(!total || total <= 0){
        setStatus('warn','⚠️ 枠に数字が見えていません');
        stableCount = 0;
        lastValue = null;
        lastText = '';
        requestAnimationFrame(loop);
        return;
      }

      setStatus('ok',`✅ 読み取り中: ¥${Number(total).toLocaleString('ja-JP')}`);

      const same = (lastValue === total);
      const withinGap = (now - lastSeenAt) < MAX_GAP_MS;

      if(same && withinGap){
        stableCount++;
      }else{
        stableCount = 1;
      }

      lastValue = total;
      lastSeenAt = now;

      // 安定したら確定（=ホールド）
      if(stableCount >= NEED_N){
        locked = true;

        const ds = datePick.value;
        const log = loadLog(ds);
        log.push({ ts: Date.now(), total });
        saveLog(ds, log);

        setTopStatsForDate(ds);
        showResult(total);

        setStatus('ok',`✅ 確定: ¥${Number(total).toLocaleString('ja-JP')}（次で自動解除）`);

        // 次フレームから自動解除（AUTOは維持）
        setTimeout(()=>{
          locked = false;
          stableCount = 0;
          lastValue = null;
          lastText = '';
          lastSeenAt = 0;
        }, 650);
      }

      requestAnimationFrame(loop);
    }

    // ====== 起動 ======
    (async ()=>{
      setTopStatsForDate(todayStr());
      await startCamera();
      // iOSでvideoWidthが取れるまで少し待つ
      setTimeout(()=> requestAnimationFrame(loop), 600);
    })();
  </script>
</body>
</html>
