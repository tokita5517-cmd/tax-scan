<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>tax-scan</title>
  <style>
    :root{
      --bg:#0b0b0d;
      --panel: rgba(18,18,22,.72);
      --panel2: rgba(20,20,24,.82);
      --border: rgba(255,255,255,.14);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.70);
      --yellow:#f2c94c;
      --red:#ff4d4d;
      --green:#39d98a;
      --pill: rgba(25,25,29,.72);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans JP", "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
      color: var(--text);
      overflow:hidden;
    }
    #stage{ position:fixed; inset:0; overflow:hidden; background:#000; }
    #video{
      position:absolute; inset:0;
      width:100%; height:100%;
      object-fit:cover;
      transform:none; /* ミラー禁止 */
      background:#000;
    }
    #overlay{ position:absolute; inset:0; pointer-events:none; }

    /* ===== Top Bars ===== */
    #topBars{
      position:absolute;
      left:14px; right:14px;
      /* ここを下げて「切れ」防止 */
      top: calc(env(safe-area-inset-top) + 16px);
      display:flex;
      flex-direction:column;
      gap:10px;
      pointer-events:none;
    }
    .pill{
      width:100%;
      background: var(--pill);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 12px 14px;
      backdrop-filter: blur(10px);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      font-weight:900;
      letter-spacing:.02em;
    }
    #statusPill{
      background: rgba(255, 77, 77, .18);
      border: 1px solid rgba(255, 77, 77, .35);
      justify-content:flex-start;
      gap:10px;
    }
    #statusPill.ok{
      background: rgba(57, 217, 138, .16);
      border: 1px solid rgba(57, 217, 138, .35);
    }
    #statusIcon{ width:22px; height:22px; display:grid; place-items:center; font-size:16px; }
    #statusText{ font-size:14px; font-weight:900; }

    .k{color:var(--muted); font-weight:900}
    .v{font-weight:1000; font-size:18px}
    .yen{color:var(--yellow); font-weight:1100}

    /* ===== ROI Row ===== */
    #roiRow{
      position:absolute;
      left:14px; right:14px;
      top: 220px; /* JSで自動配置するけど初期値 */
      height: 86px;
      display:flex;
      align-items:center;
      gap:12px;
      pointer-events:none;
    }
    #roi{
      flex: 1 1 auto;
      height: 86px;
      border: 4px solid rgba(242,201,76,.95);
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,.30);
      background: rgba(0,0,0,.06);
      pointer-events:auto; /* 手動タップ */
      position:relative;
      overflow:hidden;
    }
    #roi.flash{
      border-color: rgba(57,217,138,.98);
      box-shadow: 0 0 0 4px rgba(57,217,138,.28), 0 14px 40px rgba(0,0,0,.35);
    }
    #roi.flash::after{
      content:"";
      position:absolute; inset:0;
      background: rgba(57,217,138,.18);
    }

    #shutterBtn{
      width: 64px; height: 64px;
      border-radius: 999px;
      border: 3px solid rgba(255,255,255,.80);
      background: rgba(255,255,255,.16);
      backdrop-filter: blur(10px);
      display:grid; place-items:center;
      pointer-events:auto;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
      position:relative;
    }
    #shutterBtn::before{
      content:"";
      width: 44px; height: 44px;
      border-radius: 999px;
      background: rgba(255,255,255,.85);
      opacity:.18;
    }
    #shutterBtn:active{transform:scale(.98)}

    /* ===== Bottom Panel ===== */
    #panel{
      position:absolute;
      left:10px; right:10px;
      bottom: calc(env(safe-area-inset-bottom) + 10px);
      background: var(--panel2);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 22px;
      backdrop-filter: blur(14px);
      padding: 14px 14px 12px;
      pointer-events:auto;
    }
    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding: 14px 6px;
      border-bottom: 1px solid rgba(255,255,255,.10);
      font-weight:950;
    }
    .row:last-child{border-bottom:none}
    .label{font-size:22px}
    .val{font-size:42px; font-weight:1200}
    .val.small{font-size:36px}
    .val.red{color: var(--red)}
    .val.yellow{color: var(--yellow)}

    #actions{ display:flex; gap:12px; margin-top:14px; }
    .btn{
      border:none;
      border-radius: 18px;
      padding: 16px 14px;
      font-weight:1100;
      background: rgba(255,255,255,.10);
      color: rgba(255,255,255,.92);
      border:1px solid rgba(255,255,255,.12);
      flex: 1 1 0;
      font-size:20px;
    }
    .btn:active{transform:scale(.99)}
    #btnAuto{
      flex: 0 0 120px;
      background: rgba(242,201,76,.95);
      color:#111;
      border:1px solid rgba(0,0,0,.10);
      font-weight:1200;
    }
    #btnAuto.off{ background: rgba(242,201,76,.65); color:#111; }
    #btnRelease{
      flex: 0 0 120px;
      background: rgba(255,255,255,.08);
      font-size:28px;
      font-weight:1200;
    }

    #detailsBtn{
      width:100%;
      margin-top:12px;
      padding: 14px 14px;
      border-radius: 18px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.10);
      color: rgba(255,255,255,.88);
      font-weight:1100;
      font-size:20px;
    }
    #details{
      display:none;
      margin-top:12px;
      background: rgba(0,0,0,.25);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 18px;
      padding: 12px;
      max-height: 220px;
      overflow:auto;
    }
    #details.show{display:block}
    .logItem{
      display:flex; justify-content:space-between; gap:10px;
      padding: 10px 8px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      font-weight:900;
    }
    .logItem:last-child{border-bottom:none}
    .logItem .t{color:rgba(255,255,255,.72); font-size:12px; font-weight:900}
    .logItem .a{font-size:16px; font-weight:1100}

    .hint{
      margin-top:10px;
      color: rgba(255,255,255,.55);
      text-align:center;
      font-size:13px;
      font-weight:900;
    }

    #debug{
      position:absolute;
      left:0; right:0;
      bottom: calc(env(safe-area-inset-bottom) + 8px + 340px);
      text-align:center;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size:12px;
      color: rgba(255,255,255,.55);
      text-shadow: 0 2px 10px rgba(0,0,0,.35);
      pointer-events:none;
      opacity:.9;
    }
  </style>
</head>
<body>
  <div id="stage">
    <video id="video" autoplay playsinline muted></video>

    <div id="overlay">
      <div id="topBars">
        <div id="statusPill" class="pill">
          <div id="statusIcon">⚠️</div>
          <div id="statusText">枠に数字が見えていません</div>
        </div>

        <div class="pill">
          <div class="k">請求書:</div>
          <div class="v"><span id="countVal">0</span></div>
          <div class="k">枚</div>
        </div>

        <div class="pill">
          <div class="k">総合計（税抜）:</div>
          <div class="v yen">¥<span id="sumVal">0</span></div>
        </div>
      </div>

      <div id="roiRow">
        <div id="roi" title="AUTO OFF時はタップで読み取り"></div>
        <button id="shutterBtn" title="読み取り" aria-label="shutter"></button>
      </div>

      <div id="debug"></div>

      <div id="panel">
        <!-- ★ここは「直近1枚」だけを表示 -->
        <div class="row">
          <div class="label">税抜</div>
          <div class="val small">¥<span id="exclVal">0</span></div>
        </div>
        <div class="row">
          <div class="label">消費税（10%・四捨五入）</div>
          <div class="val small red">¥<span id="taxVal">0</span></div>
        </div>
        <div class="row">
          <div class="label">合計（税込）</div>
          <div class="val yellow">¥<span id="inclVal">0</span></div>
        </div>

        <div id="actions">
          <button id="btnAuto" class="btn">AUTO<br><span id="autoState">ON</span></button>
          <button id="btnUndo" class="btn">↩ 直近</button>
          <button id="btnRelease" class="btn">−</button>
        </div>

        <button id="detailsBtn">▼ 詳細（履歴）を開く</button>
        <div id="details"></div>

        <div class="hint">※iPhoneで止まったら、左上の「aA」→「サイトの設定」→「カメラ：許可」</div>
      </div>
    </div>
  </div>

<script>
(() => {
  const video = document.getElementById('video');
  const roi = document.getElementById('roi');
  const shutterBtn = document.getElementById('shutterBtn');

  const statusPill = document.getElementById('statusPill');
  const statusText = document.getElementById('statusText');
  const countVal = document.getElementById('countVal');
  const sumVal = document.getElementById('sumVal');

  const exclVal = document.getElementById('exclVal');
  const taxVal  = document.getElementById('taxVal');
  const inclVal = document.getElementById('inclVal');

  const btnAuto = document.getElementById('btnAuto');
  const autoState = document.getElementById('autoState');
  const btnUndo = document.getElementById('btnUndo');
  const btnRelease = document.getElementById('btnRelease');

  const detailsBtn = document.getElementById('detailsBtn');
  const details = document.getElementById('details');

  const debug = document.getElementById('debug');

  // ===== state =====
  let autoOn = true;
  let busy = false;

  // 上の総合計（累計）だけ加算
  let invoiceCount = 0;
  let totalExcl = 0;

  // 下の表示は「直近1枚分」
  let lastExcl = 0;

  // 無限加算防止：1回カウントしたら、0（未検出）を挟むまで次を数えない
  let waitingForClear = false;
  let nextAllowedScanAt = 0;

  const TAX_RATE = 0.10;

  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d', { willReadFrequently:true });

  const fmt = (n)=> (n||0).toLocaleString('ja-JP');

  function computeAndRender(){
    // 上は累計
    countVal.textContent = invoiceCount;
    sumVal.textContent = fmt(totalExcl);

    // 下は直近1枚
    const tax = Math.round(lastExcl * TAX_RATE);
    const incl = lastExcl + tax;
    exclVal.textContent = fmt(lastExcl);
    taxVal.textContent = fmt(tax);
    inclVal.textContent = fmt(incl);
  }

  function setStatus(ok, text){
    statusPill.classList.toggle('ok', !!ok);
    statusText.textContent = text;
    document.getElementById('statusIcon').textContent = ok ? "✅" : "⚠️";
  }

  function flashSuccess(){
    roi.classList.add('flash');
    setTimeout(() => roi.classList.remove('flash'), 750); // 少し長め

    try{
      if (navigator.vibrate) navigator.vibrate(35);
    }catch(e){}
  }

  const logs = [];
  function renderLogs(){
    if (!details.classList.contains('show')) return;
    if (logs.length === 0){
      details.innerHTML = `<div style="color:rgba(255,255,255,.65);font-weight:900;padding:8px;">履歴なし</div>`;
      return;
    }
    details.innerHTML = logs.slice().reverse().map(item => `
      <div class="logItem">
        <div>
          <div class="t">${item.time}</div>
          <div class="a">¥${fmt(item.amount)}</div>
        </div>
        <div style="color:rgba(255,255,255,.55);font-weight:900;">#${item.index}</div>
      </div>
    `).join('');
  }
  function pushLog(amount){
    const t = new Date();
    const hh = String(t.getHours()).padStart(2,'0');
    const mm = String(t.getMinutes()).padStart(2,'0');
    const ss = String(t.getSeconds()).padStart(2,'0');
    logs.push({ index: logs.length + 1, amount, time: `${hh}:${mm}:${ss}` });
    renderLogs();
  }

  function acceptAmount(amount){
    if (!Number.isFinite(amount) || amount <= 0) return;

    // ★累計は上だけ
    invoiceCount += 1;
    totalExcl += amount;

    // ★下は直近だけ更新（加算しない）
    lastExcl = amount;

    pushLog(amount);
    computeAndRender();

    flashSuccess();
    setStatus(true, `確定：¥${fmt(amount)}（次で自動解除）`);

    waitingForClear = true;
    nextAllowedScanAt = Date.now() + 650;
  }

  function undoLast(){
    if (logs.length === 0) return;
    const last = logs.pop();

    invoiceCount = Math.max(0, invoiceCount - 1);
    totalExcl = Math.max(0, totalExcl - last.amount);

    // 直近表示は「今残ってる最後の1件」に戻す（なければ0）
    const prev = logs.length ? logs[logs.length - 1].amount : 0;
    lastExcl = prev;

    computeAndRender();
    renderLogs();

    waitingForClear = false;
    nextAllowedScanAt = Date.now() + 250;
    setStatus(true, `直近を取消：¥${fmt(last.amount)}`);
  }

  function releaseHoldOnly(){
    waitingForClear = false;
    nextAllowedScanAt = Date.now() + 200;
    setStatus(true, "解除しました（枚数/総合計は保持）");
  }

  function setAuto(on){
    autoOn = !!on;
    autoState.textContent = autoOn ? "ON" : "OFF";
    btnAuto.classList.toggle('off', !autoOn);
    setStatus(false, autoOn ? "枠に数字が見えていません" : "手動：枠タップ or シャッターで読み取り");
  }

  async function startCamera(){
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" }, width:{ideal:1920}, height:{ideal:1080} },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
  }

  // ★黄色枠が総合計に被らないように「余白を増やして」配置
  function placeRoiBetween(){
    const topBars = document.getElementById('topBars');
    const panel = document.getElementById('panel');
    const roiRow = document.getElementById('roiRow');

    const topRect = topBars.getBoundingClientRect();
    const panelRect = panel.getBoundingClientRect();

    // ここを大きめにして「重なり」防止
    const gapTop = topRect.bottom + 34;
    const gapBottom = panelRect.top - 18;

    const maxTop = Math.max(140, gapBottom - roiRow.offsetHeight);
    const desiredTop = Math.min(Math.max(gapTop, 140), maxTop);

    roiRow.style.top = `${desiredTop}px`;
  }

  window.addEventListener('resize', placeRoiBetween);

  function captureRoiJpeg(){
    const vRect = video.getBoundingClientRect();
    const rRect = roi.getBoundingClientRect();

    const vw = video.videoWidth;
    const vh = video.videoHeight;
    if (!vw || !vh) return null;

    const viewW = vRect.width;
    const viewH = vRect.height;

    const videoAspect = vw / vh;
    const viewAspect = viewW / viewH;

    let drawW, drawH, offsetX, offsetY;
    if (videoAspect > viewAspect){
      drawH = viewH;
      drawW = viewH * videoAspect;
      offsetX = (drawW - viewW) / 2;
      offsetY = 0;
    } else {
      drawW = viewW;
      drawH = viewW / videoAspect;
      offsetX = 0;
      offsetY = (drawH - viewH) / 2;
    }

    const xInView = rRect.left - vRect.left;
    const yInView = rRect.top - vRect.top;

    const xOnDraw = xInView + offsetX;
    const yOnDraw = yInView + offsetY;

    const scale = vw / drawW;
    let sx = Math.round(xOnDraw * scale);
    let sy = Math.round(yOnDraw * scale);
    let sw = Math.round(rRect.width * scale);
    let sh = Math.round(rRect.height * scale);

    sx = Math.max(0, Math.min(vw - 1, sx));
    sy = Math.max(0, Math.min(vh - 1, sy));
    sw = Math.max(1, Math.min(vw - sx, sw));
    sh = Math.max(1, Math.min(vh - sy, sh));

    // 余白
    const padX = Math.round(sw * 0.06);
    const padY = Math.round(sh * 0.20);
    sx = Math.max(0, sx - padX);
    sy = Math.max(0, sy - padY);
    sw = Math.min(vw - sx, sw + padX*2);
    sh = Math.min(vh - sy, sh + padY*2);

    canvas.width = sw;
    canvas.height = sh;
    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, sw, sh);

    return canvas.toDataURL('image/jpeg', 0.85);
  }

  async function callOcr(dataUrl){
    const res = await fetch('/api/scan', {
      method: 'POST',
      headers: { 'content-type':'application/json' },
      body: JSON.stringify({ image: dataUrl })
    });
    if (!res.ok){
      const t = await res.text().catch(()=> '');
      throw new Error(`scan api error: ${res.status} ${t}`);
    }
    return res.json();
  }

  async function doScanOnce(source){
    if (busy) return;
    if (Date.now() < nextAllowedScanAt) return;

    const img = captureRoiJpeg();
    if (!img) return;

    busy = true;
    try{
      const json = await callOcr(img);
      const amount = Number(json?.total || 0);

      debug.textContent = `OCR(${source}): ${JSON.stringify(json)} → ${amount}`;

      if (!amount || amount <= 0){
        if (waitingForClear) waitingForClear = false;
        setStatus(false, autoOn ? "枠に数字が見えていません" : "手動：枠タップ or シャッターで読み取り");
        return;
      }

      if (waitingForClear){
        setStatus(true, `検出：¥${fmt(amount)}（次を数えるには一度外す or −で解除）`);
        nextAllowedScanAt = Date.now() + 400;
        return;
      }

      acceptAmount(amount);

    } catch(e){
      debug.textContent = `OCR error: ${String(e)}`;
      setStatus(false, "OCRエラー（API/モデル/キー確認）");
      nextAllowedScanAt = Date.now() + 1200;
    } finally{
      busy = false;
    }
  }

  function loop(){
    if (autoOn){
      if (!busy && Date.now() >= nextAllowedScanAt){
        doScanOnce('auto');
        nextAllowedScanAt = Date.now() + 900;
      }
    }
    requestAnimationFrame(loop);
  }

  btnAuto.addEventListener('click', () => setAuto(!autoOn));
  btnUndo.addEventListener('click', () => undoLast());
  btnRelease.addEventListener('click', () => releaseHoldOnly());

  detailsBtn.addEventListener('click', () => {
    details.classList.toggle('show');
    detailsBtn.textContent = details.classList.contains('show')
      ? "▲ 詳細（履歴）を閉じる"
      : "▼ 詳細（履歴）を開く";
    renderLogs();
  });

  roi.addEventListener('click', () => { if (!autoOn) doScanOnce('tap'); });
  shutterBtn.addEventListener('click', () => { doScanOnce(autoOn ? 'shutter(auto)' : 'shutter(manual)'); });

  (async () => {
    computeAndRender();
    setAuto(true);
    await startCamera();
    placeRoiBetween();
    loop();
  })();
})();
</script>
</body>
</html>
