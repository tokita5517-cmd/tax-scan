<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>請求書スキャン</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    :root{
      --bg:#0b1020;
      --panel:rgba(255,255,255,.08);
      --panel2:rgba(255,255,255,.12);
      --line:rgba(255,255,255,.18);
      --text:#fff;
      --sub:#b8c0d8;
      --yellow:#ffd84d;
      --green:#2dd4bf;
      --red:#ff6b6b;
      --blue:#60a5fa;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP","Yu Gothic",sans-serif;
      height:100%;
      overflow:hidden;
    }
    .app{
      position:fixed;
      inset:0;
      display:flex;
      flex-direction:column;
    }
    .topbar{
      flex:0 0 auto;
      padding:10px 12px 8px;
      background:linear-gradient(to bottom, rgba(0,0,0,.35), rgba(0,0,0,0));
      z-index:30;
    }
    .summary{
      display:grid;
      grid-template-columns: 1fr auto;
      gap:10px;
      align-items:start;
    }
    .mainTotal{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:18px;
      padding:10px 12px;
      backdrop-filter: blur(12px);
    }
    .mainTotal .label{
      font-size:12px;
      color:var(--sub);
      margin-bottom:4px;
    }
    .mainTotal .value{
      font-size:30px;
      line-height:1;
      font-weight:800;
      letter-spacing:.02em;
    }
    .mainTotal .subrow{
      display:flex;
      gap:12px;
      margin-top:8px;
      font-size:13px;
      color:var(--sub);
    }
    .taxPanel{
      width:120px;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:18px;
      padding:10px 10px;
      backdrop-filter: blur(12px);
      display:flex;
      flex-direction:column;
      gap:8px;
      align-self:stretch;
      justify-content:center;
    }
    .taxItem{
      display:flex;
      flex-direction:column;
      gap:3px;
    }
    .taxItem .t{
      font-size:12px;
      color:var(--sub);
    }
    .taxItem .v{
      min-height:22px;
      border:1px dashed rgba(255,255,255,.22);
      border-radius:8px;
      padding:2px 6px;
      font-size:14px;
      display:flex;
      align-items:center;
      justify-content:flex-end;
    }

    .cameraWrap{
      position:relative;
      flex:1 1 auto;
      overflow:hidden;
      background:#000;
    }
    video, canvas.capture{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
    }
    .overlay{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:10;
    }
    .mask{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,.28);
    }
    .guide{
      position:absolute;
      border:2px solid var(--yellow);
      border-radius:14px;
      box-shadow:0 0 0 9999px rgba(0,0,0,.18) inset, 0 0 18px rgba(255,216,77,.25);
    }
    .guideLabel{
      position:absolute;
      left:8px;
      top:-26px;
      background:rgba(0,0,0,.6);
      color:#fff;
      border:1px solid rgba(255,255,255,.15);
      border-radius:999px;
      padding:4px 10px;
      font-size:11px;
      white-space:nowrap;
    }
    .scanLine{
      position:absolute;
      left:0;
      right:0;
      height:2px;
      background:linear-gradient(90deg, transparent, var(--green), transparent);
      box-shadow:0 0 10px rgba(45,212,191,.8);
      animation:sweep 2.2s linear infinite;
      opacity:.9;
    }
    @keyframes sweep{
      0%{top:4px}
      50%{top:calc(100% - 6px)}
      100%{top:4px}
    }

    .bottomBar{
      flex:0 0 auto;
      padding:10px 12px calc(10px + env(safe-area-inset-bottom));
      background:linear-gradient(to top, rgba(0,0,0,.42), rgba(0,0,0,0));
      z-index:30;
    }
    .controls{
      display:grid;
      grid-template-columns: 1fr 74px 1fr 1fr;
      gap:8px;
      align-items:center;
    }
    .btn{
      appearance:none;
      border:none;
      border-radius:16px;
      background:var(--panel2);
      color:var(--text);
      padding:12px 10px;
      font-size:14px;
      font-weight:700;
      border:1px solid var(--line);
      backdrop-filter:blur(10px);
    }
    .btn:active{transform:scale(.98)}
    .shutter{
      width:74px;
      height:74px;
      border-radius:50%;
      background:#fff;
      color:#000;
      font-size:12px;
      font-weight:800;
      border:6px solid rgba(255,255,255,.4);
      justify-self:center;
    }

    .history{
      margin-top:8px;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:16px;
      padding:8px 10px;
      max-height:140px;
      overflow:auto;
      backdrop-filter:blur(12px);
    }
    .historyTitle{
      font-size:12px;
      color:var(--sub);
      margin-bottom:6px;
    }
    .historyItem{
      display:grid;
      grid-template-columns: 28px 1fr auto;
      gap:8px;
      padding:6px 0;
      border-bottom:1px solid rgba(255,255,255,.08);
      font-size:13px;
      align-items:center;
    }
    .historyItem:last-child{border-bottom:none}
    .status{
      margin-top:8px;
      font-size:12px;
      color:var(--sub);
      min-height:18px;
    }

    .debugCanvas{
      display:none;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="summary">
        <div class="mainTotal">
          <div class="label">総合計</div>
          <div class="value" id="grandTotal">0</div>
          <div class="subrow">
            <div>枚数 <b id="count">0</b></div>
            <div>直近 <b id="lastAmount">-</b></div>
          </div>
        </div>

        <div class="taxPanel">
          <div class="taxItem">
            <div class="t">税抜</div>
            <div class="v" id="taxEx"> </div>
          </div>
          <div class="taxItem">
            <div class="t">消費税</div>
            <div class="v" id="taxOnly"> </div>
          </div>
          <div class="taxItem">
            <div class="t">税込</div>
            <div class="v" id="taxIn"> </div>
          </div>
        </div>
      </div>
    </div>

    <div class="cameraWrap">
      <video id="video" playsinline autoplay muted></video>
      <canvas id="capture" class="capture"></canvas>

      <div class="overlay">
        <div id="topGuide" class="guide">
          <div class="guideLabel">上エリア（合計・伝票番号）</div>
          <div class="scanLine"></div>
        </div>
        <div id="bottomGuide" class="guide">
          <div class="guideLabel">下エリア（御中まで入るよう左拡張）</div>
          <div class="scanLine"></div>
        </div>
      </div>

      <canvas id="workCanvas" class="debugCanvas"></canvas>
    </div>

    <div class="bottomBar">
      <div class="controls">
        <button class="btn" id="toggleAutoBtn">自動認識ON</button>
        <button class="shutter" id="scanBtn">SCAN</button>
        <button class="btn" id="releaseBtn">解除</button>
        <button class="btn" id="resetBtn">リセット</button>
      </div>

      <div class="history">
        <div class="historyTitle">履歴</div>
        <div id="historyList"></div>
      </div>

      <div class="status" id="status">初期化中…</div>
    </div>
  </div>

  <script>
    const video = document.getElementById('video');
    const capture = document.getElementById('capture');
    const capCtx = capture.getContext('2d', { willReadFrequently: true });
    const workCanvas = document.getElementById('workCanvas');
    const workCtx = workCanvas.getContext('2d', { willReadFrequently: true });

    const grandTotalEl = document.getElementById('grandTotal');
    const countEl = document.getElementById('count');
    const lastAmountEl = document.getElementById('lastAmount');
    const historyList = document.getElementById('historyList');
    const statusEl = document.getElementById('status');
    const toggleAutoBtn = document.getElementById('toggleAutoBtn');
    const releaseBtn = document.getElementById('releaseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const scanBtn = document.getElementById('scanBtn');

    const taxEx = document.getElementById('taxEx');
    const taxOnly = document.getElementById('taxOnly');
    const taxIn = document.getElementById('taxIn');

    const topGuide = document.getElementById('topGuide');
    const bottomGuide = document.getElementById('bottomGuide');

    let worker = null;
    let stream = null;
    let autoMode = true;
    let busy = false;
    let hold = false;
    let total = 0;
    let count = 0;
    let history = [];
    let lastAcceptedNo = null;
    let lastSeenNo = null;
    let cooldownUntil = 0;

    const ACCEPT_COOLDOWN_MS = 5000;   // 認識後5秒休止
    const LOOP_INTERVAL_MS = 900;

    // ===== 認識エリア =====
    // 上: 右半分・上1/4
    const topArea = {
      left: 0.50,
      top: 0.05,
      width: 0.46,
      height: 0.24
    };

    // 下: 右寄り下側だけど、御中が収まるよう左へ広げた版
    const bottomArea = {
      left: 0.40,   // ← 左拡張
      top: 0.70,
      width: 0.54,  // ← 横幅拡張
      height: 0.22
    };

    function applyGuides() {
      topGuide.style.left = `${topArea.left * 100}%`;
      topGuide.style.top = `${topArea.top * 100}%`;
      topGuide.style.width = `${topArea.width * 100}%`;
      topGuide.style.height = `${topArea.height * 100}%`;

      bottomGuide.style.left = `${bottomArea.left * 100}%`;
      bottomGuide.style.top = `${bottomArea.top * 100}%`;
      bottomGuide.style.width = `${bottomArea.width * 100}%`;
      bottomGuide.style.height = `${bottomArea.height * 100}%`;
    }
    applyGuides();

    function fmt(num) {
      return Number(num || 0).toLocaleString('ja-JP');
    }

    function beep() {
      try{
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = 880;
        gain.gain.value = 0.02;
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.08);
      }catch(e){}
    }

    function updateUI() {
      grandTotalEl.textContent = fmt(total);
      countEl.textContent = count;
      lastAmountEl.textContent = history.length ? fmt(history[0].amount) : '-';

      historyList.innerHTML = '';
      history.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = 'historyItem';
        div.innerHTML = `
          <div>${idx + 1}</div>
          <div>${item.no || '番号なし'}</div>
          <div>${fmt(item.amount)}</div>
        `;
        historyList.appendChild(div);
      });
    }

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function calcTaxFields(amount) {
      if (!amount || !Number.isFinite(amount)) {
        taxEx.textContent = '';
        taxOnly.textContent = '';
        taxIn.textContent = '';
        return;
      }
      const ex = Math.round(amount / 1.1);
      const tax = amount - ex;
      taxEx.textContent = fmt(ex);
      taxOnly.textContent = fmt(tax);
      taxIn.textContent = fmt(amount);
    }

    function normalizeText(text) {
      return (text || '')
        .replace(/[Ａ-Ｚａ-ｚ０-９]/g, s =>
          String.fromCharCode(s.charCodeAt(0) - 0xFEE0)
        )
        .replace(/[‐-‒–—―ー]/g, '-')
        .replace(/[：]/g, ':')
        .replace(/[，]/g, ',')
        .replace(/[．]/g, '.')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function extractInvoiceNo(text) {
      const t = normalizeText(text);

      const patterns = [
        /(?:伝票番号|伝票No\.?|伝票NO\.?|No\.?|NO\.?)\s*[:：]?\s*([A-Z0-9\-]{4,})/i,
        /([A-Z]{0,3}\d{4,}(?:-\d+)*)/i
      ];

      for (const p of patterns) {
        const m = t.match(p);
        if (m && m[1]) return m[1];
      }
      return null;
    }

    function extractAmount(text) {
      const t = normalizeText(text);

      const strongPatterns = [
        /(?:合計|請求額|ご請求額|今回ご請求額|総合計|金額)\s*[:：]?\s*¥?\s*([0-9][0-9,]{1,})/i,
        /(?:税込|税込金額)\s*[:：]?\s*¥?\s*([0-9][0-9,]{1,})/i
      ];

      for (const p of strongPatterns) {
        const m = t.match(p);
        if (m && m[1]) return parseInt(m[1].replace(/,/g, ''), 10);
      }

      const nums = [...t.matchAll(/¥?\s*([0-9]{2,3}(?:,[0-9]{3})+|[0-9]{3,7})/g)]
        .map(m => parseInt(m[1].replace(/,/g, ''), 10))
        .filter(n => n >= 50 && n <= 999999);

      if (!nums.length) return null;
      return Math.max(...nums);
    }

    function cropFromVideo(area) {
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      if (!vw || !vh) return null;

      capture.width = vw;
      capture.height = vh;
      capCtx.drawImage(video, 0, 0, vw, vh);

      const sx = Math.floor(vw * area.left);
      const sy = Math.floor(vh * area.top);
      const sw = Math.floor(vw * area.width);
      const sh = Math.floor(vh * area.height);

      workCanvas.width = sw;
      workCanvas.height = sh;
      workCtx.drawImage(capture, sx, sy, sw, sh, 0, 0, sw, sh);

      return { sx, sy, sw, sh };
    }

    async function recognizeArea(area) {
      cropFromVideo(area);
      const result = await worker.recognize(workCanvas);
      return normalizeText(result.data.text || '');
    }

    async function scanOnce() {
      if (busy || hold) return;
      if (Date.now() < cooldownUntil) return;
      if (!video.videoWidth) return;

      busy = true;
      setStatus('認識中…');

      try {
        const topText = await recognizeArea(topArea);
        const bottomText = await recognizeArea(bottomArea);
        const merged = `${topText}\n${bottomText}`;

        const invoiceNo = extractInvoiceNo(merged);
        const amount = extractAmount(merged);

        lastSeenNo = invoiceNo || lastSeenNo;

        if (!amount) {
          setStatus('金額が見つからない');
          return;
        }

        // 同じ伝票番号が連続なら止める
        if (invoiceNo && lastAcceptedNo && invoiceNo === lastAcceptedNo) {
          hold = true;
          setStatus(`同じ伝票番号を連続検出: ${invoiceNo} → 解除または別伝票を挟んで`);
          return;
        }

        total += amount;
        count += 1;
        lastAcceptedNo = invoiceNo || `NOLESS-${Date.now()}`;

        history.unshift({
          no: invoiceNo,
          amount,
          at: new Date().toLocaleString('ja-JP')
        });
        history = history.slice(0, 50);

        calcTaxFields(amount);
        updateUI();
        beep();

        cooldownUntil = Date.now() + ACCEPT_COOLDOWN_MS;
        setStatus(`登録: ${invoiceNo || '番号なし'} / ${fmt(amount)}円`);
      } catch (e) {
        console.error(e);
        setStatus('OCRエラー');
      } finally {
        busy = false;
      }
    }

    async function loop() {
      while (true) {
        if (autoMode) {
          await scanOnce();
        }
        await new Promise(r => setTimeout(r, LOOP_INTERVAL_MS));
      }
    }

    async function initWorker() {
      worker = await Tesseract.createWorker('jpn+eng', 1, {
        logger: () => {}
      });
    }

    async function initCamera() {
      stream = await navigator.mediaDevices.getUserMedia({
        audio: false,
        video: {
          facingMode: { ideal: 'environment' },
          width: { ideal: 1920 },
          height: { ideal: 1080 }
        }
      });
      video.srcObject = stream;
      await video.play();
    }

    toggleAutoBtn.addEventListener('click', () => {
      autoMode = !autoMode;
      toggleAutoBtn.textContent = autoMode ? '自動認識ON' : '自動認識OFF';
      setStatus(autoMode ? '自動認識ON' : '自動認識OFF');
    });

    scanBtn.addEventListener('click', async () => {
      beep();
      await scanOnce();
    });

    releaseBtn.addEventListener('click', () => {
      hold = false;
      setStatus('ホールド解除');
    });

    resetBtn.addEventListener('click', () => {
      total = 0;
      count = 0;
      history = [];
      lastAcceptedNo = null;
      lastSeenNo = null;
      cooldownUntil = 0;
      hold = false;
      calcTaxFields(null);
      updateUI();
      setStatus('リセット完了');
    });

    window.addEventListener('resize', applyGuides);

    (async () => {
      try {
        applyGuides();
        await initCamera();
        setStatus('OCR初期化中…');
        await initWorker();
        updateUI();
        setStatus('準備完了');
        loop();
      } catch (e) {
        console.error(e);
        setStatus('カメラまたはOCRの初期化に失敗');
      }
    })();
  </script>
</body>
</html>
