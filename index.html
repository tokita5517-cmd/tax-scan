<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>tax-scan</title>

<style>
:root{
  --surface:rgba(25,28,35,.78);
  --surface2:rgba(18,20,25,.88);
  --text:#e9edf6;
  --muted:#aab2c3;
  --accent:#f2c14f;
  --ok:#31d07d;
  --warn:#ff5a5f;
  --shadow:0 10px 30px rgba(0,0,0,.45);

  --topbar-offset:58px;
  --frame-top:34%;
  --frame-width:min(78vw,560px);
  --frame-height:min(14vh,110px);

  --shutter-size:56px;
  --shutter-gap:12px;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0;background:#000;color:var(--text);font-family:-apple-system,system-ui;}
#app{position:fixed;inset:0;overflow:hidden;background:#000;}
#video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000;}

.pill{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;border-radius:999px;
  background:var(--surface);
  box-shadow:var(--shadow);
  border:1px solid rgba(255,255,255,.08);
  white-space:nowrap;
}

#topBar{
  position:absolute;
  top:calc(env(safe-area-inset-top) + var(--topbar-offset));
  left:14px;right:14px;
  display:flex;gap:10px;flex-wrap:wrap;
  z-index:25;
}

#frame{
  position:absolute;
  top:var(--frame-top);
  left:calc(50% - (var(--shutter-size) + var(--shutter-gap))/2);
  transform:translate(-50%,-50%);
  width:var(--frame-width);
  height:var(--frame-height);
  border-radius:16px;
  border:4px solid rgba(242,193,79,.85);
  box-shadow:0 0 0 2px rgba(0,0,0,.35) inset;
  z-index:40;
}

@keyframes frameSuccess{
  0%{border-color:rgba(242,193,79,.85)}
  30%{border-color:var(--ok);box-shadow:0 0 0 10px rgba(49,208,125,.4)}
  100%{border-color:rgba(242,193,79,.85)}
}
#frame.flash{animation:frameSuccess 900ms ease-out 1;}

#shutter{
  position:absolute;
  top:var(--frame-top);
  left:calc(
    50% - (var(--shutter-size) + var(--shutter-gap))/2
    + (var(--frame-width)/2)
    + var(--shutter-gap)
    + (var(--shutter-size)/2)
  );
  transform:translate(-50%,-50%);
  width:var(--shutter-size);
  height:var(--shutter-size);
  border-radius:50%;
  background:rgba(255,255,255,.15);
  display:grid;place-items:center;
  z-index:45;
}
#shutter .dot{
  width:18px;height:18px;border-radius:50%;
  background:#fff;
}

#panel{
  position:absolute;
  bottom:0;left:0;right:0;
  padding:14px 14px calc(18px + env(safe-area-inset-bottom));
  background:linear-gradient(180deg,transparent 0%,rgba(0,0,0,.85) 100%);
}

#calc{
  background:var(--surface2);
  border-radius:22px;
  padding:14px;
  margin-bottom:12px;
}

.row{
  display:flex;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid rgba(255,255,255,.08);
}
.row:last-child{border-bottom:none}
.row .val{font-weight:900;font-size:26px}
.row.total .val{color:var(--accent);font-size:40px}

#controls{display:flex;gap:10px;margin-top:12px}
.btn{
  flex:1;
  padding:14px;
  border-radius:18px;
  background:rgba(255,255,255,.1);
  color:#fff;
  border:none;
  font-weight:800;
}
#btnAuto{background:var(--accent);color:#111;flex:0 0 90px}
#btnDash{font-size:26px}
#ocrText{font-size:13px;color:rgba(255,255,255,.5);text-align:center;margin-top:8px}
</style>
</head>

<body>
<div id="app">
<video id="video" autoplay playsinline muted></video>

<div id="topBar">
  <div class="pill" id="status">A: 準備中…</div>
  <div class="pill">請求書: <b id="billCount">0</b> 枚</div>
  <div class="pill">総合計（税抜）: <b>¥<span id="grandTotal">0</span></b></div>
</div>

<div id="frame"></div>
<div id="shutter"><div class="dot"></div></div>

<div id="panel">
<div id="calc">
  <div class="row"><div>税抜</div><div class="val" id="net">-</div></div>
  <div class="row"><div>消費税（10%）</div><div class="val" id="tax">-</div></div>
  <div class="row total"><div>合計（税込）</div><div class="val" id="gross">-</div></div>

  <div id="controls">
    <button id="btnAuto" class="btn">AUTO</button>
    <button id="btnUndo" class="btn">↩︎ 直近</button>
    <button id="btnDash" class="btn">−</button>
  </div>
</div>
<div id="ocrText">OCR: "" → 0</div>
</div>
</div>

<script>
const video=document.getElementById("video");
const frame=document.getElementById("frame");
const shutter=document.getElementById("shutter");
const billCount=document.getElementById("billCount");
const grandTotal=document.getElementById("grandTotal");
const netEl=document.getElementById("net");
const taxEl=document.getElementById("tax");
const grossEl=document.getElementById("gross");
const ocrText=document.getElementById("ocrText");

let autoOn=true;
let locked=false;
let requireBlank=false;
let lastValue=null;
let stable=0;

const NEED_N=2;

function today(){
  const d=new Date();
  return d.toISOString().slice(0,10);
}
function load(){return JSON.parse(localStorage.getItem("taxscan:"+today())||"[]")}
function save(log){localStorage.setItem("taxscan:"+today(),JSON.stringify(log))}

function updateTop(){
  const log=load();
  billCount.textContent=log.length;
  const sum=log.reduce((a,x)=>a+(x.net||0),0);
  grandTotal.textContent=sum.toLocaleString("ja-JP");
}

function calc(net){
  const tax=Math.round(net*0.1);
  return{net,tax,gross:net+tax}
}

function show(net){
  if(!net){netEl.textContent=taxEl.textContent=grossEl.textContent="-";return;}
  const r=calc(net);
  netEl.textContent="¥"+r.net.toLocaleString();
  taxEl.textContent="¥"+r.tax.toLocaleString();
  grossEl.textContent="¥"+r.gross.toLocaleString();
}

function flash(){
  frame.classList.remove("flash");
  void frame.offsetWidth;
  frame.classList.add("flash");
  if(navigator.vibrate)navigator.vibrate(40);
}

function commit(net){
  const r=calc(net);
  const log=load();
  log.push(r);
  save(log);
  updateTop();
  show(net);
  flash();
  requireBlank=true;
}

function clearDash(){show(0)}

function undo(){
  const log=load();
  log.pop();
  save(log);
  updateTop();
  requireBlank=true;
}

async function startCam(){
  const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
  video.srcObject=stream;
}

async function fakeOCR(){
  // 本番では /api/scan 呼び出し
  return 0;
}

async function scanLoop(){
  if(!autoOn||locked)return;
  const value=await fakeOCR();
  if(!value){
    requireBlank=false;
    stable=0;
    return;
  }
  if(requireBlank)return;

  if(value===lastValue)stable++;
  else stable=1;

  lastValue=value;

  if(stable>=NEED_N){
    commit(value);
    stable=0;
  }
}

document.getElementById("btnAuto").onclick=()=>autoOn=!autoOn;
document.getElementById("btnUndo").onclick=undo;
document.getElementById("btnDash").onclick=clearDash;
shutter.onclick=()=>{if(!autoOn)scanLoop();};

setInterval(scanLoop,250);

startCam();
updateTop();
</script>
</body>
</html>
