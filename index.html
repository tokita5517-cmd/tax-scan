<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>請求書計算アプリ</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    :root{
      --bg:#07112b;
      --panel:rgba(255,255,255,.08);
      --panel2:rgba(255,255,255,.11);
      --line:rgba(255,255,255,.18);
      --text:#fff;
      --sub:#c8d0e2;
      --yellow:#ffd84d;
      --green:#2dd4bf;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP","Yu Gothic",sans-serif;
    }
    .app{
      position:fixed;
      inset:0;
      display:flex;
      flex-direction:column;
      background:var(--bg);
    }
    .topbar{
      flex:0 0 auto;
      padding:10px 12px 8px;
      z-index:20;
      background:linear-gradient(to bottom, rgba(0,0,0,.30), rgba(0,0,0,0));
    }
    .summary{
      display:grid;
      grid-template-columns:1fr auto;
      gap:10px;
      align-items:start;
    }
    .mainTotal{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:20px;
      padding:12px 14px;
      backdrop-filter:blur(14px);
    }
    .mainTotal .label{
      font-size:12px;
      color:var(--sub);
      margin-bottom:4px;
    }
    .mainTotal .value{
      font-size:30px;
      font-weight:800;
      line-height:1.05;
      letter-spacing:.02em;
    }
    .mainTotal .subrow{
      display:flex;
      gap:14px;
      margin-top:10px;
      font-size:13px;
      color:var(--sub);
    }
    .taxPanel{
      width:120px;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:20px;
      padding:10px;
      backdrop-filter:blur(14px);
      display:flex;
      flex-direction:column;
      gap:9px;
    }
    .taxItem{
      display:flex;
      flex-direction:column;
      gap:3px;
    }
    .taxItem .t{
      font-size:12px;
      color:var(--sub);
    }
    .taxItem .v{
      min-height:22px;
      border:1px dashed rgba(255,255,255,.22);
      border-radius:10px;
      padding:2px 6px;
      font-size:14px;
      display:flex;
      align-items:center;
      justify-content:flex-end;
    }

    .cameraWrap{
      position:relative;
      flex:1 1 auto;
      overflow:hidden;
      background:#000;
    }
    video{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:1;
    }
    canvas.capture,
    canvas.work{
      display:none;
    }

    .overlay{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:10;
    }

    /* 右側の重要部分だけ入ればいい縦長ガイド */
    .scanGuide{
      position:absolute;
      left:36%;
      top:6%;
      width:56%;
      height:82%;
      border:3px solid var(--yellow);
      border-radius:18px;
      box-shadow:0 0 16px rgba(255,216,77,.20);
    }
    .scanGuideLabel{
      position:absolute;
      left:12px;
      top:-26px;
      background:rgba(0,0,0,.55);
      border:1px solid rgba(255,255,255,.15);
      color:#fff;
      border-radius:999px;
      padding:4px 10px;
      font-size:11px;
      white-space:nowrap;
    }
    .scanLine{
      position:absolute;
      left:0;
      right:0;
      height:2px;
      background:linear-gradient(90deg, transparent, var(--green), transparent);
      box-shadow:0 0 10px rgba(45,212,191,.8);
      animation:sweep 2.2s linear infinite;
      opacity:.9;
    }
    @keyframes sweep{
      0%{top:6px}
      50%{top:calc(100% - 8px)}
      100%{top:6px}
    }

    .bottomBar{
      flex:0 0 auto;
      padding:10px 12px calc(10px + env(safe-area-inset-bottom));
      z-index:20;
      background:linear-gradient(to top, rgba(0,0,0,.38), rgba(0,0,0,0));
    }
    .controls{
      display:grid;
      grid-template-columns:74px 1fr;
      gap:10px;
      align-items:center;
    }
    .btn{
      appearance:none;
      border:none;
      border-radius:18px;
      background:var(--panel2);
      color:var(--text);
      padding:12px 10px;
      font-size:14px;
      font-weight:700;
      border:1px solid var(--line);
      backdrop-filter:blur(12px);
    }
    .btn:active{transform:scale(.98)}
    .btn:disabled,
    .shutter:disabled{
      opacity:.55;
    }
    .shutter{
      width:74px;
      height:74px;
      border-radius:50%;
      background:#fff;
      color:#000;
      font-size:12px;
      font-weight:800;
      border:6px solid rgba(255,255,255,.42);
      justify-self:center;
    }

    .history{
      margin-top:8px;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:18px;
      padding:8px 10px;
      max-height:180px;
      overflow:auto;
      backdrop-filter:blur(14px);
    }
    .historyTitle{
      font-size:12px;
      color:var(--sub);
      margin-bottom:6px;
    }
    .historyItem{
      display:grid;
      grid-template-columns:28px 1fr auto;
      gap:8px;
      padding:7px 0;
      border-bottom:1px solid rgba(255,255,255,.08);
      font-size:13px;
      align-items:center;
    }
    .historyItem:last-child{border-bottom:none}
    .status{
      margin-top:8px;
      font-size:12px;
      color:var(--sub);
      min-height:18px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="summary">
        <div class="mainTotal">
          <div class="label">総合計</div>
          <div class="value" id="grandTotal">0</div>
          <div class="subrow">
            <div>枚数 <b id="count">0</b></div>
            <div>直近 <b id="lastAmount">-</b></div>
          </div>
        </div>

        <div class="taxPanel">
          <div class="taxItem">
            <div class="t">税抜</div>
            <div class="v" id="taxEx"></div>
          </div>
          <div class="taxItem">
            <div class="t">消費税</div>
            <div class="v" id="taxOnly"></div>
          </div>
          <div class="taxItem">
            <div class="t">税込</div>
            <div class="v" id="taxIn"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="cameraWrap">
      <video id="video" playsinline autoplay muted></video>
      <canvas id="capture" class="capture"></canvas>
      <canvas id="workCanvas" class="work"></canvas>

      <div class="overlay">
        <div class="scanGuide">
          <div class="scanGuideLabel">伝票番号と合計が入ればOK</div>
          <div class="scanLine"></div>
        </div>
      </div>
    </div>

    <div class="bottomBar">
      <div class="controls">
        <button class="shutter" id="scanBtn">SCAN</button>
        <button class="btn" id="undoBtn">1件戻す</button>
      </div>

      <div class="history">
        <div class="historyTitle">履歴</div>
        <div id="historyList"></div>
      </div>

      <div class="status" id="status">初期化中…</div>
    </div>
  </div>

  <script>
    const video = document.getElementById('video');
    const capture = document.getElementById('capture');
    const capCtx = capture.getContext('2d', { willReadFrequently: true });
    const workCanvas = document.getElementById('workCanvas');
    const workCtx = workCanvas.getContext('2d', { willReadFrequently: true });

    const grandTotalEl = document.getElementById('grandTotal');
    const countEl = document.getElementById('count');
    const lastAmountEl = document.getElementById('lastAmount');
    const historyList = document.getElementById('historyList');
    const statusEl = document.getElementById('status');
    const scanBtn = document.getElementById('scanBtn');
    const undoBtn = document.getElementById('undoBtn');

    const taxEx = document.getElementById('taxEx');
    const taxOnly = document.getElementById('taxOnly');
    const taxIn = document.getElementById('taxIn');

    let workerJpn = null;
    let workerNum = null;
    let stream = null;
    let busy = false;
    let total = 0;
    let count = 0;
    let history = [];

    // 撮影時に入ればOKな縦長範囲
    const shotArea = {
      left: 0.36,
      top: 0.06,
      width: 0.56,
      height: 0.82
    };

    // その中の上側で伝票番号
    const topReadArea = {
      left: 0.10,
      top: 0.00,
      width: 0.86,
      height: 0.24
    };

    // その中の下側で合計
    const bottomReadArea = {
      left: 0.12,
      top: 0.72,
      width: 0.78,
      height: 0.16
    };

    function fmt(num) {
      return Number(num || 0).toLocaleString('ja-JP');
    }

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function beep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = 880;
        gain.gain.value = 0.02;
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.08);
      } catch (e) {}
    }

    function calcTaxFields(amount) {
      if (!amount || !Number.isFinite(amount)) {
        taxEx.textContent = '';
        taxOnly.textContent = '';
        taxIn.textContent = '';
        return;
      }
      const ex = Math.round(amount / 1.1);
      const tax = amount - ex;
      taxEx.textContent = fmt(ex);
      taxOnly.textContent = fmt(tax);
      taxIn.textContent = fmt(amount);
    }

    function updateUI() {
      grandTotalEl.textContent = fmt(total);
      countEl.textContent = count;
      lastAmountEl.textContent = history.length ? fmt(history[0].amount) : '-';

      historyList.innerHTML = '';
      history.forEach((item, idx) => {
        const row = document.createElement('div');
        row.className = 'historyItem';
        row.innerHTML = `
          <div>${idx + 1}</div>
          <div>${item.no || '番号なし'}</div>
          <div>${fmt(item.amount)}</div>
        `;
        historyList.appendChild(row);
      });
    }

    function normalizeText(text) {
      return (text || '')
        .replace(/[Ａ-Ｚａ-ｚ０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0))
        .replace(/[‐-‒–—―ー]/g, '-')
        .replace(/[：]/g, ':')
        .replace(/[，]/g, ',')
        .replace(/[．]/g, '.')
        .replace(/[ＯoＯ]/g, '0')
        .replace(/[ＩIｌl]/g, '1')
        .replace(/[SＳ]/g, '5')
        .replace(/[BＢ]/g, '8')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function onlyNumeric(text) {
      return normalizeText(text)
        .replace(/[^0-9,]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function captureFrame() {
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      if (!vw || !vh) return false;

      capture.width = vw;
      capture.height = vh;
      capCtx.drawImage(video, 0, 0, vw, vh);
      return true;
    }

    function cropShotRelativeArea(relativeArea, options = {}) {
      const {
        maxWidth = 1600,
        threshold = null,
        contrast = 1.12
      } = options;

      const vw = capture.width;
      const vh = capture.height;
      if (!vw || !vh) return false;

      const shotX = Math.floor(vw * shotArea.left);
      const shotY = Math.floor(vh * shotArea.top);
      const shotW = Math.floor(vw * shotArea.width);
      const shotH = Math.floor(vh * shotArea.height);

      const sx = Math.floor(shotX + shotW * relativeArea.left);
      const sy = Math.floor(shotY + shotH * relativeArea.top);
      const sw = Math.floor(shotW * relativeArea.width);
      const sh = Math.floor(shotH * relativeArea.height);

      const scale = Math.min(1, maxWidth / sw);
      const dw = Math.max(1, Math.floor(sw * scale));
      const dh = Math.max(1, Math.floor(sh * scale));

      workCanvas.width = dw;
      workCanvas.height = dh;
      workCtx.clearRect(0, 0, dw, dh);
      workCtx.drawImage(capture, sx, sy, sw, sh, 0, 0, dw, dh);

      const img = workCtx.getImageData(0, 0, dw, dh);
      const data = img.data;

      for (let i = 0; i < data.length; i += 4) {
        const r = data[i];
        const g = data[i + 1];
        const b = data[i + 2];

        let gray = 0.299 * r + 0.587 * g + 0.114 * b;
        gray = (gray - 128) * contrast + 128;
        gray = Math.max(0, Math.min(255, gray));

        if (threshold !== null) {
          gray = gray >= threshold ? 255 : 0;
        }

        data[i] = gray;
        data[i + 1] = gray;
        data[i + 2] = gray;
      }

      workCtx.putImageData(img, 0, 0);
      return true;
    }

    async function recognizeWithWorker(worker, relativeArea, preprocessOptions) {
      const ok = cropShotRelativeArea(relativeArea, preprocessOptions);
      if (!ok) return '';
      const result = await worker.recognize(workCanvas);
      return result.data.text || '';
    }

    function extractInvoiceNo(text) {
      const t = normalizeText(text);
      const patterns = [
        /(?:伝票番号|伝票No\.?|伝票NO\.?|No\.?|NO\.?)\s*[:：]?\s*([A-Z0-9\-]{4,})/i,
        /\b([A-Z]{0,3}\d{5,}(?:-\d+)*)\b/i,
        /\b(\d{6,})\b/
      ];
      for (const p of patterns) {
        const m = t.match(p);
        if (m && m[1]) return m[1];
      }
      return null;
    }

    function extractAmount(text) {
      const t = onlyNumeric(text);

      const direct = t.match(/\b([0-9]{1,3}(?:,[0-9]{3})+|[0-9]{3,7})\b/);
      if (direct && direct[1]) {
        const n = parseInt(direct[1].replace(/,/g, ''), 10);
        if (n >= 50 && n <= 999999) return n;
      }

      const nums = [...t.matchAll(/([0-9]{1,3}(?:,[0-9]{3})+|[0-9]{3,7})/g)]
        .map(m => parseInt(m[1].replace(/,/g, ''), 10))
        .filter(n => n >= 50 && n <= 999999);

      if (!nums.length) return null;
      return Math.max(...nums);
    }

    async function readInvoiceNo() {
      await workerJpn.setParameters({
        tessedit_char_whitelist: '',
        tessedit_pageseg_mode: Tesseract.PSM.AUTO
      });

      const raw1 = await recognizeWithWorker(workerJpn, topReadArea, {
        maxWidth: 1500,
        threshold: 156,
        contrast: 1.20
      });
      const no1 = extractInvoiceNo(raw1);
      if (no1) return no1;

      const raw2 = await recognizeWithWorker(workerJpn, topReadArea, {
        maxWidth: 1500,
        threshold: null,
        contrast: 1.08
      });
      return extractInvoiceNo(raw2);
    }

    async function readAmount() {
      await workerNum.setParameters({
        tessedit_pageseg_mode: Tesseract.PSM.SINGLE_LINE,
        tessedit_char_whitelist: '0123456789,'
      });

      const raw1 = await recognizeWithWorker(workerNum, bottomReadArea, {
        maxWidth: 1800,
        threshold: null,
        contrast: 1.08
      });
      const amount1 = extractAmount(raw1);
      if (amount1) return amount1;

      const raw2 = await recognizeWithWorker(workerNum, bottomReadArea, {
        maxWidth: 1800,
        threshold: 176,
        contrast: 1.14
      });
      const amount2 = extractAmount(raw2);
      if (amount2) return amount2;

      const raw3 = await recognizeWithWorker(workerNum, bottomReadArea, {
        maxWidth: 1800,
        threshold: 162,
        contrast: 1.20
      });
      return extractAmount(raw3);
    }

    async function scanOnce() {
      if (busy) return;
      if (!video.videoWidth) return;

      busy = true;
      scanBtn.disabled = true;
      undoBtn.disabled = true;

      try {
        setStatus('撮影待ち…');
        await new Promise(r => setTimeout(r, 300));

        const ok = captureFrame();
        if (!ok) {
          setStatus('カメラ画像を取得できない');
          return;
        }

        beep();

        setStatus('伝票番号読取中…');
        const invoiceNo = await readInvoiceNo();

        setStatus('合計金額読取中…');
        const amount = await readAmount();

        if (!amount) {
          setStatus('合計金額が見つからない');
          return;
        }

        total += amount;
        count += 1;

        history.unshift({
          no: invoiceNo,
          amount,
          at: new Date().toLocaleString('ja-JP')
        });
        history = history.slice(0, 50);

        calcTaxFields(amount);
        updateUI();
        setStatus(`登録: ${invoiceNo || '番号なし'} / ${fmt(amount)}円`);
      } catch (e) {
        console.error(e);
        setStatus('OCRエラー');
      } finally {
        scanBtn.disabled = false;
        undoBtn.disabled = false;
        busy = false;
      }
    }

    async function initWorkers() {
      workerJpn = await Tesseract.createWorker('jpn+eng', 1, {
        logger: () => {}
      });

      workerNum = await Tesseract.createWorker('eng', 1, {
        logger: () => {}
      });
    }

    async function initCamera() {
      stream = await navigator.mediaDevices.getUserMedia({
        audio: false,
        video: {
          facingMode: { ideal: 'environment' },
          width: { ideal: 1280 },
          height: { ideal: 720 }
        }
      });
      video.srcObject = stream;
      await video.play();
    }

    scanBtn.addEventListener('click', scanOnce);

    undoBtn.addEventListener('click', () => {
      if (busy) return;
      if (!history.length) {
        setStatus('戻せる履歴がない');
        return;
      }

      const removed = history.shift();
      total -= Number(removed.amount || 0);
      if (total < 0) total = 0;

      count -= 1;
      if (count < 0) count = 0;

      if (history.length) {
        calcTaxFields(history[0].amount);
      } else {
        calcTaxFields(null);
      }

      updateUI();
      setStatus(`1件取り消し: ${removed.no || '番号なし'} / ${fmt(removed.amount)}円`);
    });

    (async () => {
      try {
        await initCamera();
        setStatus('OCR初期化中…');
        await initWorkers();
        updateUI();
        setStatus('準備完了');
      } catch (e) {
        console.error(e);
        setStatus('カメラまたはOCRの初期化に失敗');
      }
    })();
  </script>
</body>
</html>
