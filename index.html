<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>請求書スキャン（税抜→税/税込）</title>
  <style>
    :root{
      --accent:#f0c040;
      --red:#ff5f5f;
      --border:rgba(255,255,255,.14);
      --surface:rgba(10,10,10,.82);
      --glass:rgba(0,0,0,.65);
      --ok:#4fd48a;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{
      margin:0;
      background:#000;
      color:#fff;
      font-family:-apple-system,BlinkMacSystemFont,"Noto Sans JP",system-ui,sans-serif;
      overflow:hidden;
    }

    #video{
      position:fixed; inset:0;
      width:100%; height:100%;
      object-fit:cover;
      z-index:0;
      background:#000;
    }
    #cap{display:none}

    /* ===== 上3本バー ===== */
    #topStack{
      position:fixed;
      top:12px; left:12px; right:12px;
      z-index:60;
      display:flex;
      flex-direction:column;
      gap:10px;
      pointer-events:none;
    }
    .banner{
      background:rgba(110,0,0,.45);
      border:1px solid rgba(255,95,95,.35);
      border-radius:999px;
      padding:12px 16px;
      font-weight:900;
      font-size:20px;
      letter-spacing:.01em;
      backdrop-filter:blur(12px);
      color:rgba(255,255,255,.94);
      display:flex; align-items:center; gap:10px;
      min-height:72px;
    }
    .banner.ok{
      background:rgba(0,90,30,.40);
      border-color:rgba(79,212,138,.38);
    }
    .banner.dim{
      background:rgba(0,0,0,.30);
      border-color:rgba(255,255,255,.12);
    }

    .pillWide{
      display:flex; align-items:center; justify-content:space-between;
      background:rgba(0,0,0,.42);
      border:1px solid rgba(255,255,255,.10);
      border-radius:999px;
      padding:14px 18px;
      backdrop-filter:blur(16px);
      min-height:72px;
    }
    .pillWide .left,
    .pillWide .right{
      font-size:22px;
      font-weight:900;
      opacity:.94;
      white-space:nowrap;
    }
    .pillWide .center{
      font-size:24px;
      font-weight:1000;
      opacity:.98;
      white-space:nowrap;
    }
    .money{
      color:var(--accent);
      font-size:28px;
      font-weight:1000;
      letter-spacing:.01em;
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
      white-space:nowrap;
    }

    /* ===== ROI + シャッター ===== */
    #roiWrap{
      position:fixed;
      left:12px; right:12px;
      top:250px;
      z-index:55;
      display:flex;
      align-items:center;
      gap:14px;
      pointer-events:none;
    }
    #roiBox{
      flex:1;
      height:72px;
      border:3px solid rgba(240,192,64,.82);
      border-radius:18px;
      background:rgba(0,0,0,.08);
      box-shadow:0 0 0 9999px rgba(0,0,0,.06);
      transition:border-color .15s ease, box-shadow .15s ease, background .15s ease;
    }
    #roiBox.flash-ok{
      border-color:rgba(79,212,138,.98);
      background:rgba(79,212,138,.12);
      box-shadow:0 0 0 9999px rgba(79,212,138,.08);
      animation:roiFlash .55s ease-out;
    }
    @keyframes roiFlash{
      0%{filter:brightness(1)}
      35%{filter:brightness(1.25)}
      100%{filter:brightness(1)}
    }

    #shutter{
      width:78px; height:78px;
      flex:0 0 78px;
      border-radius:999px;
      border:3px solid rgba(255,255,255,.55);
      background:rgba(255,255,255,.14);
      box-shadow:0 12px 26px rgba(0,0,0,.35);
      position:relative;
    }
    #shutter::after{
      content:"";
      position:absolute;
      inset:14px;
      border-radius:999px;
      background:rgba(255,255,255,.22);
    }

    /* タップ用 */
    #tapRoi, #tapShutter{
      position:fixed;
      z-index:56;
      background:transparent;
      border:none;
      padding:0;
      margin:0;
      cursor:pointer;
    }
    #tapRoi{
      left:12px;
      right:104px;   /* シャッター分を空ける */
      top:250px;
      height:72px;
      border-radius:18px;
    }
    #tapShutter{
      width:78px; height:78px;
      right:12px;
      top:247px;
      border-radius:999px;
    }

    /* ===== 下パネル ===== */
    #panel{
      position:fixed;
      left:12px; right:12px; bottom:12px;
      z-index:50;
    }
    .card{
      background:rgba(10,10,10,.82);
      border:1px solid rgba(255,255,255,.12);
      border-radius:22px;
      overflow:hidden;
      backdrop-filter:blur(18px);
    }
    .row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding:18px 18px;
      border-bottom:1px solid rgba(255,255,255,.08);
      min-height:88px;
    }
    .row:last-child{border-bottom:none}

    .label{
      font-size:26px;
      font-weight:1000;
      line-height:1.1;
      white-space:nowrap;
    }
    .sub{
      font-size:20px;
      font-weight:900;
      opacity:.82;
      margin-left:8px;
    }
    .val{
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
      font-weight:1000;
      font-size:38px;
      line-height:1;
      white-space:nowrap;
      letter-spacing:.01em;
    }
    .val.red{color:var(--red)}
    .val.gold{color:var(--accent)}
    .val.dim{opacity:.88}

    .controls{
      margin-top:12px;
      display:flex;
      gap:12px;
      align-items:stretch;
    }
    .btn{
      border:none;
      border-radius:18px;
      padding:14px 10px;
      font-weight:1000;
      font-size:24px;
      cursor:pointer;
      min-height:104px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      line-height:1.15;
      backdrop-filter:blur(14px);
    }
    #btnAuto{
      width:160px;
      flex:0 0 160px;
      background:var(--accent);
      color:#000;
    }
    #btnAuto.off{
      background:rgba(255,255,255,.10);
      color:#fff;
      border:1px solid rgba(255,255,255,.14);
    }
    #btnUndo, #btnClear{
      flex:1;
      background:rgba(255,255,255,.10);
      color:#fff;
      border:1px solid rgba(255,255,255,.14);
    }

    #btnDetails{
      width:100%;
      margin-top:12px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      color:#fff;
      padding:18px 14px;
      border-radius:18px;
      font-weight:1000;
      font-size:24px;
      min-height:80px;
    }

    #details{
      display:none;
      margin-top:10px;
      background:rgba(0,0,0,.55);
      border:1px solid rgba(255,255,255,.10);
      border-radius:18px;
      padding:12px;
      backdrop-filter:blur(12px);
      max-height:34vh;
      overflow:auto;
    }
    #details.show{display:block}

    .sectionTitle{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      font-size:14px;
      font-weight:900;
      opacity:.85;
      margin-bottom:10px;
    }
    #dateRow{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
      margin-bottom:10px;
    }
    input[type="date"]{
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.14);
      color:#fff;
      border-radius:12px;
      padding:10px 10px;
      font-weight:900;
    }
    .miniBtn{
      padding:10px 12px;
      font-size:14px;
      border-radius:12px;
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.14);
      color:#fff;
      font-weight:1000;
      cursor:pointer;
    }

    #logList{max-height:180px;overflow:auto}
    .logItem{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 4px;
      border-top:1px solid rgba(255,255,255,.08);
      font-size:15px;
    }
    .logItem:first-child{border-top:none}
    .logLeft{display:flex;align-items:center;gap:10px}
    .logRight{
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
      font-weight:1000;
    }
    .logRight b{color:var(--accent)}
    #btnDeleteSelected{
      width:100%;
      margin-top:10px;
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.14);
      color:#fff;
      padding:12px 12px;
      border-radius:14px;
      font-weight:1000;
      font-size:15px;
      cursor:pointer;
    }

    #tinyHint{
      margin-top:10px;
      text-align:center;
      font-size:12px;
      color:rgba(255,255,255,.70);
    }
  </style>
</head>
<body>
  <video id="video" autoplay muted playsinline></video>
  <canvas id="cap"></canvas>

  <div id="topStack">
    <div id="banner" class="banner dim">⚠️ 枠に数字が見えていません</div>

    <div class="pillWide">
      <div class="left">請求書：</div>
      <div class="center" id="invoiceCount">0</div>
      <div class="right">枚</div>
    </div>

    <div class="pillWide">
      <div class="left">総合計（税抜）：</div>
      <div class="money" id="grandTotal">¥0</div>
    </div>
  </div>

  <div id="roiWrap">
    <div id="roiBox"></div>
    <div id="shutter"></div>
  </div>

  <button id="tapRoi" aria-label="枠タップで読み取り"></button>
  <button id="tapShutter" aria-label="シャッターで読み取り"></button>

  <div id="panel">
    <div class="card">
      <div class="row">
        <div><span class="label">税抜</span></div>
        <div class="val dim" id="baseVal">—</div>
      </div>
      <div class="row">
        <div><span class="label">消費税</span><span class="sub">（10%・四捨五入）</span></div>
        <div class="val red" id="taxVal">—</div>
      </div>
      <div class="row">
        <div><span class="label">合計</span><span class="sub">（税込）</span></div>
        <div class="val gold" id="totalVal">—</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn" id="btnAuto">AUTO<br>ON</button>
      <button class="btn" id="btnUndo">↩︎ 直近</button>
      <button class="btn" id="btnClear">-</button>
    </div>

    <button id="btnDetails">▼ 詳細（履歴）を開く</button>

    <div id="details">
      <div class="sectionTitle">
        <div>日付別（履歴・削除）</div>
        <div id="dayInfo"></div>
      </div>

      <div id="dateRow">
        <button class="miniBtn" id="btnPrevDay">←</button>
        <input type="date" id="datePick">
        <button class="miniBtn" id="btnNextDay">→</button>
        <button class="miniBtn" id="btnSelectAll">全選択</button>
        <button class="miniBtn" id="btnClearSel">解除</button>
      </div>

      <div id="logList"></div>
      <button id="btnDeleteSelected">☑ 選んで削除（重複・誤読）</button>
    </div>

    <div id="tinyHint">※iPhoneで止まったら、Safariの「aA→サイトの設定→カメラ：許可」を確認</div>
  </div>

<script>
(() => {
  const RATE = 0.10;
  const TICK_MS = 700;              // AUTO周期
  const COOLDOWN_MS = 1200;         // 連打防止
  const SAME_VALUE_GUARD_MS = 2600; // 同じ金額の連続誤加算防止
  const SCALE = 4;                  // 小さい数字対策

  const video = document.getElementById('video');
  const cap = document.getElementById('cap');
  const ctx = cap.getContext('2d');

  const banner = document.getElementById('banner');
  const invoiceCountEl = document.getElementById('invoiceCount');
  const grandTotalEl = document.getElementById('grandTotal');

  const roiWrap = document.getElementById('roiWrap');
  const roiBox = document.getElementById('roiBox');

  const tapRoi = document.getElementById('tapRoi');
  const tapShutter = document.getElementById('tapShutter');

  const baseVal = document.getElementById('baseVal');
  const taxVal = document.getElementById('taxVal');
  const totalVal = document.getElementById('totalVal');

  const btnAuto = document.getElementById('btnAuto');
  const btnUndo = document.getElementById('btnUndo');
  const btnClear = document.getElementById('btnClear');

  const btnDetails = document.getElementById('btnDetails');
  const details = document.getElementById('details');

  const datePick = document.getElementById('datePick');
  const btnPrevDay = document.getElementById('btnPrevDay');
  const btnNextDay = document.getElementById('btnNextDay');
  const btnSelectAll = document.getElementById('btnSelectAll');
  const btnClearSel = document.getElementById('btnClearSel');
  const btnDeleteSelected = document.getElementById('btnDeleteSelected');
  const logList = document.getElementById('logList');
  const dayInfo = document.getElementById('dayInfo');

  let stream = null;
  let cameraReady = false;
  let autoOn = true;
  let timer = null;
  let scanning = false;

  let currentBase = 0;
  let lastScanAt = 0;
  let lastCountedValue = null;
  let lastCountedAt = 0;

  const pad2 = (n) => String(n).padStart(2,'0');
  const todayStr = () => {
    const d = new Date();
    return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
  };
  const yen = (n) => `¥${Number(n || 0).toLocaleString('ja-JP')}`;

  function setBanner(kind, text){
    banner.classList.remove('ok','dim');
    if (kind === 'ok') banner.classList.add('ok');
    else banner.classList.add('dim');
    banner.textContent = text;
  }

  function vibrateShort(){
    try{
      if (navigator.vibrate) navigator.vibrate(35);
    }catch(_){}
  }

  function roiFlashOk(){
    roiBox.classList.remove('flash-ok');
    void roiBox.offsetWidth;
    roiBox.classList.add('flash-ok');
    setTimeout(() => roiBox.classList.remove('flash-ok'), 560);
  }

  function calcFromBase(base){
    const tax = Math.round(base * RATE);
    return { base, tax, total: base + tax };
  }

  function showCurrent(base){
    if (!base){
      baseVal.textContent = '—';
      taxVal.textContent = '—';
      totalVal.textContent = '—';
      return;
    }
    const r = calcFromBase(base);
    baseVal.textContent = yen(r.base);
    taxVal.textContent = yen(r.tax);
    totalVal.textContent = yen(r.total);
  }

  function setAuto(on){
    autoOn = on;
    btnAuto.classList.toggle('off', !on);
    btnAuto.innerHTML = on ? 'AUTO<br>ON' : 'AUTO<br>OFF';
    setBanner('dim', on ? '⚠️ 枠に数字が見えていません' : '⚠️ 手動：枠タップ or シャッターで読み取り');
  }

  function clearCurrentKeepTotals(){
    currentBase = 0;
    showCurrent(0);
    lastScanAt = 0;
    setBanner('ok', '✅ 表示だけ解除しました');
  }

  function logKey(dateStr){ return `taxscan_log_${dateStr}`; }
  function loadLog(dateStr){
    try { return JSON.parse(localStorage.getItem(logKey(dateStr)) || '[]'); }
    catch(_) { return []; }
  }
  function saveLog(dateStr, arr){
    localStorage.setItem(logKey(dateStr), JSON.stringify(arr));
  }
  function calcStats(dateStr){
    const log = loadLog(dateStr);
    const count = log.length;
    const sumBase = log.reduce((a,x) => a + (Number(x.base) || 0), 0);
    return { count, sumBase, log };
  }

  function setTopStatsForDate(dateStr){
    const { count, sumBase } = calcStats(dateStr);
    invoiceCountEl.textContent = String(count);
    grandTotalEl.textContent = yen(sumBase);
    dayInfo.textContent = `(${count}枚 / ${yen(sumBase)})`;
  }

  function renderLog(dateStr){
    const { log } = calcStats(dateStr);
    if (!log.length){
      logList.innerHTML = `<div style="opacity:.65;padding:6px 2px">履歴なし</div>`;
      return;
    }

    const rows = [...log].reverse().map((x, idxFromTop) => {
      const realIndex = log.length - 1 - idxFromTop;
      const b = Number(x.base) || 0;
      return `
        <div class="logItem">
          <div class="logLeft">
            <input type="checkbox" class="logChk" data-idx="${realIndex}">
            <div>${realIndex + 1}枚目</div>
          </div>
          <div class="logRight"><b>${yen(b)}</b></div>
        </div>
      `;
    }).join('');

    logList.innerHTML = rows;
  }

  function getSelectedIdx(){
    return [...document.querySelectorAll('.logChk')]
      .filter(c => c.checked)
      .map(c => Number(c.dataset.idx))
      .filter(n => Number.isFinite(n));
  }

  function selectAll(checked){
    [...document.querySelectorAll('.logChk')].forEach(c => c.checked = checked);
  }

  async function startCamera(){
    try{
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: 'environment' },
          width: { ideal: 1920 },
          height: { ideal: 1080 }
        },
        audio: false
      });
      video.srcObject = stream;
      await video.play();
      cameraReady = true;
    }catch(e){
      console.error(e);
      cameraReady = false;
      setBanner('dim', '⚠️ カメラ許可が必要（aA→サイト設定→カメラ許可）');
    }
  }

  function getDisplayToVideoMap(){
    const vw = video.videoWidth;
    const vh = video.videoHeight;
    const cw = window.innerWidth;
    const ch = window.innerHeight;

    if (!vw || !vh) return null;

    const videoAspect = vw / vh;
    const containerAspect = cw / ch;

    let drawnW, drawnH, offsetX, offsetY;

    if (videoAspect > containerAspect){
      drawnH = ch;
      drawnW = ch * videoAspect;
      offsetX = (drawnW - cw) / 2;
      offsetY = 0;
    } else {
      drawnW = cw;
      drawnH = cw / videoAspect;
      offsetX = 0;
      offsetY = (drawnH - ch) / 2;
    }

    return {
      vw, vh, cw, ch,
      drawnW, drawnH,
      offsetX, offsetY
    };
  }

  function captureROIBase64(){
    const map = getDisplayToVideoMap();
    if (!map) return null;

    const roiRect = tapRoi.getBoundingClientRect();

    let sx = ((roiRect.left + map.offsetX) / map.drawnW) * map.vw;
    let sy = ((roiRect.top + map.offsetY) / map.drawnH) * map.vh;
    let sw = (roiRect.width / map.drawnW) * map.vw;
    let sh = (roiRect.height / map.drawnH) * map.vh;

    sx = Math.max(0, Math.floor(sx));
    sy = Math.max(0, Math.floor(sy));
    sw = Math.max(1, Math.floor(sw));
    sh = Math.max(1, Math.floor(sh));

    cap.width = Math.max(1, Math.floor(sw * SCALE));
    cap.height = Math.max(1, Math.floor(sh * SCALE));

    ctx.imageSmoothingEnabled = false;
    ctx.clearRect(0, 0, cap.width, cap.height);

    ctx.filter = 'contrast(220%) brightness(122%) grayscale(100%)';
    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, cap.width, cap.height);
    ctx.filter = 'none';

    return cap.toDataURL('image/jpeg', 0.96).split(',')[1];
  }

  async function callOCR(){
    const image_base64 = captureROIBase64();
    if (!image_base64) return 0;

    const res = await fetch('/api/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image_base64 })
    });

    const data = await res.json().catch(() => ({}));

    if (!res.ok) {
      throw new Error(data?.error || 'scan failed');
    }

    const base = Number(data?.total || 0);
    return Number.isFinite(base) ? base : 0;
  }

  function countInvoice(base){
    const now = Date.now();

    if (lastCountedValue === base && (now - lastCountedAt) < SAME_VALUE_GUARD_MS){
      return;
    }

    currentBase = base;
    showCurrent(base);

    const ds = datePick.value;
    const log = loadLog(ds);
    log.push({ base });
    saveLog(ds, log);

    setTopStatsForDate(ds);
    renderLog(ds);

    roiFlashOk();
    vibrateShort();
    setBanner('ok', `✅ 確定：${yen(base)}（税抜）`);

    lastCountedValue = base;
    lastCountedAt = now;
    lastScanAt = now;
  }

  async function scanOnce(){
    if (scanning) return;
    if (!cameraReady) return;

    const now = Date.now();
    if ((now - lastScanAt) < COOLDOWN_MS) return;

    scanning = true;
    try{
      const base = await callOCR();

      if (base > 0){
        countInvoice(base);
      } else {
        setBanner('dim', autoOn ? '⚠️ 枠に数字が見えていません' : '⚠️ 手動：枠タップ or シャッターで読み取り');
        lastScanAt = now;
      }
    }catch(e){
      console.error(e);
      setBanner('dim', '⚠️ OCRエラー（API/モデル/キー確認）');
      lastScanAt = now;
    }finally{
      scanning = false;
    }
  }

  function startLoop(){
    stopLoop();
    timer = setInterval(() => {
      if (!autoOn) return;
      scanOnce();
    }, TICK_MS);
  }

  function stopLoop(){
    if (timer){
      clearInterval(timer);
      timer = null;
    }
  }

  function undoLast(){
    const ds = datePick.value;
    const log = loadLog(ds);
    if (!log.length) return;

    log.pop();
    saveLog(ds, log);

    setTopStatsForDate(ds);
    renderLog(ds);

    setBanner('ok', '↩︎ 直近1件を取り消しました');
  }

  function deleteSelected(){
    const ds = datePick.value;
    const idxs = getSelectedIdx().sort((a,b) => b - a);
    if (!idxs.length){
      setBanner('dim', '⚠️ 削除する項目を選んでね');
      return;
    }

    const log = loadLog(ds);
    for (const i of idxs){
      if (i >= 0 && i < log.length) log.splice(i, 1);
    }
    saveLog(ds, log);

    setTopStatsForDate(ds);
    renderLog(ds);

    setBanner('ok', `✅ 選択 ${idxs.length} 件を削除`);
  }

  function shiftDate(days){
    const d = new Date(datePick.value + 'T00:00:00');
    d.setDate(d.getDate() + days);
    const ds = `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
    datePick.value = ds;
    onDateChanged();
  }

  function onDateChanged(){
    setTopStatsForDate(datePick.value);
    renderLog(datePick.value);
  }

  window.addEventListener('load', async () => {
    datePick.value = todayStr();

    setTopStatsForDate(datePick.value);
    renderLog(datePick.value);
    showCurrent(0);

    await startCamera();
    setAuto(true);
    startLoop();
  });

  btnAuto.addEventListener('click', () => {
    setAuto(!autoOn);
  });

  btnUndo.addEventListener('click', undoLast);
  btnClear.addEventListener('click', clearCurrentKeepTotals);

  tapRoi.addEventListener('click', scanOnce);
  tapShutter.addEventListener('click', scanOnce);

  btnPrevDay.addEventListener('click', () => shiftDate(-1));
  btnNextDay.addEventListener('click', () => shiftDate(1));
  datePick.addEventListener('change', onDateChanged);

  btnSelectAll.addEventListener('click', () => selectAll(true));
  btnClearSel.addEventListener('click', () => selectAll(false));
  btnDeleteSelected.addEventListener('click', deleteSelected);

  btnDetails.addEventListener('click', () => {
    const open = !details.classList.contains('show');
    details.classList.toggle('show', open);
    btnDetails.textContent = open ? '▲ 詳細（履歴）を閉じる' : '▼ 詳細（履歴）を開く';
  });
})();
</script>
</body>
</html>
