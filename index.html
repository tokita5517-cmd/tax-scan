<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>請求書スキャン（数字だけ）</title>
  <style>
    :root{
      --accent:#f0c040;
      --red:#ff5f5f;
      --border:rgba(255,255,255,.14);
      --surface:rgba(10,10,10,.82);
      --glass:rgba(0,0,0,.65);
      --ok:#4fd48a;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans JP",system-ui,sans-serif;overflow:hidden}

    #video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
    #cap{display:none}

    /* ROI（黄色枠） */
    #roiBox{
      position:fixed;
      left:56%; top:50%;
      transform:translate(-50%,-50%);
      width:min(62vw,360px);
      height:min(14vw,90px);
      border:3px solid rgba(240,192,64,.75);
      border-radius:14px;
      z-index:50;
      pointer-events:none;
      box-shadow:0 0 0 9999px rgba(0,0,0,.22);
    }
    #roiLabel{
      position:absolute; top:-28px; left:0;
      font-size:12px; letter-spacing:.08em;
      color:rgba(255,255,255,.78);
      background:rgba(0,0,0,.55);
      border:1px solid var(--border);
      padding:5px 10px;
      border-radius:999px;
      backdrop-filter:blur(10px);
    }

    #topBar{
      position:fixed; top:12px; left:12px; right:12px;
      z-index:60;
      display:flex; gap:8px; align-items:center; justify-content:space-between;
      flex-wrap:wrap;
    }
    .pill{
      display:inline-flex; align-items:center; gap:8px;
      background:var(--glass);
      border:1px solid var(--border);
      border-radius:999px;
      padding:10px 12px;
      font-size:12px;
      backdrop-filter:blur(10px);
      white-space:nowrap;
    }
    .pill b{font-size:13px;color:var(--accent)}
    #status{color:rgba(255,255,255,.9); cursor:pointer}
    #status.err{color:var(--red); border-color:rgba(255,95,95,.5)}
    #status.ok{color:rgba(79,212,138,.95); border-color:rgba(79,212,138,.45)}
    #status.scan{color:var(--accent); border-color:rgba(240,192,64,.6)}

    /* 下パネル */
    #panel{
      position:fixed; left:0; right:0; bottom:0;
      z-index:55;
      padding:12px 12px 18px;
      background:linear-gradient(to top, rgba(0,0,0,.96) 72%, rgba(0,0,0,.25));
    }
    .card{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:16px;
      overflow:hidden;
      backdrop-filter:blur(16px);
    }
    .row{
      display:flex; justify-content:space-between; align-items:baseline;
      padding:12px 14px;
      border-bottom:1px solid rgba(255,255,255,.10);
    }
    .row:last-child{border-bottom:none}
    .label{font-size:11px;color:rgba(255,255,255,.55);letter-spacing:.08em}
    .val{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;font-weight:800;font-size:18px}
    .val.red{color:var(--red)}
    .row.total{background:rgba(240,192,64,.08)}
    .row.total .label{color:var(--accent);font-weight:800}
    .row.total .val{color:var(--accent);font-size:26px}
    @keyframes goldFlash{
      0%{transform:scale(1);filter:brightness(1)}
      40%{transform:scale(1.05);filter:brightness(1.35)}
      100%{transform:scale(1);filter:brightness(1)}
    }
    .flash-gold{animation:goldFlash 260ms ease-out}

    .controls{
      margin-top:10px;
      display:flex; gap:10px;
    }
    button{
      border:none;
      border-radius:14px;
      padding:14px 12px;
      font-weight:900;
      font-size:15px;
      cursor:pointer;
    }
    #btnAuto{flex:1;background:var(--accent);color:#000}
    #btnAuto.off{background:rgba(255,255,255,.10);color:#fff;border:1px solid var(--border)}
    #btnUndo{background:rgba(255,255,255,.10);color:#fff;border:1px solid var(--border)}
    #btnResetToday{background:#333;color:#fff}

    #startOverlay{
      position:fixed; inset:0;
      z-index:80;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.55);
      backdrop-filter: blur(10px);
    }
    #startOverlay.show{display:flex}
    #btnStartCam{
      width:min(86vw,420px);
      padding:18px 16px;
      border-radius:18px;
      font-size:18px;
      font-weight:1000;
      background:var(--accent);
      color:#000;
    }
    #startHint{
      position:absolute;
      top:22px; left:12px; right:12px;
      text-align:center;
      font-size:12px;
      color:rgba(255,255,255,.8);
    }

    .muted{color:rgba(255,255,255,.6);font-size:12px;margin:8px 0 0}
  </style>
</head>
<body>
  <video id="video" autoplay muted playsinline></video>
  <canvas id="cap"></canvas>

  <div id="roiBox">
    <div id="roiLabel">黄色枠に「数字」を入れたらホールド</div>
  </div>

  <div id="topBar">
    <div id="status" class="pill" title="タップでカメラ開始/再開">📷 準備中…（タップで開始）</div>
    <div class="pill">請求書: <b id="invoiceCount">0</b>枚</div>
    <div class="pill">総合計: <b id="grandTotal">¥0</b></div>
  </div>

  <div id="panel">
    <div class="card">
      <div class="row">
        <div class="label">税抜（逆算）</div>
        <div class="val" id="baseVal">—</div>
      </div>
      <div class="row">
        <div class="label">消費税（10%・四捨五入）</div>
        <div class="val red" id="taxVal">—</div>
      </div>
      <div class="row total">
        <div class="label">合計（税込）</div>
        <div class="val" id="totalVal">—</div>
      </div>
    </div>

    <div class="controls">
      <button id="btnAuto" title="自動スキャン ON/OFF">AUTO: ON</button>
      <button id="btnUndo" title="直近1件取り消し">↩︎ 直近</button>
      <button id="btnResetToday" title="今日分をリセット">⟲ 今日</button>
    </div>

    <div class="muted" id="ocrLine">OCR: -</div>
    <div class="muted">
      ※iPhoneで止まったら、左上「📷」をタップで再開
    </div>
  </div>

  <div id="startOverlay">
    <div id="startHint">iPhone Safariは最初にタップが必要なことがあるよ</div>
    <button id="btnStartCam">カメラ開始</button>
  </div>

<script>
(() => {
  const RATE = 0.10;
  const CONFIRM_N = 2;
  const UNLOCK_N  = 2;
  const TICK_MS   = 320;

  // ✅ 黄色枠（動画に対する比率）— 小さめ＆数字寄り
  // left/top は画面上の枠位置に対応。数字だけ入れる想定で右寄り
  const ROI = { x: 0.50, y: 0.58, w: 0.32, h: 0.12 };

  // DOM
  const video = document.getElementById('video');
  const cap = document.getElementById('cap');
  const ctx = cap.getContext('2d');

  const statusEl = document.getElementById('status');
  const baseVal = document.getElementById('baseVal');
  const taxVal = document.getElementById('taxVal');
  const totalVal = document.getElementById('totalVal');
  const invoiceCountEl = document.getElementById('invoiceCount');
  const grandTotalEl = document.getElementById('grandTotal');
  const btnAuto = document.getElementById('btnAuto');
  const btnUndo = document.getElementById('btnUndo');
  const btnResetToday = document.getElementById('btnResetToday');
  const startOverlay = document.getElementById('startOverlay');
  const btnStartCam = document.getElementById('btnStartCam');
  const ocrLine = document.getElementById('ocrLine');

  // State
  let stream = null;
  let autoOn = true;

  let locked = false;
  let lockedTotal = null;

  let lastSeen = null;
  let stableCount = 0;
  let unlockCount = 0;

  let scanning = false;
  let timer = null;
  let cameraReady = false;

  // Utils
  const yen = (n) => `¥${Number(n||0).toLocaleString('ja-JP')}`;

  function setStatus(kind, text){
    statusEl.classList.remove('err','ok','scan');
    if(kind) statusEl.classList.add(kind);
    statusEl.textContent = text;
  }

  function flashGold(){
    totalVal.classList.remove('flash-gold');
    void totalVal.offsetWidth;
    totalVal.classList.add('flash-gold');
  }

  function splitFromTotal(total){
    const approx = Math.round(total / (1 + RATE));
    for(let d=-5; d<=5; d++){
      const base = approx + d;
      const tax = Math.round(base * RATE);
      if(base + tax === total) return { base, tax, total };
    }
    const base = approx;
    const tax = total - base;
    return { base, tax, total };
  }

  // 今日だけ簡易ログ（localStorage）
  const pad2 = (n) => String(n).padStart(2,'0');
  const todayStr = () => {
    const d = new Date();
    return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
  };
  function logKey(dateStr){ return `taxscan_log_${dateStr}`; }
  function loadLog(dateStr){
    try { return JSON.parse(localStorage.getItem(logKey(dateStr)) || "[]"); }
    catch(e){ return []; }
  }
  function saveLog(dateStr, arr){
    localStorage.setItem(logKey(dateStr), JSON.stringify(arr));
  }
  function refreshTop(){
    const ds = todayStr();
    const log = loadLog(ds);
    const count = log.length;
    const sumTotal = log.reduce((a,x)=>a + (Number(x.total)||0), 0);
    invoiceCountEl.textContent = String(count);
    grandTotalEl.textContent = yen(sumTotal);
  }

  // Camera
  async function startCamera(){
    try{
      setStatus('scan','📷 カメラ起動中…');
      startOverlay.classList.remove('show');

      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal:'environment' }, width: { ideal: 1920 } },
        audio: false
      });
      video.srcObject = stream;

      try{
        await video.play();
      }catch(_){
        startOverlay.classList.add('show');
        setStatus('err','⚠️ タップしてカメラ開始');
        return;
      }

      cameraReady = true;
      setStatus('ok','✅ 準備OK（数字を枠に）');
    }catch(e){
      console.error(e);
      cameraReady = false;
      setStatus('err','❌ カメラ許可が必要（Safariのサイト設定）');
      startOverlay.classList.add('show');
    }
  }

  function captureROI(){
    const vw = video.videoWidth || 1280;
    const vh = video.videoHeight || 720;

    const x = Math.max(0, Math.floor(ROI.x * vw));
    const y = Math.max(0, Math.floor(ROI.y * vh));
    const w = Math.max(1, Math.floor(ROI.w * vw));
    const h = Math.max(1, Math.floor(ROI.h * vh));

    // ✅ 拡大（数字が小さいので大事）
    const SCALE = 4;
    cap.width  = Math.floor(w * SCALE);
    cap.height = Math.floor(h * SCALE);

    // ✅ 画質改善（明るくしすぎない）
    ctx.imageSmoothingEnabled = false;
    ctx.filter = "grayscale(100%) contrast(220%) brightness(110%)";
    ctx.drawImage(video, x, y, w, h, 0, 0, cap.width, cap.height);
    ctx.filter = "none";

    // ✅ PNG（にじみ対策）
    return cap.toDataURL('image/png').split(',')[1];
  }

  async function recognizeTotal(){
    const img = captureROI();
    const res = await fetch('/api/scan', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ image_base64: img })
    });
    const data = await res.json().catch(()=> ({}));

    // 画面の下に raw/debug を出す（objectを文字列化して [object Object] を消す）
    const raw = (data && typeof data.raw === "string") ? data.raw : "";
    const dbg = data && data.debug ? JSON.stringify(data.debug) : "";
    ocrLine.textContent = `OCR: "${raw}" → ${Number(data?.total||0)}${dbg ? " / " + dbg : ""}`;

    const total = Number(data?.total || 0);
    return total > 0 ? total : 0;
  }

  function showResult(r){
    baseVal.textContent  = yen(r.base);
    taxVal.textContent   = yen(r.tax);
    totalVal.textContent = yen(r.total);
  }

  function onDetected(total){
    if(!total){
      if(!locked) setStatus('err','⚠️ 枠に数字が見えていません');
      stableCount = 0;
      lastSeen = null;
      return;
    }

    if(locked){
      if(total !== lockedTotal){
        unlockCount++;
        if(unlockCount >= UNLOCK_N){
          locked = false;
          lockedTotal = null;
          unlockCount = 0;
          stableCount = 1;
          lastSeen = total;
          setStatus('scan','📄 次の請求書を検出…');
        }
      }else{
        unlockCount = 0;
      }
      return;
    }

    if(total === lastSeen) stableCount++;
    else { lastSeen = total; stableCount = 1; }

    setStatus('scan',`🔍 認識中…（${stableCount}/${CONFIRM_N}）`);

    if(stableCount >= CONFIRM_N){
      locked = true;
      lockedTotal = total;
      unlockCount = 0;

      const r = splitFromTotal(total);
      showResult(r);

      const ds = todayStr();
      const log = loadLog(ds);
      log.push({ total: r.total, base: r.base, tax: r.tax });
      saveLog(ds, log);
      refreshTop();

      setStatus('ok',`✅ 確定：${yen(total)}（次で自動解除）`);
      flashGold();
    }
  }

  async function tick(){
    if(!autoOn || scanning) return;
    if(!cameraReady) return;
    scanning = true;
    try{
      const total = await recognizeTotal();
      onDetected(total);
    }catch(e){
      console.error(e);
      if(!locked) setStatus('err','❌ 通信/認識エラー');
    }finally{
      scanning = false;
    }
  }

  function startLoop(){
    if(timer) clearInterval(timer);
    timer = setInterval(tick, TICK_MS);
  }

  function setAuto(on){
    autoOn = on;
    btnAuto.textContent = on ? "AUTO: ON" : "AUTO: OFF";
    btnAuto.classList.toggle('off', !on);
    setStatus('ok', on ? '✅ AUTO ON' : '⏸ AUTO OFF');
  }

  function undoLast(){
    const ds = todayStr();
    const log = loadLog(ds);
    if(!log.length) return;
    log.pop();
    saveLog(ds, log);
    refreshTop();
    setStatus('ok','↩︎ 直近1件を取り消しました');
  }

  function resetToday(){
    const ds = todayStr();
    localStorage.removeItem(logKey(ds));
    refreshTop();
    baseVal.textContent = "—";
    taxVal.textContent = "—";
    totalVal.textContent = "—";
    setStatus('ok','⟲ 今日の履歴をリセット');
  }

  // init
  window.addEventListener('load', async () => {
    refreshTop();
    await startCamera();
    startLoop();
  });

  // UI events
  btnAuto.addEventListener('click', () => setAuto(!autoOn));
  btnUndo.addEventListener('click', undoLast);
  btnResetToday.addEventListener('click', resetToday);

  statusEl.addEventListener('click', () => startCamera());
  btnStartCam.addEventListener('click', () => startCamera());
})();
</script>
</body>
</html>
