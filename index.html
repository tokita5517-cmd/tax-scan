<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <title>G伝票専用スキャン B版</title>
  <style>
    :root{
      --bg:#070b11;
      --panel:rgba(12,20,30,.88);
      --panel2:rgba(255,255,255,.06);
      --line:rgba(255,255,255,.11);
      --text:#f7fafc;
      --muted:#9fb0c2;
      --accent:#ffcc00;
      --green:#30d158;
      --red:#ff453a;
      --blue:#0a84ff;
      --orange:#ff9f0a;
      --replace:#7dd3fc;
      --shadow:0 10px 28px rgba(0,0,0,.34);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      margin:0;padding:0;background:#000;color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Hiragino Sans","Noto Sans JP",sans-serif;
      height:100%;overflow:hidden;
    }
    body{display:flex;justify-content:center;align-items:stretch}
    .app{
      width:min(100vw,520px);
      height:100dvh;
      position:relative;
      overflow:hidden;
      background:linear-gradient(180deg,#070b11 0%, #0d1621 100%);
    }

    .cameraWrap{
      position:absolute;inset:0;background:#000;
    }
    video{
      position:absolute;inset:0;width:100%;height:100%;
      object-fit:cover;background:#000;
    }
    canvas{display:none}

    /* 上部情報 */
    .topArea{
      position:absolute;left:12px;right:12px;top:12px;z-index:20;
      display:grid;grid-template-columns:1fr 160px;gap:10px;
    }
    .leftInfo{
      display:grid;grid-template-columns:1fr;gap:8px;
    }
    .rightInfo{
      display:grid;grid-template-columns:1fr;gap:8px;
    }
    .box{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:20px;
      padding:8px 12px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(16px);
      min-height:54px;
    }
    .label{
      font-size:11px;color:var(--muted);letter-spacing:.04em;margin-bottom:2px;
    }
    .value{
      font-size:26px;font-weight:800;line-height:1.05;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      font-variant-numeric:tabular-nums;
    }
    .sub{
      font-size:12px;color:var(--muted);margin-top:2px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }

    .triple{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:8px;
    }
    .triple .box{
      min-height:66px;
      padding:8px 10px;
    }
    .triple .value{
      font-size:22px;
    }

    .statusWrap{
      position:absolute;left:12px;right:12px;top:108px;z-index:20;
      display:grid;grid-template-columns:1fr 1fr;gap:8px;
    }
    .statusBox{
      background:rgba(12,18,24,.84);
      border:1px solid var(--line);
      border-radius:18px;
      padding:8px 10px;
      min-height:54px;
      backdrop-filter:blur(16px);
    }
    .statusText{
      font-size:13px;line-height:1.35;color:#e9eef5;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .ok{color:var(--green)}
    .warn{color:var(--accent)}
    .err{color:var(--red)}
    .info{color:#91c5ff}

    /* ガイド */
    .guideArea{
      position:absolute;inset:0;z-index:12;pointer-events:none;
    }
    .target{
      position:absolute;
      border:3px solid rgba(255,204,0,.95);
      border-radius:20px;
      box-shadow:
        0 0 0 2px rgba(255,204,0,.18) inset,
        0 0 18px rgba(255,204,0,.22);
      background:rgba(255,204,0,.05);
    }
    .target::before{
      content:"";
      position:absolute;left:50%;top:50%;
      width:16px;height:16px;transform:translate(-50%,-50%);
      border:2px solid rgba(255,255,255,.72);
      border-radius:50%;
    }
    .targetLabel{
      position:absolute;left:50%;transform:translateX(-50%);
      bottom:-30px;
      background:rgba(0,0,0,.48);
      border:1px solid rgba(255,255,255,.12);
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;color:#fff;
      white-space:nowrap;
      backdrop-filter:blur(8px);
    }

    /* 画像に合わせて修正した位置 */
    .target.invoice{
      left:60%;
      top:18.5%;
      width:31%;
      height:8.8%;
    }
    .target.amount{
      left:59%;
      top:69.5%;
      width:26%;
      height:8.5%;
    }

    .hint{
      position:absolute;left:50%;transform:translateX(-50%);
      top:58%;
      z-index:13;
      background:rgba(0,0,0,.42);
      border:1px solid rgba(255,255,255,.12);
      color:#fff;
      padding:7px 12px;
      border-radius:999px;
      font-size:12px;
      white-space:nowrap;
      backdrop-filter:blur(8px);
    }

    .smallNote{
      position:absolute;left:12px;bottom:248px;z-index:20;
      max-width:56%;
      background:rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.08);
      padding:8px 10px;
      border-radius:14px;
      backdrop-filter:blur(8px);
      font-size:11px;line-height:1.4;color:#dbe4ef;
    }

    .loading{
      position:absolute;right:12px;bottom:248px;z-index:20;
      display:none;align-items:center;gap:8px;
      background:rgba(0,0,0,.42);
      border:1px solid rgba(255,255,255,.08);
      border-radius:999px;
      padding:8px 12px;
      font-size:12px;
      backdrop-filter:blur(8px);
    }
    .dot{
      width:8px;height:8px;border-radius:50%;
      background:#ffd400;box-shadow:0 0 8px #ffd400;
      animation:blink 1s infinite ease-in-out;
    }
    @keyframes blink{
      0%,100%{opacity:.4;transform:scale(.85)}
      50%{opacity:1;transform:scale(1)}
    }

    /* 下部 */
    .bottom{
      position:absolute;left:12px;right:12px;bottom:10px;z-index:20;
      display:grid;grid-template-columns:1fr;gap:10px;
    }
    .historyCard{
      background:rgba(12,18,24,.84);
      border:1px solid var(--line);
      border-radius:22px;
      padding:10px 12px;
      backdrop-filter:blur(18px);
      box-shadow:var(--shadow);
    }
    .historyHeader{
      display:flex;justify-content:space-between;align-items:center;
      margin-bottom:6px;
      font-size:12px;color:var(--muted);
      gap:8px;
    }
    .pill{
      display:inline-flex;align-items:center;gap:6px;
      padding:6px 10px;border-radius:999px;
      font-size:12px;color:#fff;
      background:rgba(0,0,0,.38);
      border:1px solid rgba(255,255,255,.1);
      white-space:nowrap;
    }
    .historyList{
      max-height:92px;
      overflow:auto;
      padding-right:2px;
    }
    .historyItem{
      display:grid;
      grid-template-columns:32px 1fr auto auto;
      gap:8px;align-items:center;
      padding:7px 0;
      border-bottom:1px solid rgba(255,255,255,.06);
      font-size:14px;
      font-variant-numeric:tabular-nums;
    }
    .historyItem:last-child{border-bottom:none}
    .historyItem.replaced{color:var(--replace)}
    .index{color:var(--muted);text-align:center}
    .invoiceNo{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .amountVal{font-weight:800}
    .badge{
      font-size:11px;padding:3px 7px;border-radius:999px;
      border:1px solid rgba(255,255,255,.15);
      background:rgba(255,255,255,.08);color:#fff;
    }
    .badge.replaced{
      background:rgba(125,211,252,.18);
      color:var(--replace);
      border-color:rgba(125,211,252,.35);
    }

    .row1{
      display:grid;
      grid-template-columns:86px 1fr 86px 86px;
      gap:10px;align-items:center;
    }
    .row2,.row3{
      display:grid;grid-template-columns:1fr 1fr;gap:10px;
    }
    .btn{
      border:none;border-radius:22px;min-height:54px;
      color:#fff;background:var(--panel);
      border:1px solid var(--line);
      font-size:15px;font-weight:700;
      box-shadow:var(--shadow);
      backdrop-filter:blur(16px);
    }
    .btn:active{transform:scale(.98)}
    .btn.gray{background:rgba(255,255,255,.08)}
    .btn.red{background:rgba(255,69,58,.18);border-color:rgba(255,69,58,.32)}
    .btn.blue{background:rgba(10,132,255,.22);border-color:rgba(10,132,255,.35)}
    .btn.green{background:rgba(48,209,88,.18);border-color:rgba(48,209,88,.3)}
    .btn.orange{background:rgba(255,159,10,.18);border-color:rgba(255,159,10,.32)}

    .shutterWrap{display:flex;justify-content:center}
    .shutter{
      width:82px;height:82px;border-radius:50%;
      border:none;
      background:linear-gradient(180deg,#fff,#d8dde4);
      box-shadow:
        0 6px 20px rgba(0,0,0,.35),
        inset 0 0 0 9px #ffffff,
        inset 0 0 0 14px #d5dbe2;
    }
    .shutter:active{transform:scale(.96)}

    .modal{
      position:absolute;inset:0;background:rgba(0,0,0,.52);
      display:none;align-items:flex-end;z-index:40;
    }
    .modal.show{display:flex}
    .sheet{
      width:100%;
      background:#121922;
      border-radius:24px 24px 0 0;
      border:1px solid rgba(255,255,255,.08);
      padding:14px 14px 24px;
      min-height:340px;
      box-shadow:0 -20px 40px rgba(0,0,0,.35);
    }
    .sheetHead{
      display:flex;justify-content:space-between;align-items:center;
      margin-bottom:10px;
    }
    .closeBtn{
      border:none;background:rgba(255,255,255,.08);color:#fff;
      width:42px;height:42px;border-radius:50%;font-size:18px;
    }
    .searchRow{
      display:grid;grid-template-columns:1fr 92px 92px;gap:8px;
      margin-bottom:10px;
    }
    .input{
      width:100%;min-height:50px;border-radius:16px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.06);
      color:#fff;padding:0 14px;font-size:16px;outline:none;
    }
    .resultList{
      max-height:260px;overflow:auto;
      border-radius:18px;border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);padding:10px;
    }
    .resultItem{
      padding:10px 8px;border-bottom:1px solid rgba(255,255,255,.06);
      font-size:14px;line-height:1.5;
    }
    .resultItem:last-child{border-bottom:none}
    .chartCanvas{
      width:100%;height:220px;display:block;
      border-radius:18px;border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
      margin-top:12px;
    }
    .sheetNote{
      color:var(--muted);font-size:12px;line-height:1.5;margin-top:10px;
    }

    .dupOverlay{
      position:absolute;inset:0;z-index:35;
      background:rgba(0,0,0,.55);
      display:none;align-items:center;justify-content:center;
      padding:18px;
    }
    .dupCard{
      width:100%;
      background:#131b25;
      border:1px solid rgba(255,255,255,.1);
      border-radius:24px;
      padding:16px;
      box-shadow:0 20px 40px rgba(0,0,0,.35);
    }
    .dupTitle{
      font-size:20px;font-weight:800;margin-bottom:8px;color:#fff;
    }
    .dupBody{
      font-size:14px;line-height:1.65;color:#e6edf5;margin-bottom:12px;
    }
    .dupBtns{
      display:grid;grid-template-columns:1fr 1fr;gap:10px;
    }

    @media (max-width:390px){
      .topArea{grid-template-columns:1fr 146px}
      .triple .value{font-size:19px}
      .row1{grid-template-columns:74px 1fr 74px 74px}
      .btn{min-height:50px;font-size:14px}
      .shutter{width:74px;height:74px}
      .targetLabel,.hint{font-size:11px}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="cameraWrap">
      <video id="video" autoplay playsinline muted></video>

      <div class="topArea">
        <div class="leftInfo">
          <div class="triple">
            <div class="box">
              <div class="label">税抜き</div>
              <div class="value" id="taxBase">0円</div>
            </div>
            <div class="box">
              <div class="label">消費税</div>
              <div class="value" id="taxAmountOnly">0円</div>
            </div>
            <div class="box">
              <div class="label">総計</div>
              <div class="value" id="totalAmount">0円</div>
              <div class="sub" id="totalCount">0枚</div>
            </div>
          </div>
        </div>

        <div class="rightInfo">
          <div class="box compact">
            <div class="label">直近伝票</div>
            <div class="sub" id="lastInvoice">-</div>
          </div>
          <div class="box compact">
            <div class="label">認識状態</div>
            <div class="sub" id="ocrState">待機中</div>
          </div>
        </div>
      </div>

      <div class="statusWrap">
        <div class="statusBox">
          <div class="label">スキャン結果</div>
          <div class="statusText" id="scanStatus">まだ未認識</div>
        </div>
        <div class="statusBox">
          <div class="label">重複チェック</div>
          <div class="statusText" id="dupStatus">まだ未チェック</div>
        </div>
      </div>

      <div class="guideArea">
        <div class="target invoice" id="invoiceGuide">
          <div class="targetLabel">伝票番号（G〜）</div>
        </div>
        <div class="target amount" id="amountGuide">
          <div class="targetLabel">合計金額</div>
        </div>
      </div>

      <div class="hint">右上の伝票番号と右下の合計だけ合わせる</div>

      <div class="smallNote">
        自動認識後は3秒ホールド。<br>
        重複時はスキップ / 金額差し替え。
      </div>

      <div class="loading" id="loadingBadge">
        <div class="dot"></div>
        <div id="loadingText">OCR中…</div>
      </div>
    </div>

    <canvas id="workCanvas"></canvas>

    <div class="bottom">
      <div class="historyCard">
        <div class="historyHeader">
          <span>履歴</span>
          <span class="pill" id="holdBadge">ホールドなし</span>
        </div>
        <div class="historyList" id="historyList"></div>
      </div>

      <div class="row1">
        <button class="btn gray" id="searchBtn">検索</button>

        <div class="shutterWrap">
          <button class="shutter" id="scanBtn" aria-label="scan"></button>
        </div>

        <button class="btn red" id="todayBtn">今日</button>
        <button class="btn blue" id="releaseBtn">解除</button>
      </div>

      <div class="row2">
        <button class="btn green" id="autoBtn">自動認識 ON</button>
        <button class="btn orange" id="graphBtn">グラフ</button>
      </div>

      <div class="row3">
        <button class="btn gray" id="historyBtn">履歴</button>
        <button class="btn gray" id="dummyBtn" disabled>同期なしB版</button>
      </div>
    </div>

    <div class="modal" id="searchModal">
      <div class="sheet">
        <div class="sheetHead">
          <div>
            <div style="font-size:18px;font-weight:800;">伝票検索</div>
            <div style="font-size:12px;color:var(--muted);margin-top:3px;">何日の何番か / 差し替え確認</div>
          </div>
          <button class="closeBtn" id="closeSearch">×</button>
        </div>

        <div class="searchRow">
          <input class="input" id="searchInput" placeholder="例: G01297282" />
          <button class="btn blue" id="doSearchBtn">検索</button>
          <button class="btn gray" id="showReplacedBtn">差替一覧</button>
        </div>

        <div class="resultList" id="searchResults">
          <div style="color:var(--muted);font-size:13px;">まだ検索していません</div>
        </div>

        <canvas id="modalGraphCanvas" class="chartCanvas" width="480" height="220"></canvas>
        <div class="sheetNote">
          まずはカメラ・OCR・ボタンが安定して動くB版。
        </div>
      </div>
    </div>

    <div class="dupOverlay" id="dupOverlay">
      <div class="dupCard">
        <div class="dupTitle">重複しています</div>
        <div class="dupBody" id="dupBody"></div>
        <div class="dupBtns">
          <button class="btn gray" id="skipDupBtn">スキップ</button>
          <button class="btn orange" id="replaceAmountBtn">金額だけ差し替え</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script>
    const TAX_RATE = 0.10;
    const STORAGE_KEY = 'g-invoice-special-b-stable-v1';
    const AUTO_INTERVAL_MS = 1400;
    const HOLD_MS = 3000;

    const SEARCH_OFFSETS = [
      {x:0,y:0},
      {x:-0.03,y:0},
      {x:0.03,y:0},
      {x:0,y:-0.03},
      {x:0,y:0.03},
      {x:-0.02,y:-0.02},
      {x:0.02,y:-0.02},
      {x:-0.02,y:0.02},
      {x:0.02,y:0.02}
    ];

    const state = {
      stream:null,
      worker:null,
      workerReady:false,
      ocrRunning:false,
      autoMode:true,
      autoTimer:null,
      holdUntil:0,
      holdCurrent:null,
      todayKey:makeDateKey(),
      scans:[],
      allScans:[],
      pendingDuplicate:null
    };

    const $ = id => document.getElementById(id);
    const video = $('video');
    const workCanvas = $('workCanvas');

    function makeDateKey(d=new Date()){
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const day = String(d.getDate()).padStart(2,'0');
      return `${y}-${m}-${day}`;
    }

    function fmtDate(iso){
      const d = new Date(iso);
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const day = String(d.getDate()).padStart(2,'0');
      return `${y}/${m}/${day}`;
    }

    function fmtDateTime(iso){
      const d = new Date(iso);
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const day = String(d.getDate()).padStart(2,'0');
      const hh = String(d.getHours()).padStart(2,'0');
      const mm = String(d.getMinutes()).padStart(2,'0');
      return `${y}/${m}/${day} ${hh}:${mm}`;
    }

    function yen(n){
      return `${Number(n||0).toLocaleString('ja-JP')}円`;
    }

    function escapeHtml(str=''){
      return str
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'","&#39;");
    }

    function setLoading(flag, text='OCR中…'){
      $('loadingBadge').style.display = flag ? 'flex' : 'none';
      $('loadingText').textContent = text;
    }

    function setText(id, text, cls=''){
      const el = $(id);
      el.textContent = text;
      if(id === 'scanStatus' || id === 'dupStatus'){
        el.className = `statusText ${cls}`.trim();
      }else{
        el.className = `sub ${cls}`.trim();
      }
    }

    function saveState(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        todayKey: state.todayKey,
        scans: state.scans,
        allScans: state.allScans,
        holdCurrent: state.holdCurrent
      }));
    }

    function loadState(){
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return;
      try{
        const data = JSON.parse(raw);
        state.todayKey = data.todayKey || makeDateKey();
        state.scans = Array.isArray(data.scans) ? data.scans : [];
        state.allScans = Array.isArray(data.allScans) ? data.allScans : [];
        state.holdCurrent = data.holdCurrent || null;

        if(state.todayKey !== makeDateKey()){
          state.todayKey = makeDateKey();
          state.scans = [];
          state.holdCurrent = null;
          saveState();
        }

        for(const arr of [state.scans, state.allScans]){
          arr.forEach(item => {
            if(!("replacedFromAmount" in item)) item.replacedFromAmount = null;
            if(!("originalAmount" in item)) item.originalAmount = item.amount;
            if(!("isReplaced" in item)) item.isReplaced = false;
          });
        }
      }catch(e){
        console.error(e);
      }
    }

    async function initCamera(){
      try{
        const stream = await navigator.mediaDevices.getUserMedia({
          audio:false,
          video:{
            facingMode:{ideal:'environment'},
            width:{ideal:1920},
            height:{ideal:1080}
          }
        });
        state.stream = stream;
        video.srcObject = stream;
        await video.play();
        setText('ocrState','カメラ起動OK','ok');
      }catch(err){
        console.error(err);
        setText('ocrState','カメラ起動失敗','err');
        setText('scanStatus','カメラ許可を確認','err');
      }
    }

    async function initWorker(){
      try{
        setLoading(true,'OCR初期化中…');
        state.worker = await Tesseract.createWorker('jpn+eng');
        state.workerReady = true;
        setLoading(false);
        setText('ocrState','OCR準備完了','ok');
      }catch(err){
        console.error(err);
        setLoading(false);
        setText('ocrState','OCR準備失敗','err');
        setText('scanStatus','OCR読込失敗','err');
      }
    }

    function getGuideRectPixels(el){
      const vr = video.getBoundingClientRect();
      const gr = el.getBoundingClientRect();
      const scaleX = video.videoWidth / vr.width;
      const scaleY = video.videoHeight / vr.height;

      return {
        x: (gr.left - vr.left) * scaleX,
        y: (gr.top - vr.top) * scaleY,
        w: gr.width * scaleX,
        h: gr.height * scaleY
      };
    }

    function cropVideoRegion(rect){
      const x = Math.max(0, Math.round(rect.x));
      const y = Math.max(0, Math.round(rect.y));
      const w = Math.max(10, Math.round(rect.w));
      const h = Math.max(10, Math.round(rect.h));

      workCanvas.width = w;
      workCanvas.height = h;
      const ctx = workCanvas.getContext('2d', {willReadFrequently:true});
      ctx.drawImage(video, x, y, w, h, 0, 0, w, h);

      const img = ctx.getImageData(0,0,w,h);
      const d = img.data;
      for(let i=0;i<d.length;i+=4){
        const gray = d[i]*0.299 + d[i+1]*0.587 + d[i+2]*0.114;
        const boosted = gray > 155 ? 255 : gray < 105 ? 0 : gray * 1.16;
        d[i]=d[i+1]=d[i+2]=Math.max(0,Math.min(255,boosted));
      }
      ctx.putImageData(img,0,0);
      return workCanvas;
    }

    function normalizeText(text){
      return (text || '')
        .replace(/[Ａ-Ｚａ-ｚ０-９]/g, s => String.fromCharCode(s.charCodeAt(0)-0xFEE0))
        .replace(/[￥¥]/g,'¥')
        .replace(/[，、]/g,',')
        .replace(/[．]/g,'.')
        .replace(/[ー―‐]/g,'-')
        .replace(/\s+/g,' ')
        .trim();
    }

    function extractInvoiceNo(text){
      const t = normalizeText(text).toUpperCase();
      const m1 = t.match(/G[0-9OIZSB]{5,15}/);
      if(m1) return fixInvoiceCandidate(m1[0]);
      const m2 = t.match(/G\s*[0-9OIZSB]{5,15}/);
      if(m2) return fixInvoiceCandidate(m2[0].replace(/\s+/g,''));
      return null;
    }

    function fixInvoiceCandidate(v){
      let s = v.toUpperCase().replace(/[^A-Z0-9]/g,'');
      if(!s.startsWith('G')) return null;
      let rest = s.slice(1)
        .replace(/O/g,'0')
        .replace(/I/g,'1')
        .replace(/Z/g,'2')
        .replace(/S/g,'5')
        .replace(/B/g,'8')
        .replace(/[^0-9]/g,'');
      if(rest.length < 5) return null;
      return 'G' + rest;
    }

    function extractAmount(text){
      const t = normalizeText(text);
      let nums = [...t.matchAll(/(?:¥\s*)?(\d{1,3}(?:,\d{3})+|\d{3,7})(?:\s*円)?/g)]
        .map(m => parseInt(m[1].replace(/,/g,''),10))
        .filter(n => n >= 50 && n <= 999999);

      if(!nums.length) return null;
      nums.sort((a,b)=>b-a);
      return nums[0];
    }

    function scoreInvoice(candidate){
      if(!candidate) return -1;
      let score = 0;
      if(/^G\d+$/.test(candidate)) score += 100;
      if(candidate.length >= 7 && candidate.length <= 12) score += 30;
      if(candidate.startsWith('G0')) score += 10;
      return score;
    }

    function scoreAmount(amount){
      if(!amount) return -1;
      let score = 0;
      if(amount >= 100 && amount <= 999999) score += 100;
      if(amount >= 1000) score += 10;
      return score;
    }

    async function scanBestInvoiceNo(){
      const base = getGuideRectPixels($('invoiceGuide'));
      let best = {value:null, score:-1};

      for(const off of SEARCH_OFFSETS){
        const rect = {
          x: base.x + base.w*off.x,
          y: base.y + base.h*off.y,
          w: base.w,
          h: base.h
        };
        const canvas = cropVideoRegion(rect);
        const { data } = await state.worker.recognize(canvas);
        const candidate = extractInvoiceNo(data?.text || '');
        const score = scoreInvoice(candidate);
        if(score > best.score) best = {value:candidate, score};
      }
      return best;
    }

    async function scanBestAmount(){
      const base = getGuideRectPixels($('amountGuide'));
      let best = {value:null, score:-1};

      for(const off of SEARCH_OFFSETS){
        const rect = {
          x: base.x + base.w*off.x,
          y: base.y + base.h*off.y,
          w: base.w,
          h: base.h
        };
        const canvas = cropVideoRegion(rect);
        const { data } = await state.worker.recognize(canvas);
        const candidate = extractAmount(data?.text || '');
        const score = scoreAmount(candidate);
        if(score > best.score) best = {value:candidate, score};
      }
      return best;
    }

    function getTodayNextIndex(){
      return state.scans.length + 1;
    }

    function getDayOrderText(item){
      return `${fmtDate(item.scannedAt)} の ${item.dayIndex}番目`;
    }

    function findDuplicate(invoiceNo, amount){
      return state.allScans.find(v => v.invoiceNo === invoiceNo && Number(v.amount) === Number(amount)) || null;
    }

    function addScan(invoiceNo, amount){
      const now = new Date().toISOString();
      const item = {
        id: crypto.randomUUID(),
        invoiceNo,
        amount:Number(amount),
        originalAmount:Number(amount),
        isReplaced:false,
        replacedAt:null,
        replacedFromAmount:null,
        scannedAt:now,
        dateKey:makeDateKey(new Date(now)),
        dayIndex:getTodayNextIndex()
      };
      state.scans.unshift(item);
      state.allScans.unshift(item);
      state.holdCurrent = item;
      state.holdUntil = Date.now() + HOLD_MS;
      saveState();
      render();
      return item;
    }

    function replaceAmountOnly(targetId, newAmount){
      const item1 = state.scans.find(v => v.id === targetId);
      const item2 = state.allScans.find(v => v.id === targetId);
      if(!item1 || !item2) return;

      const prevAmount = item1.amount;
      const replacedAt = new Date().toISOString();

      item1.amount = Number(newAmount);
      item2.amount = Number(newAmount);
      item1.isReplaced = true;
      item2.isReplaced = true;
      item1.replacedAt = replacedAt;
      item2.replacedAt = replacedAt;
      item1.replacedFromAmount = prevAmount;
      item2.replacedFromAmount = prevAmount;

      state.holdCurrent = item1;
      state.holdUntil = Date.now() + HOLD_MS;

      saveState();
      render();
    }

    function undoCurrentHoldOnly(){
      if(!state.holdCurrent) return;
      const id = state.holdCurrent.id;
      state.scans = state.scans.filter(v => v.id !== id);
      state.allScans = state.allScans.filter(v => v.id !== id);
      state.holdCurrent = null;
      state.holdUntil = 0;
      saveState();
      setText('scanStatus','今ホールド中の1件だけ取り消し','warn');
      setText('dupStatus','再スキャン可能','info');
      render();
    }

    function releaseHoldOnly(){
      state.holdUntil = 0;
      state.holdCurrent = null;
      saveState();
      setText('scanStatus','ホールド解除。合計は維持','info');
      setText('dupStatus','再スキャン可能','info');
      render();
    }

    function totals(){
      const total = state.scans.reduce((sum,v)=>sum + Number(v.amount||0),0);
      const base = Math.round(total / (1 + TAX_RATE));
      const tax = total - base;
      return {total, count:state.scans.length, base, tax};
    }

    function render(){
      const t = totals();
      $('taxBase').textContent = yen(t.base);
      $('taxAmountOnly').textContent = yen(t.tax);
      $('totalAmount').textContent = yen(t.total);
      $('totalCount').textContent = `${t.count}枚`;
      $('lastInvoice').textContent = state.scans[0] ? state.scans[0].invoiceNo : '-';

      const list = $('historyList');
      list.innerHTML = '';
      if(!state.scans.length){
        list.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:10px 0;">まだ履歴がありません</div>';
      }else{
        state.scans.forEach((item, idx) => {
          const replacedBadge = item.isReplaced
            ? '<span class="badge replaced">差</span>'
            : '';

          const row = document.createElement('div');
          row.className = `historyItem ${item.isReplaced ? 'replaced' : ''}`;
          row.innerHTML = `
            <div class="index">${idx + 1}</div>
            <div class="invoiceNo">${escapeHtml(item.invoiceNo)}</div>
            <div class="amountVal">${yen(item.amount)}</div>
            <div>${replacedBadge}</div>
          `;
          list.appendChild(row);
        });
      }

      if(state.holdCurrent && Date.now() < state.holdUntil){
        const sec = Math.max(0, Math.ceil((state.holdUntil - Date.now()) / 1000));
        $('holdBadge').textContent = `ホールド中 ${sec}s / ${state.holdCurrent.invoiceNo}`;
      }else{
        $('holdBadge').textContent = state.holdCurrent ? `直近 ${state.holdCurrent.invoiceNo}` : 'ホールドなし';
      }

      $('autoBtn').textContent = `自動認識 ${state.autoMode ? 'ON' : 'OFF'}`;
      drawGraph($('modalGraphCanvas'), state.scans);
    }

    async function recognizeOnce(source='manual'){
      if(!state.workerReady || state.ocrRunning) return;
      if(Date.now() < state.holdUntil){
        const sec = Math.max(0, Math.ceil((state.holdUntil - Date.now()) / 1000));
        setText('scanStatus', `ホールド中 ${sec}秒`, 'warn');
        return;
      }
      if(video.readyState < 2){
        setText('scanStatus', 'カメラ準備待ち', 'warn');
        return;
      }

      state.ocrRunning = true;
      setLoading(true, source === 'auto' ? '自動OCR中…' : 'OCR中…');
      setText('ocrState', '認識中', 'warn');

      try{
        const invoiceRes = await scanBestInvoiceNo();
        const amountRes = await scanBestAmount();

        const invoiceNo = invoiceRes.value;
        const amount = amountRes.value;

        if(!invoiceNo || !amount){
          setText('scanStatus', '伝票番号または金額を取得できず', 'err');
          setText('dupStatus', '位置を少し調整して再スキャン', 'warn');
          setText('ocrState', '認識失敗', 'err');
          return;
        }

        const dup = findDuplicate(invoiceNo, amount);
        if(dup){
          state.pendingDuplicate = {invoiceNo, amount, existing:dup};
          showDuplicateModal(state.pendingDuplicate);
          setText('scanStatus', `重複: ${invoiceNo} / ${yen(amount)}`, 'err');
          setText('dupStatus', `${getDayOrderText(dup)} で登録済み`, 'err');
          setText('ocrState', '重複検出', 'err');
          return;
        }

        const item = addScan(invoiceNo, amount);
        setText('scanStatus', `OK: ${item.invoiceNo} / ${yen(item.amount)}`, 'ok');
        setText('dupStatus', '新規スキャン', 'ok');
        setText('ocrState', '認識成功', 'ok');
      }catch(err){
        console.error(err);
        setText('scanStatus', 'OCRエラー', 'err');
        setText('dupStatus', '再試行してください', 'warn');
        setText('ocrState', '認識失敗', 'err');
      }finally{
        state.ocrRunning = false;
        setLoading(false);
      }
    }

    function showDuplicateModal(data){
      const {invoiceNo, amount, existing} = data;
      $('dupBody').innerHTML = `
        伝票番号: <b>${escapeHtml(invoiceNo)}</b><br>
        金額: <b>${yen(amount)}</b><br><br>
        登録済み: <b>${fmtDateTime(existing.scannedAt)}</b><br>
        その日の位置: <b>${existing.dayIndex}番目</b><br>
        現在金額: <b>${yen(existing.amount)}</b><br>
        ${existing.isReplaced ? `差し替え済み: <b>${fmtDateTime(existing.replacedAt)}</b><br>` : ''}
      `;
      $('dupOverlay').style.display = 'flex';
    }

    function hideDuplicateModal(){
      $('dupOverlay').style.display = 'none';
    }

    function searchByInvoiceNo(keyword){
      const q = normalizeText(keyword).toUpperCase().replace(/\s+/g,'');
      if(!q) return [];
      return state.allScans
        .filter(v => v.invoiceNo.includes(q))
        .sort((a,b) => new Date(b.scannedAt) - new Date(a.scannedAt));
    }

    function searchReplacedOnly(){
      return state.allScans
        .filter(v => v.isReplaced)
        .sort((a,b) => new Date(b.replacedAt || b.scannedAt) - new Date(a.replacedAt || a.scannedAt));
    }

    function renderSearchResults(items){
      const box = $('searchResults');
      if(!items.length){
        box.innerHTML = `<div style="color:var(--muted);font-size:13px;">該当なし</div>`;
        return;
      }

      box.innerHTML = items.map(item => `
        <div class="resultItem">
          <div><b>${escapeHtml(item.invoiceNo)}</b> ${item.isReplaced ? '<span class="badge replaced">差</span>' : ''}</div>
          <div>${getDayOrderText(item)} / ${fmtDateTime(item.scannedAt)}</div>
          <div>金額: <b>${yen(item.amount)}</b></div>
          ${item.isReplaced ? `<div>旧金額: <b>${yen(item.replacedFromAmount)}</b> / 差し替え日時: <b>${fmtDateTime(item.replacedAt)}</b></div>` : ''}
        </div>
      `).join('');
    }

    function drawGraph(canvas, items){
      const ctx = canvas.getContext('2d');
      const w = canvas.width;
      const h = canvas.height;
      ctx.clearRect(0,0,w,h);
      ctx.fillStyle = 'rgba(255,255,255,.04)';
      ctx.fillRect(0,0,w,h);

      const data = [...items].slice(0,10).reverse();
      if(!data.length){
        ctx.fillStyle = 'rgba(255,255,255,.6)';
        ctx.font = '14px sans-serif';
        ctx.fillText('履歴がありません', 20, 34);
        return;
      }

      const pad = 24;
      const baseY = h - 28;
      const maxVal = Math.max(...data.map(v => Number(v.amount || 0)), 1);
      const step = (w - pad * 2) / data.length;
      const barW = Math.max(16, step - 10);

      ctx.strokeStyle = 'rgba(255,255,255,.12)';
      ctx.lineWidth = 1;
      for(let i=0;i<4;i++){
        const y = pad + i * ((baseY - pad)/3);
        ctx.beginPath();
        ctx.moveTo(pad, y);
        ctx.lineTo(w-pad, y);
        ctx.stroke();
      }

      data.forEach((item, idx) => {
        const x = pad + idx * step + 5;
        const barH = ((baseY - pad) * item.amount / maxVal);
        const y = baseY - barH;

        ctx.fillStyle = item.isReplaced ? 'rgba(125,211,252,.78)' : 'rgba(10,132,255,.75)';
        roundRect(ctx, x, y, barW, barH, 10, true, false);

        ctx.fillStyle = '#e5edf6';
        ctx.font = '11px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(String(idx+1), x + barW/2, h - 10);

        ctx.save();
        ctx.translate(x + barW/2, y - 4);
        ctx.rotate(-0.34);
        ctx.fillStyle = '#fff';
        ctx.font = '10px sans-serif';
        ctx.fillText(formatCompact(item.amount), 0, 0);
        ctx.restore();
      });

      ctx.textAlign = 'left';
      ctx.fillStyle = 'rgba(255,255,255,.65)';
      ctx.font = '11px sans-serif';
      ctx.fillText(`最大 ${yen(maxVal)}`, pad, 16);
    }

    function roundRect(ctx, x, y, width, height, radius, fill, stroke){
      if(width < 2 * radius) radius = width / 2;
      if(height < 2 * radius) radius = height / 2;
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.arcTo(x + width, y, x + width, y + height, radius);
      ctx.arcTo(x + width, y + height, x, y + height, radius);
      ctx.arcTo(x, y + height, x, y, radius);
      ctx.arcTo(x, y, x + width, y, radius);
      ctx.closePath();
      if(fill) ctx.fill();
      if(stroke) ctx.stroke();
    }

    function formatCompact(n){
      const num = Number(n||0);
      if(num >= 10000) return `${(num/10000).toFixed(num % 10000 === 0 ? 0 : 1)}万`;
      return `${num}`;
    }

    function startAutoLoop(){
      stopAutoLoop();
      state.autoTimer = setInterval(() => {
        if(state.autoMode && !state.ocrRunning && $('dupOverlay').style.display !== 'flex'){
          recognizeOnce('auto');
        }
        render();
      }, AUTO_INTERVAL_MS);
    }

    function stopAutoLoop(){
      if(state.autoTimer){
        clearInterval(state.autoTimer);
        state.autoTimer = null;
      }
    }

    function bindEvents(){
      $('scanBtn').addEventListener('click', () => recognizeOnce('manual'));

      $('todayBtn').addEventListener('click', () => {
        if(!state.holdCurrent || Date.now() >= state.holdUntil){
          setText('scanStatus','今ホールド中の取り消し対象なし','warn');
          return;
        }
        undoCurrentHoldOnly();
      });

      $('releaseBtn').addEventListener('click', () => releaseHoldOnly());

      $('autoBtn').addEventListener('click', () => {
        state.autoMode = !state.autoMode;
        setText('ocrState', state.autoMode ? '自動認識ON' : '自動認識OFF', state.autoMode ? 'ok' : 'info');
        render();
      });

      $('graphBtn').addEventListener('click', () => {
        $('searchModal').classList.add('show');
        $('searchResults').innerHTML = '<div style="color:var(--muted);font-size:13px;">グラフ表示中</div>';
        drawGraph($('modalGraphCanvas'), state.scans);
      });

      $('searchBtn').addEventListener('click', () => {
        $('searchModal').classList.add('show');
        $('searchInput').focus();
        drawGraph($('modalGraphCanvas'), state.scans);
      });

      $('historyBtn').addEventListener('click', () => {
        $('historyList').scrollTop = 0;
        setText('scanStatus', state.scans.length ? `履歴 ${state.scans.length}件` : '履歴なし', 'info');
      });

      $('closeSearch').addEventListener('click', () => {
        $('searchModal').classList.remove('show');
      });

      $('searchModal').addEventListener('click', (e) => {
        if(e.target.id === 'searchModal') $('searchModal').classList.remove('show');
      });

      $('doSearchBtn').addEventListener('click', () => {
        renderSearchResults(searchByInvoiceNo($('searchInput').value));
      });

      $('showReplacedBtn').addEventListener('click', () => {
        renderSearchResults(searchReplacedOnly());
      });

      $('searchInput').addEventListener('keydown', (e) => {
        if(e.key === 'Enter') $('doSearchBtn').click();
      });

      $('skipDupBtn').addEventListener('click', () => {
        hideDuplicateModal();
        state.pendingDuplicate = null;
        state.holdUntil = Date.now() + HOLD_MS;
        setText('scanStatus','重複のためスキップ','warn');
        setText('dupStatus','再スキャン可能','info');
        render();
      });

      $('replaceAmountBtn').addEventListener('click', () => {
        if(!state.pendingDuplicate) return;
        const { existing, amount, invoiceNo } = state.pendingDuplicate;
        replaceAmountOnly(existing.id, amount);
        hideDuplicateModal();
        setText('scanStatus', `差し替え完了: ${invoiceNo} / ${yen(amount)}`, 'ok');
        setText('dupStatus', `${getDayOrderText(existing)} の金額を更新`, 'ok');
        setText('ocrState', '差し替え成功', 'ok');
        state.pendingDuplicate = null;
      });

      document.addEventListener('visibilitychange', () => {
        if(document.hidden){
          stopAutoLoop();
        }else{
          startAutoLoop();
        }
      });
    }

    async function boot(){
      loadState();
      render();
      bindEvents();
      await initCamera();
      await initWorker();
      startAutoLoop();

      setInterval(() => {
        render();
      }, 500);
    }

    boot();

    window.addEventListener('beforeunload', async () => {
      try{
        stopAutoLoop();
        if(state.worker) await state.worker.terminate();
        if(state.stream) state.stream.getTracks().forEach(t => t.stop());
      }catch(e){}
    });
  </script>
</body>
</html>
